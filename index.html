<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<title>오상고 상담카드 시스템</title>
<link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'%3E%3Ctext y='.9em' font-size='90'%3E📋%3C/text%3E%3C/svg%3E">
<link rel="stylesheet" href="css/styles.css">
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
</head>
<body>
<header>
  <div class="title">📋 오상고 상담카드 시스템 <span class="year">2026</span></div>
  <div id="statusBar" class="status">로딩중...</div>
</header>

<main>
  <aside id="sidebar">
    <input id="searchInput" type="text" placeholder="🔍 이름 또는 학번 검색">
    <div class="filter-row">
      <select id="gradeFilter"><option value="">전체 학년</option></select>
      <select id="classFilter"><option value="">전체 반</option></select>
    </div>
    <div id="countInfo" class="count-info">-</div>
    <div id="studentList" class="student-list"></div>
  </aside>

  <section id="content">
    <div id="empty" class="empty">👈 왼쪽에서 학생을 선택하세요</div>
    <div id="detail" style="display:none;">
      <div id="studentHeader" class="student-header"></div>
      <div id="tabBar" class="tab-bar"></div>
      <div id="tabBody" class="tab-body"></div>
    </div>
  </section>
</main>

<script src="js/app.js"></script>
</body>
</html>
