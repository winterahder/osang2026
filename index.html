<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>오상고 상담카드 시스템 2026</title>
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Pretendard','Malgun Gothic',sans-serif;background:#f5f7fa;color:#333;font-size:14px}
#app{display:grid;grid-template-columns:280px 1fr;grid-template-rows:60px 1fr;height:100vh}
header{grid-column:1/-1;background:#fff;border-bottom:1px solid #e1e4e8;display:flex;align-items:center;justify-content:space-between;padding:0 24px;box-shadow:0 1px 3px rgba(0,0,0,.05)}
header h1{font-size:18px;color:#2c3e50}
header h1 .ver{color:#7f8c8d;font-size:13px;margin-left:8px;font-weight:400}
#statusBar{font-size:12px;color:#7f8c8d}
#sidebar{background:#fff;border-right:1px solid #e1e4e8;display:flex;flex-direction:column;overflow:hidden}
.filters{padding:12px;border-bottom:1px solid #e1e4e8;display:flex;flex-direction:column;gap:8px}
.filters input,.filters select{width:100%;padding:8px 10px;border:1px solid #d1d5da;border-radius:6px;font-size:13px;font-family:inherit}
.filter-row{display:flex;gap:6px}
.filter-row select{flex:1}
#studentList{flex:1;overflow-y:auto;padding:4px 0}
.student-item{display:grid;grid-template-columns:48px 1fr 24px;gap:8px;padding:8px 12px;cursor:pointer;border-bottom:1px solid #f0f2f5;align-items:center}
.student-item:hover{background:#f5f7fa}
.student-item.active{background:#e3f2fd;color:#1976d2;font-weight:600}
.student-item .num{color:#95a5a6;font-size:12px;font-family:monospace}
.student-item .sex{font-size:11px;color:#95a5a6;text-align:center}
.student-item .sex.M{color:#3498db}
.student-item .sex.F{color:#e91e63}
#content{overflow-y:auto;padding:20px}
.placeholder{text-align:center;color:#95a5a6;padding:60px 20px;font-size:15px}
.stu-header{background:#fff;border-radius:8px;padding:16px 20px;box-shadow:0 1px 3px rgba(0,0,0,.05);margin-bottom:16px}
.stu-header .name{font-size:20px;font-weight:700;color:#2c3e50}
.stu-header .badges{display:flex;gap:8px;margin-top:10px;flex-wrap:wrap}
.badge{padding:4px 10px;border-radius:12px;font-size:12px;background:#e8f4f8;color:#0277bd}
.badge.sex-M{background:#e3f2fd;color:#1565c0}
.badge.sex-F{background:#fce4ec;color:#c2185b}
.badge.g1{background:#f3e5f5;color:#6a1b9a}
.badge.g2{background:#e8f5e9;color:#2e7d32}
.tabs{background:#fff;border-radius:8px 8px 0 0;display:flex;gap:2px;padding:0 8px;border-bottom:1px solid #e1e4e8;overflow-x:auto}
.tab{padding:12px 18px;cursor:pointer;color:#7f8c8d;font-weight:500;border-bottom:3px solid transparent;white-space:nowrap;font-size:14px}
.tab:hover{color:#2c3e50}
.tab.active{color:#1976d2;border-bottom-color:#1976d2}
.tab-content{background:#fff;border-radius:0 0 8px 8px;padding:20px;min-height:400px;box-shadow:0 1px 3px rgba(0,0,0,.05)}
.info-table{width:100%;border-collapse:collapse}
.info-table tr{border-bottom:1px solid #f0f2f5}
.info-table tr:last-child{border-bottom:none}
.info-table td{padding:12px 16px}
.info-table td:first-child{width:150px;font-weight:600;color:#546e7a;background:#f9fafb}
.mode-buttons{display:flex;gap:6px;margin-bottom:16px}
.mode-btn{padding:6px 14px;border:1px solid #d1d5da;background:#fff;border-radius:6px;cursor:pointer;font-size:13px;font-family:inherit}
.mode-btn.active{background:#1976d2;color:#fff;border-color:#1976d2}
.chart-title{font-size:15px;font-weight:700;color:#2c3e50;margin-bottom:12px;display:flex;align-items:center;gap:6px}
.chart-wrapper{position:relative;height:360px;margin-bottom:20px}
.score-table{width:100%;border-collapse:collapse;font-size:13px;margin-top:10px}
.score-table th,.score-table td{padding:8px 10px;border:1px solid #e1e4e8;text-align:center}
.score-table th{background:#f5f7fa;font-weight:600;color:#546e7a}
.score-table td.round{background:#fafbfc;font-weight:600;color:#1976d2}
.empty{text-align:center;color:#95a5a6;padding:40px;font-size:14px}
</style>
</head>
<body>
<div id="app">
  <header>
    <h1>📋 오상고 상담카드 시스템 <span class="ver">2026</span></h1>
    <div id="statusBar">로딩중...</div>
  </header>
  <aside id="sidebar">
    <div class="filters">
      <input id="searchBox" placeholder="🔎 이름 또는 학번 검색">
      <div class="filter-row">
        <select id="gradeFilter"><option value="">전체 학년</option><option value="1">1학년</option><option value="2">2학년</option><option value="3">3학년</option></select>
        <select id="classFilter"><option value="">전체 반</option></select>
      </div>
    </div>
    <div id="studentList"></div>
  </aside>
  <main id="content">
    <div class="placeholder">👈 왼쪽에서 학생을 선택하세요</div>
  </main>
</div>

<script>
const STATE = { students:[], mock:{}, current:null, mode:'등급', chart:null };
const $ = id => document.getElementById(id);

const ROUND_ORDER = {'g1_3월':1,'g1_6월':2,'g1_9월':3,'g1_11월':4,'g2_3월':5,'g2_6월':6,'g2_9월':7,'g2_11월':8,'g3_3월':9,'g3_6월':10,'g3_9월':11,'g3_11월':12};
const ROUND_LABEL = {'g1_3월':'1학년 3월','g1_6월':'1학년 6월','g1_9월':'1학년 9월','g1_11월':'1학년 11월','g2_3월':'2학년 3월','g2_6월':'2학년 6월','g2_9월':'2학년 9월','g2_11월':'2학년 11월','g3_3월':'3학년 3월','g3_6월':'3학년 6월','g3_9월':'3학년 9월','g3_11월':'3학년 11월'};
const SUBJECTS = ['국어','수학','영어','한국사','탐구1','탐구2'];
const COLORS = {'국어':'#4285f4','수학':'#ea4335','영어':'#34a853','한국사':'#a142f4','탐구1':'#ff6d00','탐구2':'#00acc1'};

function parseHak(hak){
  const s = String(hak).padStart(5,'0');
  return { grade:+s[0], cls:+s.slice(1,3), num:+s.slice(3,5) };
}

async function init(){
  try{
    const [sRes, mRes] = await Promise.all([fetch('data/students.json'), fetch('data/mock.json')]);
    const sData = await sRes.json();
    STATE.mock = await mRes.json();
    let arr = Array.isArray(sData) ? sData : Object.entries(sData).map(([k,v])=>({hak:k,...v}));
    STATE.students = arr.map(s=>{
      const hak = s.hak || s.학번 || s.id;
      const p = parseHak(hak);
      return {
        hak:String(hak),
        name: s.name || s.이름 || s.성명 || '',
        gender: s.gender || s.sex || s.성별 || '',
        grade: s.grade || s.학년 || p.grade,
        cls: s.class || s.cls || s.반 || p.cls,
        num: s.no || s.num || s.번호 || p.num,
        g1_hak: s.g1_hak || s['1학년학번'] || '',
        g2_hak: s.g2_hak || s['2학년학번'] || '',
        g3_hak: s.g3_hak || s['3학년학번'] || ''
      };
    });
    $('statusBar').textContent = `총 ${STATE.students.length}명 로드됨`;
    renderStudentList();
    bindFilters();
  }catch(e){
    $('statusBar').textContent = '오류: '+e.message;
    console.error(e);
  }
}

function bindFilters(){
  $('searchBox').addEventListener('input', renderStudentList);
  $('gradeFilter').addEventListener('change', ()=>{
    updateClassFilter();
    renderStudentList();
  });
  $('classFilter').addEventListener('change', renderStudentList);
}

function updateClassFilter(){
  const g = $('gradeFilter').value;
  const classes = new Set();
  STATE.students.forEach(s=>{
    if(!g || String(s.grade)===g) classes.add(s.cls);
  });
  const sorted = [...classes].sort((a,b)=>a-b);
  $('classFilter').innerHTML = '<option value="">전체 반</option>' + sorted.map(c=>`<option value="${c}">${c}반</option>`).join('');
}

function renderStudentList(){
  const q = $('searchBox').value.trim().toLowerCase();
  const g = $('gradeFilter').value;
  const c = $('classFilter').value;
  const list = STATE.students.filter(s=>{
    if(g && String(s.grade)!==g) return false;
    if(c && String(s.cls)!==c) return false;
    if(q && !s.name.toLowerCase().includes(q) && !s.hak.includes(q)) return false;
    return true;
  });
  const html = list.map(s=>{
    const num = `${String(s.cls).padStart(2,'0')}${String(s.num).padStart(2,'0')}`;
    const sexCls = s.gender==='남'?'M':(s.gender==='여'?'F':'');
    return `<div class="student-item" data-hak="${s.hak}"><span class="num">${num}</span><span class="name">${s.name}</span><span class="sex ${sexCls}">${s.gender||''}</span></div>`;
  }).join('');
  $('studentList').innerHTML = html || '<div class="empty">결과 없음</div>';
  $('studentList').querySelectorAll('.student-item').forEach(el=>{
    el.addEventListener('click', ()=>selectStudent(el.dataset.hak));
  });
}

function selectStudent(hak){
  const s = STATE.students.find(x=>x.hak===hak);
  if(!s) return;
  STATE.current = s;
  document.querySelectorAll('.student-item').forEach(el=>{
    el.classList.toggle('active', el.dataset.hak===hak);
  });
  renderContent();
}

function renderContent(){
  const s = STATE.current;
  if(!s){
    $('content').innerHTML = '<div class="placeholder">👈 왼쪽에서 학생을 선택하세요</div>';
    return;
  }
  const sexCls = s.gender==='남'?'sex-M':(s.gender==='여'?'sex-F':'');
  const badges = [
    `<span class="badge">${s.grade}학년 ${s.cls}반 ${s.num}번</span>`,
    s.gender ? `<span class="badge ${sexCls}">${s.gender}</span>` : '',
    s.g1_hak ? `<span class="badge g1">1학년 학번: ${s.g1_hak}</span>` : '',
    s.g2_hak ? `<span class="badge g2">2학년 학번: ${s.g2_hak}</span>` : ''
  ].filter(Boolean).join('');
  $('content').innerHTML = `
    <div class="stu-header">
      <div class="name">${s.name} <span style="color:#95a5a6;font-size:15px;font-weight:400">(${s.hak})</span></div>
      <div class="badges">${badges}</div>
    </div>
    <div class="tabs" id="tabs">
      <div class="tab active" data-tab="info">기본정보</div>
      <div class="tab" data-tab="mock">모의고사</div>
      <div class="tab" data-tab="grade">내신</div>
      <div class="tab" data-tab="sewtuk">세특</div>
      <div class="tab" data-tab="haengbal">행발</div>
      <div class="tab" data-tab="award">수상</div>
      <div class="tab" data-tab="book">독서</div>
    </div>
    <div class="tab-content" id="tabContent"></div>
  `;
  document.querySelectorAll('#tabs .tab').forEach(t=>{
    t.addEventListener('click', ()=>{
      document.querySelectorAll('#tabs .tab').forEach(x=>x.classList.remove('active'));
      t.classList.add('active');
      renderTab(t.dataset.tab);
    });
  });
  renderTab('info');
}

function renderTab(name){
  const s = STATE.current;
  const box = $('tabContent');
  try{
    if(name==='info') renderInfo(s, box);
    else if(name==='mock') renderMock(s, box);
    else box.innerHTML = `<div class="empty">${name} 탭 — 준비중</div>`;
  }catch(e){
    box.innerHTML = `<div class="empty">오류: ${e.message}</div>`;
    console.error(e);
  }
}

function renderInfo(s, box){
  const labels = {hak:'학번', grade:'학년', cls:'반', num:'번호', name:'이름', gender:'성별', g1_hak:'1학년 학번', g2_hak:'2학년 학번', g3_hak:'3학년 학번'};
  const order = ['hak','grade','cls','num','name','gender','g1_hak','g2_hak','g3_hak'];
  const rows = order.filter(k=>s[k]).map(k=>`<tr><td>${labels[k]}</td><td>${s[k]}</td></tr>`).join('');
  box.innerHTML = `<table class="info-table"><tbody>${rows}</tbody></table>`;
}

function getMockData(s){
  const keys = [s.hak, Number(s.hak), s.g1_hak, s.g2_hak, s.g3_hak].filter(Boolean);
  for(const k of keys){
    const v = STATE.mock[k];
    if(v && Array.isArray(v) && v.length) return v;
  }
  return null;
}

function renderMock(s, box){
  const data = getMockData(s);
  box.innerHTML = `
    <div class="mode-buttons">
      ${['등급','백분위','표준점수','원점수'].map(m=>`<button class="mode-btn ${m===STATE.mode?'active':''}" data-mode="${m}">${m}</button>`).join('')}
    </div>
    <div class="chart-title">📈 ${STATE.mode} 추이</div>
    <div class="chart-wrapper"><canvas id="mockChart"></canvas></div>
    <div class="chart-title">📊 회차별 세부 성적</div>
    <div id="scoreTable"></div>
  `;
  box.querySelectorAll('.mode-btn').forEach(b=>{
    b.addEventListener('click', ()=>{ STATE.mode = b.dataset.mode; renderMock(s, box); });
  });
  if(!data){
    $('scoreTable').innerHTML = '<div class="empty">📊 모의고사 데이터가 없습니다.</div>';
    return;
  }
  const sorted = [...data].sort((a,b)=>(ROUND_ORDER[a.round]||99)-(ROUND_ORDER[b.round]||99));
  drawChart(sorted);
  drawTable(sorted);
}

function getFieldValue(r, subj, mode){
  const v = r[subj];
  if(!v) return null;
  if(mode==='등급') return v.등급 ?? null;
  if(mode==='백분위'){
    if(subj==='영어'||subj==='한국사') return v.등급 ?? null;
    return v.백분위 ?? null;
  }
  if(mode==='표준점수'){
    if(subj==='영어'||subj==='한국사') return v.등급 ?? null;
    return v.표준점수 ?? null;
  }
  if(mode==='원점수') return v.원점수 ?? null;
  return null;
}

function drawChart(data){
  if(STATE.chart){ STATE.chart.destroy(); STATE.chart=null; }
  const labels = data.map(r=>ROUND_LABEL[r.round]||r.round);
  const datasets = SUBJECTS.map(subj=>({
    label: subj,
    data: data.map(r=>getFieldValue(r, subj, STATE.mode)),
    borderColor: COLORS[subj],
    backgroundColor: COLORS[subj],
    tension: 0.2,
    spanGaps: true
  }));

  const mode = STATE.mode;
  let yConfig;
  if(mode==='등급'){
    yConfig = {
      reverse: true, min: 0.5, max: 9.5,
      title: {display:true, text:'등급', font:{weight:'bold'}},
      ticks: { stepSize:1, callback:v=>Number.isInteger(v)?v:'' },
      afterBuildTicks: axis=>{ axis.ticks = [1,2,3,4,5,6,7,8,9].map(v=>({value:v})); }
    };
  } else if(mode==='백분위' || mode==='원점수'){
    yConfig = {
      min:0, max:100,
      title:{display:true, text:mode, font:{weight:'bold'}},
      ticks:{stepSize:10}
    };
  } else {
    yConfig = {
      min:0, max:200,
      title:{display:true, text:'표준점수', font:{weight:'bold'}},
      ticks:{stepSize:20}
    };
  }

  STATE.chart = new Chart($('mockChart'), {
    type:'line',
    data: {labels, datasets},
    options: {
      responsive:true, maintainAspectRatio:false,
      interaction:{mode:'index', intersect:false},
      scales:{y: yConfig},
      plugins:{legend:{position:'bottom'}}
    }
  });
}

function drawTable(data){
  const rows = data.map(r=>{
    const cells = SUBJECTS.map(subj=>{
      const v = r[subj];
      if(!v) return '<td>-</td>';
      let val = getFieldValue(r, subj, STATE.mode);
      if(val==null) return '<td>-</td>';
      const suffix = STATE.mode==='등급' ? '등급' : (STATE.mode==='백분위' ? '' : '');
      return `<td>${val}${suffix}</td>`;
    }).join('');
    return `<tr><td class="round">${ROUND_LABEL[r.round]||r.round}</td>${cells}</tr>`;
  }).join('');
  $('scoreTable').innerHTML = `
    <table class="score-table">
      <thead><tr><th>회차</th>${SUBJECTS.map(s=>`<th>${s}</th>`).join('')}</tr></thead>
      <tbody>${rows}</tbody>
    </table>
  `;
}

init();
</script>
</body>
</html>
