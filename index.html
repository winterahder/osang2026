<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<title>오상고 상담카드 시스템 2026</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>📘</text></svg>">
<link rel="stylesheet" href="css/styles.css">
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>
<body>
<header class="topbar">
  <h1>📘 오상고 상담카드 시스템 <small>2026</small></h1>
  <div id="status" class="status">로딩 중...</div>
</header>

<div class="layout">
  <aside class="sidebar">
    <div class="filters">
      <input type="text" id="searchInput" placeholder="🔍 이름 또는 학번 검색">
      <div class="filter-row">
        <select id="gradeFilter">
          <option value="all">학년 전체</option>
          <option value="1">1학년</option>
          <option value="2">2학년</option>
          <option value="3">3학년</option>
        </select>
        <select id="classFilter" style="display:none">
          <option value="all">반 전체</option>
        </select>
      </div>
    </div>
    <div class="student-count" id="studentCount"></div>
    <ul id="studentList" class="student-list"></ul>
  </aside>

  <main class="main">
    <div id="errorBox" class="error-box" style="display:none"></div>
    <div id="studentInfo" class="student-info">
      <div class="empty-msg">← 좌측에서 학생을 선택하세요</div>
    </div>

    <div class="tabs" id="tabs" style="display:none">
      <button class="tab active" data-tab="basic">기본정보</button>
      <button class="tab" data-tab="grades">내신</button>
      <button class="tab" data-tab="mock">모의고사</button>
      <button class="tab" data-tab="award">수상</button>
      <button class="tab" data-tab="autonomy">자율</button>
      <button class="tab" data-tab="club">동아리</button>
      <button class="tab" data-tab="volunteer">봉사</button>
      <button class="tab" data-tab="career">진로</button>
      <button class="tab" data-tab="reading">독서</button>
      <button class="tab" data-tab="sewtuk">세특</button>
      <button class="tab" data-tab="behavior">행발</button>
      <button class="tab" data-tab="attendance">출결</button>
      <button class="tab" data-tab="applications">지원대학</button>
      <button class="tab" data-tab="checklist">체크리스트</button>
    </div>

    <div id="tabContent" class="tab-content"></div>
  </main>
</div>

<script src="js/app.js"></script>
</body>
</html>
