<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>오상고 상담카드 시스템 2026</title>
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
<script src="https://accounts.google.com/gsi/client" async defer></script>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: 'Pretendard', -apple-system, sans-serif; background: #f5f6fa; color: #222; font-size: 14px; }
  /* ===== 구글 로그인 화면 ===== */
  #lockScreen { position: fixed; inset: 0; background: linear-gradient(135deg, #1e3a8a 0%, #1e40af 50%, #2563eb 100%); display: flex; align-items: center; justify-content: center; z-index: 9999; }
  #lockScreen.hidden { display: none; }
  .lock-box { background: #fff; border-radius: 16px; padding: 40px 44px; width: 360px; text-align: center; box-shadow: 0 25px 60px rgba(0,0,0,0.35); }
  .lock-box .lock-icon { font-size: 48px; margin-bottom: 12px; }
  .lock-box h2 { font-size: 18px; color: #1e293b; margin-bottom: 4px; }
  .lock-box p { font-size: 13px; color: #64748b; margin-bottom: 24px; }
  .lock-error { color: #ef4444; font-size: 13px; margin-top: 10px; min-height: 20px; }
  .lock-spinner { display: none; align-items: center; justify-content: center; gap: 10px; color: #2563eb; font-size: 13px; margin-top: 10px; }
  .lock-spinner.show { display: flex; }
  .ls-spin { width: 18px; height: 18px; border: 3px solid #dbeafe; border-top-color: #2563eb; border-radius: 50%; animation: kp-spin 0.75s linear infinite; }
  .google-btn { display: flex; align-items: center; justify-content: center; gap: 12px; width: 100%; padding: 12px 16px; background: #fff; color: #3c4043; border: 2px solid #e2e8f0; border-radius: 8px; font-size: 15px; font-weight: 600; cursor: pointer; transition: all 0.2s; box-shadow: 0 1px 4px rgba(0,0,0,0.1); }
  .google-btn:hover { background: #f8faff; border-color: #2563eb; box-shadow: 0 2px 8px rgba(37,99,235,0.15); }
  .google-btn svg { flex-shrink: 0; }
  .pending-box { background: #fefce8; border: 1px solid #fde68a; border-radius: 10px; padding: 16px; margin-top: 16px; font-size: 13px; color: #92400e; line-height: 1.6; }
  .logout-btn { background: none; border: 1px solid #e2e8f0; border-radius: 6px; padding: 5px 10px; font-size: 12px; color: #64748b; cursor: pointer; white-space: nowrap; flex-shrink: 0; }
  .logout-btn:hover { background: #f1f5f9; }
  header { background: #fff; padding: 14px 24px; border-bottom: 1px solid #e5e7eb; display: flex; justify-content: space-between; align-items: center; }
  header h1 { font-size: 18px; display: flex; align-items: center; gap: 8px; }
  header h1 span.year { color: #94a3b8; font-weight: 400; font-size: 14px; margin-left: 4px; }
  #status { color: #64748b; font-size: 13px; display: flex; align-items: center; gap: 10px; flex-shrink: 0; }
  .layout { display: grid; grid-template-columns: 260px 1fr; gap: 16px; padding: 16px; height: calc(100vh - 60px); overflow: hidden; }
  aside { background: #fff; border-radius: 8px; padding: 12px; overflow: hidden; display: flex; flex-direction: column; }
  aside input, aside select { width: 100%; padding: 8px 10px; border: 1px solid #e2e8f0; border-radius: 6px; font-size: 13px; margin-bottom: 6px; }
  aside .filters { display: grid; grid-template-columns: 1fr 1fr; gap: 6px; margin-bottom: 8px; }
  .stu-list { flex: 1; overflow-y: auto; margin-top: 6px; }
  .stu-item { display: grid; grid-template-columns: 55px 1fr; gap: 8px; padding: 7px 8px; border-radius: 6px; cursor: pointer; font-size: 13px; align-items: center; }
  .stu-item:hover { background: #f1f5f9; }
  .stu-item.active { background: #dbeafe; color: #1e40af; font-weight: 600; }
  .stu-item .hak { color: #64748b; font-variant-numeric: tabular-nums; }
  .stu-item.active .hak { color: #1e40af; }
  main { background: transparent; overflow-y: auto; display: flex; flex-direction: column; gap: 12px; min-height: 0; }
  .card { background: #fff; border-radius: 8px; padding: 18px 22px; }
  .stu-header h2 { font-size: 20px; margin-bottom: 8px; }
  .badges { display: flex; gap: 6px; flex-wrap: wrap; }
  .badge { padding: 4px 10px; background: #eff6ff; color: #1e40af; border-radius: 12px; font-size: 12px; }
  .badge.gender-m { background: #dbeafe; color: #1e40af; }
  .badge.gender-f { background: #fce7f3; color: #9f1239; }
  .tabs { display: flex; gap: 4px; border-bottom: 1px solid #e5e7eb; padding: 0 12px; background: #fff; border-radius: 8px 8px 0 0; }
  .tab { padding: 12px 18px; cursor: pointer; font-size: 14px; color: #64748b; border-bottom: 2px solid transparent; }
  .tab.active { color: #2563eb; border-bottom-color: #2563eb; font-weight: 600; background: #eff6ff; border-radius: 6px 6px 0 0; }
  .tab-content { background: #fff; border-radius: 0 0 8px 8px; padding: 20px; }
  .placeholder { text-align: center; color: #94a3b8; padding: 80px 0; font-size: 15px; }
  table.info { width: 100%; border-collapse: collapse; }
  table.info td { padding: 10px 12px; border-bottom: 1px solid #f1f5f9; }
  table.info td:first-child { width: 180px; background: #f8fafc; font-weight: 600; color: #475569; }
  .toggle-group { display: flex; gap: 4px; margin-bottom: 14px; flex-wrap: wrap; }
  .toggle-btn { padding: 6px 14px; border: 1px solid #cbd5e1; background: #fff; border-radius: 6px; cursor: pointer; font-size: 13px; }
  .toggle-btn.active { background: #2563eb; color: #fff; border-color: #2563eb; }
  .chart-wrap { position: relative; height: 340px; margin-bottom: 18px; }
  table.mock, table.grade { width: 100%; border-collapse: collapse; font-size: 13px; }
  table.mock th, table.mock td, table.grade th, table.grade td { padding: 8px 10px; border-bottom: 1px solid #f1f5f9; text-align: center; }
  table.mock th, table.grade th { background: #f8fafc; font-weight: 600; color: #475569; }
  table.grade td.subj { text-align: left; font-weight: 500; }
  table.grade td.grade-1 { color: #1e40af; font-weight: 700; }
  table.grade td.grade-2 { color: #2563eb; font-weight: 600; }
  table.grade td.grade-3 { color: #10b981; font-weight: 500; }
  table.grade td.grade-4 { color: #059669; }
  table.grade td.grade-5 { color: #64748b; }
  table.grade td.grade-6 { color: #d97706; }
  table.grade td.grade-7, table.grade td.grade-8, table.grade td.grade-9 { color: #dc2626; font-weight: 600; }
  table.mock td.grade-1 { color: #2563eb; font-weight: 700; }
  table.mock td.grade-2 { color: #2563eb; }
  table.mock td.grade-9 { color: #dc2626; font-weight: 700; }
  table.mock td.grade-8 { color: #dc2626; }
  table.mock td.big { font-size: 15px; font-weight: 600; padding: 6px; }
  table.mock td.bg-1 { background: #1e40af; color: #fff; }
  table.mock td.bg-2 { background: #3b82f6; color: #fff; }
  table.mock td.bg-3 { background: #60a5fa; color: #fff; }
  table.mock td.bg-4 { background: #93c5fd; }
  table.mock td.bg-5 { background: #fde68a; }
  table.mock td.bg-6 { background: #fdba74; }
  table.mock td.bg-7 { background: #fb923c; color: #fff; }
  table.mock td.bg-8 { background: #ef4444; color: #fff; }
  table.mock td.bg-9 { background: #991b1b; color: #fff; }
  /* 히트맵: 배경 없이 숫자에 작은 박스 뱃지만 적용 */
  .heat-badge { display:inline-block; padding:2px 8px; border-radius:5px; font-weight:700; line-height:1.4; }
  .heat-badge.heat-1 { background:#dbeafe; color:#1e3a8a; }
  .heat-badge.heat-2 { background:#bfdbfe; color:#1e40af; }
  .heat-badge.heat-3 { background:#e0f2fe; color:#0369a1; }
  .heat-badge.heat-4 { background:#f0fdf4; color:#166534; }
  .heat-badge.heat-5 { background:#fefce8; color:#854d0e; }
  .heat-badge.heat-6 { background:#fff7ed; color:#9a3412; }
  .heat-badge.heat-7 { background:#fef2f2; color:#991b1b; }
  .heat-badge.heat-8 { background:#fee2e2; color:#7f1d1d; font-weight:800; }
  .heat-badge.heat-9 { background:#fecaca; color:#7f1d1d; font-weight:800; }
  .semester-block { margin-bottom: 24px; }
  .semester-title { font-size: 15px; font-weight: 700; color: #1e293b; margin-bottom: 10px; padding: 8px 12px; background: #f1f5f9; border-left: 4px solid #2563eb; border-radius: 4px; }
  /* ===== 내신 요약 패널 ===== */
  .grade-summary-panel { display: grid; grid-template-columns: 210px 1fr; gap: 16px; margin-bottom: 20px; align-items: stretch; }
  .grade-stats { display: flex; flex-direction: column; gap: 10px; }
  .grade-avg-big { background: linear-gradient(145deg, #eff6ff 0%, #dbeafe 100%); border: 1.5px solid #93c5fd; border-radius: 14px; padding: 22px 16px 18px; text-align: center; flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: center; }
  .grade-avg-big.is9 { background: linear-gradient(145deg, #faf5ff 0%, #f3e8ff 100%); border-color: #c084fc; }
  .grade-avg-big .avg-label { font-size: 12px; color: #64748b; margin-bottom: 6px; font-weight: 500; }
  .grade-avg-big .avg-val { font-size: 58px; font-weight: 800; color: #1e40af; line-height: 1; letter-spacing: -2px; }
  .grade-avg-big.is9 .avg-val { color: #9333ea; }
  .grade-avg-big .avg-filter { font-size: 11px; color: #94a3b8; margin-top: 8px; }
  .grade-stat-row { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; }
  .grade-stat-card { background: #fff; border: 1px solid #e2e8f0; border-radius: 10px; padding: 12px 10px; text-align: center; }
  .grade-stat-card .sc-label { font-size: 11px; color: #94a3b8; margin-bottom: 4px; }
  .grade-stat-card .sc-val { font-size: 22px; font-weight: 700; color: #334155; }
  .grade-chart-panel { background: #fff; border: 1px solid #e2e8f0; border-radius: 14px; padding: 16px 18px; display: flex; flex-direction: column; }
  .grade-chart-title { font-size: 13px; font-weight: 600; color: #475569; margin-bottom: 12px; display: flex; align-items: center; gap: 6px; }
  .grade-chart-wrap { position: relative; flex: 1; min-height: 160px; }
  .summary-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(140px, 1fr)); gap: 10px; margin: 10px 0 14px; }
  .summary-card { background: #fff; border: 1px solid #e2e8f0; border-radius: 8px; padding: 10px 14px; text-align: center; }
  .summary-card .label { color: #64748b; font-size: 12px; margin-bottom: 4px; }
  .summary-card .value { font-size: 20px; font-weight: 700; color: #1e40af; }
  .summary-card.highlight { background: linear-gradient(135deg, #eff6ff, #dbeafe); border-color: #93c5fd; }
  .summary-card.est { background: linear-gradient(135deg, #faf5ff, #f3e8ff); border-color: #c084fc; }
  .summary-card.est .value { color: #a855f7; }
  .filter-label { display: inline-block; margin-right: 8px; font-weight: 600; color: #475569; font-size: 13px; }
  .no-data { padding: 40px; text-align: center; color: #94a3b8; background: #f8fafc; border-radius: 8px; }
  .filter-row { display: flex; align-items: center; gap: 8px; margin-bottom: 10px; flex-wrap: wrap; }
  /* ===== 아코디언 ===== */
  .accordion { border: 1px solid #e2e8f0; border-radius: 10px; margin-bottom: 10px; overflow: hidden; background: #fff; box-shadow: 0 1px 3px rgba(0,0,0,.04); }
  .accordion-head { padding: 14px 16px; cursor: pointer; display: flex; align-items: stretch; gap: 0; transition: background 0.15s; }
  .accordion-head:hover { background: #f8fafc; }
  .accordion.open .accordion-head { background: #eff6ff; border-bottom: 1px solid #dbeafe; }

  /* 왼쪽: 요약 영역 */
  .acc-left { flex: 1; min-width: 0; display: flex; flex-direction: column; gap: 4px; padding-right: 12px; max-width: 50%; }
  .acc-top-row { display: flex; align-items: center; gap: 8px; flex-wrap: wrap; margin-bottom: 2px; }
  .accordion-title .sub-cat { padding: 3px 9px; background: #e0f2fe; color: #0369a1; border-radius: 12px; font-size: 12px; font-weight: 700; flex-shrink: 0; }
  .accordion-title .sub-name { font-weight: 700; color: #1e293b; font-size: 15px; flex-shrink: 0; }

  /* 필터 — 세로 단독 배치 */
  .sewtuk-top-wrap { display: flex; flex-direction: column; gap: 14px; margin-bottom: 14px; }
  .sewtuk-filters { display: flex; flex-direction: column; gap: 0; }

  /* 종합 평가 패널 */
  .overall-eval-panel { background: #fff; border: 1px solid #e2e8f0; border-radius: 14px; padding: 18px 20px; box-shadow: 0 2px 8px rgba(0,0,0,.06); }
  .overall-eval-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 14px; }
  .overall-eval-header-title { font-size: 15px; font-weight: 800; color: #1e293b; display: flex; align-items: center; gap: 6px; }
  .overall-eval-scope { font-size: 12px; color: #94a3b8; font-weight: 500; background: #f1f5f9; padding: 3px 10px; border-radius: 20px; }
  .overall-eval-grid { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 12px; align-items: stretch; }

  /* 역량 카드 — 등급별 배경색 */
  .overall-eval-group { display: flex; flex-direction: column; border-radius: 12px; overflow: hidden; box-shadow: 0 2px 8px rgba(0,0,0,.08); transition: box-shadow .2s; border: none; }
  .overall-eval-group:hover { box-shadow: 0 6px 18px rgba(0,0,0,.15); }
  .og-S { background: #ede9fe; } .og-A { background: #e0f2fe; } .og-B { background: #dcfce7; }
  .og-C { background: #fef9c3; } .og-D { background: #fee2e2; } .og-X { background: #f1f5f9; }
  .overall-group-header { padding: 10px 14px 8px; border-bottom: 1px solid rgba(0,0,0,.06); }
  .overall-group-label { font-size: 12px; font-weight: 700; color: #475569; letter-spacing: 0.3px; }
  .overall-group-body { display: flex; align-items: center; gap: 0; padding: 12px 14px 14px; flex: 1; }
  .overall-group-grade { font-size: 40px; font-weight: 900; line-height: 1; letter-spacing: -1px; flex: 0 0 38%; text-align: center; }
  .overall-sub-list { flex: 1; display: flex; flex-direction: column; gap: 5px; align-items: flex-end; }
  .overall-sub-row { display: flex; align-items: center; gap: 8px; font-size: 13px; }
  .overall-sub-name { color: #475569; font-weight: 500; }
  .overall-sub-grade { font-weight: 800; font-size: 14px; min-width: 14px; text-align: right; }

  /* 근거 토글 */
  .overall-reason-bar { font-size: 12px; color: #334155; line-height: 1.7; display: none; padding: 10px 14px; background: rgba(0,0,0,.06); border-top: 1px solid rgba(0,0,0,.06); }
  .overall-reason-toggle-row { display: flex; align-items: center; justify-content: center; gap: 5px; margin-top: 10px; cursor: pointer; color: #64748b; font-size: 12px; font-weight: 600; user-select: none; padding: 6px 16px; border-radius: 20px; border: 1px solid #e2e8f0; width: fit-content; margin-left: auto; margin-right: auto; transition: all .15s; background: #fff; }
  .overall-reason-toggle-row:hover { background: #f1f5f9; color: #334155; border-color: #cbd5e1; }
  .overall-eval-empty { display: flex; align-items: center; justify-content: center; min-height: 80px; color: #cbd5e1; font-size: 16px; text-align: center; padding: 20px; }
  /* 역량 레이더 차트 */
  .radar-card {
    background: #fff;
    border: 1px solid #e8edf5;
    border-radius: 20px;
    padding: 28px 32px 24px;
    margin-bottom: 20px;
    box-shadow: 0 2px 12px rgba(15,23,42,.06);
    overflow: hidden;
    position: relative;
  }
  .radar-card::before {
    content: '';
    position: absolute; inset: 0;
    background: linear-gradient(135deg, rgba(99,102,241,.03) 0%, rgba(16,185,129,.02) 50%, rgba(245,158,11,.02) 100%);
    pointer-events: none;
  }
  .radar-card-header {
    display: flex; align-items: center; justify-content: space-between;
    margin-bottom: 24px;
  }
  .radar-card-title {
    font-size: 15px; font-weight: 800; color: #1e293b;
    display: flex; align-items: center; gap: 8px;
  }
  .radar-card-title-dot {
    width: 8px; height: 8px; border-radius: 50%;
    background: linear-gradient(135deg, #6366f1, #8b5cf6);
    box-shadow: 0 0 0 3px rgba(99,102,241,.15);
  }
  .radar-card-badge {
    font-size: 11px; font-weight: 600; color: #6366f1;
    background: #ede9fe; padding: 3px 10px; border-radius: 20px;
    letter-spacing: .03em;
  }
  .radar-body {
    display: grid; grid-template-columns: 360px 1fr;
    gap: 36px; align-items: center;
  }
  .radar-canvas-box { position: relative; width: 360px; height: 360px; }
  .radar-stats { display: flex; flex-direction: column; gap: 12px; }

  .radar-stat-card {
    background: #fafbff;
    border-radius: 16px; padding: 16px 20px;
    border: 1.5px solid #eef0f8;
    display: flex; align-items: center; gap: 16px;
    transition: all .2s cubic-bezier(.34,1.56,.64,1);
    cursor: default; position: relative; overflow: hidden;
  }
  .radar-stat-card::after {
    content: ''; position: absolute; left: 0; top: 0; bottom: 0;
    width: 4px; border-radius: 0 2px 2px 0;
    opacity: 0; transition: opacity .2s;
  }
  .radar-stat-card:hover { transform: translateX(4px); box-shadow: 0 6px 24px rgba(0,0,0,.08); }
  .radar-stat-card:hover::after { opacity: 1; }
  .radar-stat-card.grp-학업역량::after { background: #6366f1; }
  .radar-stat-card.grp-진로역량::after { background: #f59e0b; }
  .radar-stat-card.grp-공동체역량::after { background: #10b981; }

  .radar-stat-icon {
    width: 44px; height: 44px; border-radius: 12px;
    display: flex; align-items: center; justify-content: center;
    font-size: 20px; flex-shrink: 0;
  }
  .radar-stat-info { flex: 1; min-width: 0; }
  .radar-stat-name {
    font-size: 14px; font-weight: 700; color: #1e293b; margin-bottom: 5px;
    display: flex; align-items: center; gap: 6px;
  }
  .radar-stat-bar {
    height: 4px; background: #f1f5f9; border-radius: 2px;
    margin-bottom: 6px; overflow: hidden;
  }
  .radar-stat-bar-fill {
    height: 100%; border-radius: 2px;
    transition: width .6s cubic-bezier(.34,1.56,.64,1);
  }
  .radar-stat-subs { font-size: 11.5px; color: #94a3b8; line-height: 1.7; display: flex; flex-wrap: wrap; gap: 0 10px; }
  .radar-stat-subs b { font-weight: 700; }
  .radar-stat-right { display: flex; flex-direction: column; align-items: flex-end; gap: 2px; flex-shrink: 0; }
  .radar-stat-grade {
    font-size: 36px; font-weight: 900; line-height: 1;
    letter-spacing: -2px;
  }
  .radar-stat-grade-label { font-size: 10px; font-weight: 600; color: #cbd5e1; letter-spacing: .04em; }
  .radar-hint {
    font-size: 11px; color: #cbd5e1; margin-top: 8px; text-align: right;
    display: flex; align-items: center; justify-content: flex-end; gap: 4px;
  }
  .radar-hint-grade {
    display: inline-flex; align-items: center; justify-content: center;
    width: 18px; height: 18px; border-radius: 4px;
    font-size: 10px; font-weight: 800;
  }

  /* ① 종합 점수 게이지 */
  .eval-score-section {
    display: flex; align-items: center; gap: 24px;
    background: #fff; border: 1px solid #e8edf5; border-radius: 16px;
    padding: 22px 28px; margin-bottom: 14px;
    box-shadow: 0 2px 8px rgba(15,23,42,.05);
  }
  .eval-score-circle {
    position: relative; width: 110px; height: 110px; flex-shrink: 0;
  }
  .eval-score-circle svg { transform: rotate(-90deg); }
  .eval-score-circle-bg { fill: none; stroke: #f1f5f9; stroke-width: 9; }
  .eval-score-circle-fill { fill: none; stroke-width: 9; stroke-linecap: round; transition: stroke-dashoffset .8s cubic-bezier(.34,1.2,.64,1); }
  .eval-score-inner {
    position: absolute; inset: 0; display: flex; flex-direction: column;
    align-items: center; justify-content: center;
  }
  .eval-score-num { font-size: 28px; font-weight: 900; line-height: 1; letter-spacing: -1px; }
  .eval-score-label { font-size: 10px; color: #94a3b8; font-weight: 600; margin-top: 2px; }
  .eval-score-info { flex: 1; min-width: 0; }
  .eval-score-title {
    font-size: 14px; font-weight: 800; color: #1e293b;
    margin-bottom: 12px; display: flex; align-items: center; gap: 8px; flex-wrap: wrap;
  }
  .eval-score-bars { display: flex; flex-direction: column; gap: 8px; }
  .eval-score-bar-row { display: flex; align-items: center; gap: 10px; }
  .eval-score-bar-label {
    font-size: 11.5px; color: #64748b; font-weight: 600;
    width: 62px; flex-shrink: 0; white-space: nowrap;
    overflow: hidden; text-overflow: ellipsis;
  }
  .eval-score-bar-track { flex: 1; height: 8px; background: #f1f5f9; border-radius: 4px; overflow: hidden; }
  .eval-score-bar-fill { height: 100%; border-radius: 4px; transition: width .7s cubic-bezier(.34,1.2,.64,1); }
  .eval-score-bar-val { font-size: 13px; font-weight: 900; width: 20px; text-align: right; flex-shrink: 0; }
  .eval-score-grade-tag {
    display: inline-flex; align-items: center; gap: 4px;
    padding: 3px 10px; border-radius: 20px; font-size: 11px; font-weight: 700;
  }

  /* ② 강점/보완점 카드 */
  .eval-swot-section {
    display: grid; grid-template-columns: 1fr 1fr; gap: 12px;
    margin-bottom: 14px;

    border-radius: 14px; padding: 18px 20px; border: 1.5px solid;
    position: relative; overflow: hidden;
  }

    content: ''; position: absolute; top: -24px; right: -24px;
    width: 90px; height: 90px; border-radius: 50%; opacity: .08;
  }
  .eval-swot-card.strength { background: #f0fdf4; border-color: #86efac; }
  .eval-swot-card.strength::before { background: #16a34a; }
  .eval-swot-card.weakness { background: #fff7ed; border-color: #fdba74; }
  .eval-swot-card.weakness::before { background: #ea580c; }
  .eval-swot-title { font-size: 13px; font-weight: 800; margin-bottom: 12px; display: flex; align-items: center; gap: 6px; }
  .eval-swot-item {

  .eval-swot-summary {
    grid-column: 1 / -1; background: #f8fafc; border: 1px solid #e2e8f0;
    border-radius: 10px; padding: 10px 16px; font-size: 12.5px; color: #475569;
    display: flex; align-items: center; gap: 8px;
  }

  /* ③ 내신 연동 배지 */
  .grade-link-badge {
    display: inline-flex; align-items: center; gap: 5px;
    font-size: 11px; font-weight: 700; padding: 3px 9px; border-radius: 6px;
  }

  /* ④ 역량 추이 타임라인 */
  .eval-trend-section {
    background: #fff; border: 1px solid #e8edf5; border-radius: 16px;

    font-size: 13px; font-weight: 800; color: #1e293b; margin-bottom: 16px;

    transition: background .12s;

  .eval-trend-item-grade { font-size: 16px; font-weight: 900; }
  .eval-trend-arrow { display: flex; align-items: center; justify-content: center; color: #cbd5e1; font-size: 20px; padding: 0 4px; flex-shrink: 0; align-self: center; padding-bottom: 20px; }
  .eval-trend-change { font-size: 10px; font-weight: 700; padding: 2px 7px; border-radius: 20px; white-space: nowrap; }
  .eval-trend-change.up   { background: #dcfce7; color: #16a34a; }
  .eval-trend-change.down { background: #fee2e2; color: #dc2626; }
  .eval-trend-change.same { background: #f1f5f9; color: #94a3b8; }

  /* 모의지원 탭 */
  .apply-wrap { padding: 20px; max-width: 900px; }

  .apply-section { margin-bottom: 14px; }

  .apply-spinner{display:inline-block;width:14px;height:14px;border:2px solid rgba(255,255,255,.4);border-top-color:#fff;border-radius:50%;animation:apply-spin .7s linear infinite;vertical-align:middle;margin-right:6px;}

  /* ===== 인쇄 스타일 ===== */
  @media print {
    body * { visibility: hidden; }

      position: fixed; inset: 0;

  .apply-history-item:hover { background: #f1f5f9; color: #6366f1; }

  .status-badge { padding: 2px 8px; border-radius: 10px; font-size: 11px; font-weight: 600; }
  .sb-done   { background: rgba(16,185,129,.15); color: #10b981; border: 1px solid rgba(16,185,129,.3); }
  .sb-none   { background: rgba(148,163,184,.1);  color: #94a3b8;  border: 1px solid #e2e8f0; }

  /* 요약 텍스트 */
  .sewtuk-summary { color: #475569; font-size: 13.5px; line-height: 1.7; padding: 2px 0; display: flex; align-items: flex-start; gap: 8px; }
  .sewtuk-summary .sum-bullet { flex-shrink: 0; background: #dbeafe; color: #1e40af; border-radius: 4px; padding: 1px 7px; font-size: 12px; font-weight: 700; margin-top: 2px; }
  .accordion.open .sewtuk-summary { color: #1e3a8a; }
  .accordion.open .sewtuk-summary .sum-bullet { background: #bfdbfe; }

  /* 오른쪽: 평가 패널 — 50% */
  .acc-right { flex: 1; border-left: 1px solid #e2e8f0; padding: 8px 12px; display: flex; align-items: center; }
  .eval-panel { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 8px; width: 100%; }
  .eval-panel-group { display: flex; flex-direction: row; justify-content: space-between; align-items: center; padding: 8px 12px; border-radius: 8px; background: #f8fafc; border: 1px solid #e2e8f0; gap: 8px; }
  .eval-panel-left { display: flex; flex-direction: column; align-items: flex-start; gap: 2px; }
  .eval-panel-label { font-size: 11px; color: #64748b; font-weight: 700; }
  .eval-panel-grade { font-size: 30px; font-weight: 900; line-height: 1; }
  .eval-panel-subs { display: flex; flex-direction: column; gap: 3px; align-items: flex-end; }
  .eval-sub-item { font-size: 11px; color: #64748b; display: flex; align-items: center; gap: 6px; }
  .eval-sub-grade { font-weight: 800; font-size: 12px; min-width: 12px; text-align: right; }

  /* 펼친 상태: 세부 지표 (한 줄 표시) */
  .eval-detail-section { padding: 12px 22px 14px; background: #f8fafc; border-top: 1px solid #e2e8f0; display: flex; gap: 20px; flex-wrap: wrap; }
  .eval-detail-group { flex: 1; min-width: 180px; }
  .eval-detail-group-label { font-size: 13px; font-weight: 700; color: #94a3b8; margin-bottom: 6px; text-transform: uppercase; letter-spacing: 0.5px; }
  .eval-detail-item { display: flex; align-items: baseline; gap: 5px; padding: 4px 0; border-bottom: 1px solid #f1f5f9; }
  .eval-detail-name { font-size: 14px; color: #475569; font-weight: 600; width: 68px; flex-shrink: 0; }
  .eval-detail-grade { font-size: 14px; font-weight: 800; flex-shrink: 0; width: 18px; }
  .eval-detail-comment { font-size: 13px; color: #94a3b8; flex: 1; line-height: 1.4; }

  /* 등급 색상 */
  .g-S { color: #6366f1; } .g-A { color: #10b981; } .g-B { color: #06b6d4; }
  .g-C { color: #f59e0b; } .g-D { color: #ef4444; }

  .accordion-head .arrow { color: #94a3b8; font-size: 12px; transition: transform 0.2s; align-self: center; margin-left: 8px; flex-shrink: 0; }
  .accordion.open .arrow { transform: rotate(90deg); color: #2563eb; }
  .accordion-body { padding: 16px 20px; background: #fafbfc; border-top: 1px solid #f1f5f9; line-height: 1.8; font-size: 14px; color: #334155; display: none; white-space: pre-wrap; word-break: keep-all; }
  .accordion.open .accordion-body { display: block; }
  .scale-btn { margin-left: 12px; border: 1px solid #a855f7 !important; color: #a855f7; background: #fff; }
  .scale-btn.active { background: #a855f7 !important; color: #fff !important; border-color: #a855f7 !important; }
  .rank-btn { margin-left: 4px; border: 1px solid #10b981 !important; color: #10b981; background: #fff; }
  .rank-btn.active { background: #10b981 !important; color: #fff !important; border-color: #10b981 !important; }
  .grade-stat-card.rank-card { background: linear-gradient(135deg, #f0fdf4, #dcfce7); border-color: #86efac; grid-column: 1 / -1; display: flex; align-items: center; justify-content: space-between; padding: 10px 16px; }
  .grade-stat-card.rank-card .sc-label { text-align: left; font-size: 12px; color: #16a34a; font-weight: 600; }
  .grade-stat-card.rank-card .rank-val { font-size: 22px; font-weight: 800; color: #15803d; }
  .grade-stat-card.rank-card .rank-sub { font-size: 12px; color: #4ade80; margin-left: 4px; font-weight: 500; }
  .grade-stat-card.rank-card .rank-right { display: flex; align-items: baseline; gap: 2px; }
  .est-info { background: linear-gradient(135deg, #faf5ff, #f3e8ff); border: 1px solid #e9d5ff; color: #6b21a8; padding: 10px 14px; border-radius: 8px; font-size: 12px; margin-bottom: 14px; line-height: 1.6; }
  .est-info strong { color: #a855f7; }
  .est-tag { display: inline-block; padding: 2px 6px; background: #f3e8ff; color: #a855f7; border-radius: 4px; font-size: 11px; font-weight: 600; margin-left: 4px; }

  /* ===== 모바일 반응형 ===== */
  .mobile-bar { display: none; }

  @media (max-width: 768px) {
    html, body { height: 100%; }
    body { display: flex; flex-direction: column; overflow: hidden; }

    /* ── 헤더 ── */
    header {
      flex-shrink: 0; padding: 0 14px;
      height: 52px; min-height: 52px;
      display: flex; align-items: center; justify-content: space-between;
      gap: 8px; overflow: hidden;

    .mobile-bar {

    /* ── 데스크탑 사이드바 숨김 ── */
    aside { display: none !important; }

    /* ── 레이아웃 재구성 ── */
    .layout { flex: 1; display: flex; flex-direction: column; overflow: hidden; padding: 0; gap: 0; height: auto; }
    main   { flex: 1; display: flex; flex-direction: column; overflow: hidden; gap: 0; background: #f5f6fa; }

    /* ── 학생 헤더 ── */
    .m-stu-header {
      padding: 10px 14px; background: #fff;
      border-bottom: 1px solid #e5e7eb; flex-shrink: 0;
      display: flex; align-items: center; gap: 8px; flex-wrap: wrap;
    }
    .m-stu-header h2 { font-size: 16px; font-weight: 700; margin: 0; }

    /* ── 모바일 바디: 세로탭 + 콘텐츠 ── */
    .m-body { flex: 1; display: flex; overflow: hidden; }

    /* ── 세로 탭 (아이콘 위주, 더 좁게) ── */
    .m-vtabs {
      width: 52px; flex-shrink: 0;
      background: #fff; border-right: 1px solid #e5e7eb;
      overflow-y: auto; display: flex; flex-direction: column;
      scrollbar-width: none;
    }
    .m-vtabs::-webkit-scrollbar { display: none; }
    .m-vtab {
      display: flex; flex-direction: column;
      align-items: center; justify-content: center;
      padding: 9px 2px; cursor: pointer;
      border-left: 3px solid transparent;
      color: #94a3b8; gap: 3px;
      transition: all 0.12s; min-height: 52px;
      position: relative;

    .m-vtab:active { background: #f1f5f9; }

      background: #eff6ff; border-left-color: #2563eb;
      color: #2563eb;
    }
    .m-vtab-icon { font-size: 20px; line-height: 1; }
    .m-vtab-label { font-size: 9px; text-align: center; line-height: 1.2; font-weight: 600; letter-spacing: -0.2px; }

    /* ── 콘텐츠 영역 ── */
    .m-content { flex: 1; overflow-y: auto; -webkit-overflow-scrolling: touch; }

    /* ── 카드 모바일 조정 ── */

    .m-content table { font-size: 11px; }

    /* ── 차트 ── */
    .chart-wrap { height: 200px; }

    /* ── 내신 요약 ── */
    .grade-summary-panel { grid-template-columns: 1fr; }

    /* ── 세특 아코디언 ── */
    .acc-left { max-width: 100%; padding-right: 4px; }

    /* ── 종합평가 그리드 ── */
    .overall-eval-grid { grid-template-columns: 1fr; }

    /* ── 역량 레이더 — 모바일 세로 스택 ── */
    .radar-card { padding: 16px 14px; margin-bottom: 0; border-radius: 14px; }

    .radar-body { grid-template-columns: 1fr; gap: 14px; }
    .radar-canvas-box { width: 220px; height: 220px; margin: 0 auto; }
    .radar-stat-card { padding: 11px 13px; border-radius: 12px; gap: 12px; }
    .radar-stat-icon { width: 36px; height: 36px; font-size: 17px; border-radius: 9px; }
    .radar-stat-grade { font-size: 28px; }
    .radar-stat-grade-label { font-size: 9px; }
    .radar-stat-name { font-size: 12px; margin-bottom: 4px; }

    /* ── 종합역량평가 추가 섹션 ── */
    .eval-score-section { flex-direction: column; gap: 14px; padding: 16px; }
    .eval-score-circle { width: 80px; height: 80px; }

    /* ── 모의지원 ── */
    .apply-wrap { padding: 8px; }
    .apply-input-row { grid-template-columns: 1fr; }
  }

function getStudentGrades(stu) {
  const keys = [String(stu.hak), String(stu.g3_hak||''), String(stu.g2_hak||''), String(stu.g1_hak||'')];
  for(const k of keys){
    if(!k) continue;

    if(!d) continue;
    // grades 키 안에 학기 데이터가 있는 구조: { grades: { '1-1':{...} } }
    if(d.grades && Object.keys(d.grades).length > 0) return d;
    // 최상위에 바로 학기 키가 있는 구조: { '1-1':{...}, '2-1':{...} }
    const semKeys = ['1-1','1-2','2-1','2-2','3-1','3-2'].filter(s => d[s]);
    if(semKeys.length > 0){
      const normalized = { ...d, grades: {} };
      semKeys.forEach(s => { normalized.grades[s] = d[s]; });
      return normalized;
    }
  }
  return null;
}

// ========== 9등급 환산 로직 (성취도 분포 + 원점수 기반 추정) ==========
// 분포 문자열 파싱: "A(22.1) B(30.0) C(22.1) D(20.2) E(5.7)" → {A:22.1, B:30.0, ...}
function parseDist(str){
  if(!str) return null;
  const r = {};
  const re = /([A-E])\s*\(\s*([\d.]+)\s*\)/g;
  let m;
  while((m = re.exec(str)) !== null){ r[m[1]] = parseFloat(m[2]); }
  return r;
}

// 원점수 + 분포 → 추정 누적 백분위 (상위 %)
function estPercentile(score, dist){
  if(score==null || !dist) return null;
  const order = ['A','B','C','D','E'];
  const cuts = { A:[90,100], B:[80,90], C:[70,80], D:[60,70], E:[0,60] };
  let band = 'E';
  if(score >= 90) band = 'A';
  else if(score >= 80) band = 'B';
  else if(score >= 70) band = 'C';
  else if(score >= 60) band = 'D';
  // 해당 구간 위쪽 누적 %
  let above = 0;
  for(const b of order){ if(b === band) break; above += (dist[b] || 0); }
  // 구간 내 위치 (0=최상위, 1=최하위)
  const [lo, hi] = cuts[band];
  const pos = hi > lo ? (hi - score) / (hi - lo) : 0.5;
  const clamped = Math.max(0, Math.min(1, pos));
  const thisBand = dist[band] || 0;
  return above + clamped * thisBand;
}

// 백분위 → 9등급
function percentileToGrade9(p){
  if(p == null) return null;
  if(p <= 4) return 1;
  if(p <= 11) return 2;
  if(p <= 23) return 3;
  if(p <= 40) return 4;
  if(p <= 60) return 5;
  if(p <= 77) return 6;
  if(p <= 89) return 7;
  if(p <= 96) return 8;
  return 9;
}

// 과목 객체 → 9등급 (석차 기반 직접 계산 우선)
function estGrade9(subj){
  if(!subj || subj.등급 == null) return null;
  // 1순위: 석차 + 수강자수 → 실제 백분위로 9등급 직접 계산
  if(subj.석차 != null && subj.수강자수 != null && subj.수강자수 > 0){
    const p = (subj.석차 / subj.수강자수) * 100;
    return { grade: percentileToGrade9(p), percentile: p, source: '실제' };
  }
  // 2순위: JSON에 등급9 필드가 직접 있는 경우 (석차 없는 과목 fallback)
  if(subj.등급9 != null){
    return { grade: subj.등급9, percentile: subj.백분위, source: '실제' };
  }
  // 3순위: 성취도 분포 기반 추정
  const p = estPercentile(subj.원점수, parseDist(subj.분포));
  if(p == null) return null;
  return { grade: percentileToGrade9(p), percentile: p, source: '추정' };
}

  const est = estGrade9(subj); // 1·2학년: 9등급 환산
  return est ? est.grade : null;
}

// ========== AES-GCM 복호화 ==========
async function deriveKey(password, salt){
  const enc = new TextEncoder();
  const keyMat = await crypto.subtle.importKey('raw', enc.encode(password), 'PBKDF2', false, ['deriveKey']);
  return crypto.subtle.deriveKey(
    { name:'PBKDF2', salt, iterations:100000, hash:'SHA-256' },
    keyMat, { name:'AES-GCM', length:256 }, false, ['decrypt']
  );
}

function b64ToArr(b64){ return Uint8Array.from(atob(b64), c=>c.charCodeAt(0)); }

async function decryptJSON(encObj, key){
  const iv   = b64ToArr(encObj.iv);
  const data = b64ToArr(encObj.data);
  const plain = await crypto.subtle.decrypt({ name:'AES-GCM', iv }, key, data);
  return JSON.parse(new TextDecoder().decode(plain));
}

async function fetchAndDecrypt(url, key){
  const res = await fetch(url);
  if(!res.ok) return null;
  const encObj = await res.json();
  // 암호화 안 된 일반 JSON이면 그냥 반환 (개발 편의)
  if(!encObj.iv) return encObj;
  return decryptJSON(encObj, key);
}

        // 세션 저장
        const exp = Date.now() + 8 * 60 * 60 * 1000; // 8시간
        localStorage.setItem(SESSION_KEY, JSON.stringify({ email, role: result.role, token: result.token, exp: 9999999999999 })); // 로그아웃 전까지 유지

// 학생 한 명의 필터 기준 가중평균 계산 (stu 전달 시 등급제 자동 판별)
function calcStudentAvg(studentData, filter, stu){
  if(!studentData || !studentData.grades) return null;
  let totalCredit=0, weighted=0;
  Object.entries(studentData.grades).forEach(([sem, semData])=>{
    const semIs9 = stu ? isSem9Grade(stu, semData) : (currentGradeIs9 || gradeScale===9);
    (semData.subjects||[]).forEach(sub=>{
      if(sub.등급==null || !sub.학점) return;
      const inFilter = filter ? filter.includes(sub.교과) : true;
      if(!inFilter) return;
      let g;
      if(semIs9){ g = sub.등급; }
      else {
        if(gradeScale===9){ const est=estGrade9(sub); g = est?est.grade:null; }
        else { g = sub.등급; }
      }
      if(g!=null){ totalCredit+=sub.학점; weighted+=g*sub.학점; }
    });
  });
  return totalCredit>0 ? weighted/totalCredit : null;
}

// 전체 학생 중 현재 학생의 등수 계산
function calcRank(currentData, filter){
  const myAvg = calcStudentAvg(currentData, filter, currentStu);
  if(myAvg===null) return null;
  let rank=1, total=0;
  students.forEach(stu=>{
    const data = getStudentGrades(stu);
    if(!data) return;
    const avg = calcStudentAvg(data, filter, stu);
    if(avg!==null){ total++; if(avg < myAvg) rank++; }
  });
  return { rank, total };
}

function calcSemAvg(semData){
  const subjects = semData.subjects || [];
  let credit=0, weighted=0;
  subjects.forEach(s=>{ const g=getG(s); if(g!=null && s.학점){ credit+=s.학점; weighted+=g*s.학점; } });
  return credit>0 ? weighted/credit : null;
}

function getActiveSubjectFilter(){
  // 선택된 교과들로부터 실제 교과명 배열 반환
  if(selectedSubjectFilters.size===0) return null; // 전체
  let result = [];
  selectedSubjectFilters.forEach(k=>{
    if(k==='기타') return; // 기타는 별도 처리
    const arr = SUBJECT_FILTER_MAP[k];
    if(arr) result = result.concat(arr);
  });
  return result.length > 0 ? result : null;
}

function isSubjectInFilter(subj){
  if(selectedSubjectFilters.size===0) return subj.등급!=null; // 전체: 등급 있는 과목만
  const group = getSubjectGroup(subj.교과||'');
  for(const k of selectedSubjectFilters){
    if(k==='기타'){
      if(group==='기타' && subj.등급!=null) return true;
    } else {
      if(group===k) return true;
    }
  }
  return false;
}

function drawGradeChart(data, semesters){
  if(gradeChartInst){ gradeChartInst.destroy(); gradeChartInst=null; }
  const ctx = document.getElementById('gradeChart');
  if(!ctx) return;

  const n = semesters.length;
  const xPos = semesters.map((_, i) => (2 * i + 1) / (2 * n));
  // 9등급 학생은 라벨에 등급제 표시 없이 깔끔하게, 5등급 학생만 [5등급] 안내
  const is9 = isStudent9Grade(currentStu);
  const semLabels = semesters.map(sem => `${sem.split('-')[0]}학년\n${sem.split('-')[1]}학기`);

  // ★ 버그2 수정: null 제거 → 일부 학기만 있어도 해당 포인트만 정상 표시
  function toXY(avgs){
    return avgs
      .map((v, i) => v != null ? { x: xPos[i], y: v } : null)
      .filter(Boolean);
  }

  // 전체 평균 계산
  function semAllAvg(semData){
    const subjects = (semData && semData.subjects) || [];
    let cr = 0, wt = 0;
    subjects.forEach(s => {
      const g = getG(s);
      if(g != null && s.학점){ cr += s.학점; wt += g * s.학점; }
    });
    return cr > 0 ? wt / cr : null;
  }

  // ★ 버그3 수정: isSubjectInFilter 사용 → 기타 포함 모든 필터 정확하게 처리
  function semFilteredAvg(semData){
    const subjects = (semData && semData.subjects) || [];
    let cr = 0, wt = 0;
    subjects.forEach(s => {
      if(!isSubjectInFilter(s)) return;
      const g = getG(s);
      if(g != null && s.학점){ cr += s.학점; wt += g * s.학점; }
    });
    return cr > 0 ? wt / cr : null;
  }

  // ★ 버그3 수정: !filter 대신 size로 직접 판단 (기타 선택시 filter=null이라 틀렸던 것)
  const hasFilter = selectedSubjectFilters.size > 0;
  const allAvgs  = semesters.map(sem => semAllAvg(data.grades[sem]));
  const filtAvgs = hasFilter ? semesters.map(sem => semFilteredAvg(data.grades[sem])) : null;

  const mainColor = is9 ? '#9333ea' : '#2563eb';
  const maxG      = is9 ? 9 : 5;

  // 포인트 위에 등급 수치를 직접 그리는 인라인 플러그인
  const dataLabelPlugin = {
    id: 'gradePointLabels',
    afterDatasetsDraw(chart){
      const { ctx } = chart;
      chart.data.datasets.forEach((ds, di) => {
        const meta = chart.getDatasetMeta(di);
        meta.data.forEach((pt, pi) => {
          const raw = ds.data[pi];
          if(!raw || raw.y == null) return;
          ctx.save();
          ctx.font = 'bold 12px -apple-system, sans-serif';
          ctx.textAlign = 'center';
          ctx.textBaseline = 'bottom';
          const label = raw.y.toFixed(2);
          const tw = ctx.measureText(label).width;
          ctx.fillStyle = 'rgba(255,255,255,0.85)';
          ctx.fillRect(pt.x - tw/2 - 3, pt.y - 22, tw + 6, 16);
          ctx.fillStyle = ds.borderColor;
          ctx.fillText(label, pt.x, pt.y - 8);
          ctx.restore();
        });
      });
    }
  };

  const datasets = [];
  if(!hasFilter){
    datasets.push({
      label:'전체 평균', data: toXY(allAvgs), borderColor: mainColor, backgroundColor: mainColor+'22',
      tension: 0.3, pointRadius: 6, pointHoverRadius: 8, pointBackgroundColor: mainColor,
      fill: true, spanGaps: true
    });
  } else {
    datasets.push({
      label: [...selectedSubjectFilters].join('+'),
      data: toXY(filtAvgs),
      borderColor: mainColor, backgroundColor: mainColor+'22',
      tension: 0.3, pointRadius: 6, pointHoverRadius: 8, pointBackgroundColor: mainColor,
      fill: true, spanGaps: true
    });
  }

  // 유효 데이터 없으면 차트 미생성
  if(!datasets[0].data.length) return;

  gradeChartInst = new Chart(ctx, {
    type: 'line',
    plugins: [dataLabelPlugin],
    data: { datasets },
    options: {
      responsive: true, maintainAspectRatio: false,
      layout: { padding: { top: is9 ? 28 : 18 } },
      plugins:{
        legend:{ position:'bottom', labels:{ font:{size:11}, boxWidth:14 } },
        subtitle:{
          display: true,
          text: is9 ? '9등급제 (3학년)' : '5등급제 (1·2학년) — 9등급 환산 버튼으로 전환 가능',
          color: is9 ? '#9333ea' : '#2563eb',
          font:{ size:11 }, padding:{ bottom:4 }
        },
        tooltip:{ callbacks:{ label: c => ` ${c.dataset.label}: ${c.parsed.y != null ? c.parsed.y.toFixed(2)+'등급' : '-'}` } }
      },
      scales:{
        y:{
          reverse: true, min: 0.5, max: maxG + 0.5,
          afterBuildTicks: axis => {
            axis.ticks = Array.from({length: maxG}, (_, i) => ({ value: i + 1 }));
          },
          ticks:{ callback: v => v+'등급', font:{size:11} },
          grid:{ color:'#f1f5f9' }
        },
        x:{
          type: 'linear', min: 0, max: 1,
          ticks:{
            callback: (val) => {
              const idx = xPos.indexOf(val);
              return idx >= 0 ? semLabels[idx] : '';
            },
            stepSize: null, includeBounds: false,
            font: { size: 11 }, maxTicksLimit: n + 2, autoSkip: false
          },
          afterBuildTicks: axis => { axis.ticks = xPos.map(v => ({ value: v })); },
          grid:{ display: false }
        }
      }
    }
  });
}

// ========== 세특 평가 렌더링 ==========
// 대분류별 대표 등급 계산 (최빈값, 없으면 평균)
function groupGrade(keys, evalData){
  // evalData[k] 가 {grade:'A',...} 형태일 수도 있고, 'A' 문자열일 수도 있음
  const grades = keys.map(k=>{
    const v = evalData[k];
    if(!v) return null;
    return typeof v === 'string' ? v : v.grade;
  }).filter(Boolean);
  if(!grades.length) return null;
  const ORDER = {S:5,A:4,B:3,C:2,D:1};
  const avg = grades.reduce((s,g)=>s+(ORDER[g]||3),0)/grades.length;
  const rounded = Math.round(avg);
  return ['D','C','B','A','S'][rounded-1]||'B';
}

// 여러 과목의 평가 데이터를 종합
function calcOverallEval(subjects){
  const ORDER = {S:5,A:4,B:3,C:2,D:1};
  const GRADE = ['D','C','B','A','S'];
  const keys = ['학업성취도','학업태도','탐구력','전공적합성','진로탐색','협업소통','나눔배려','성실성','리더십'];
  const sums = {}, counts = {};
  keys.forEach(k=>{ sums[k]=0; counts[k]=0; });
  subjects.forEach(s=>{
    if(!s.평가) return;
    keys.forEach(k=>{
      const g = s.평가[k]?.grade;
      if(g && ORDER[g]){ sums[k]+= ORDER[g]; counts[k]++; }
    });
  });
  const result = {};
  keys.forEach(k=>{
    if(counts[k]===0){ result[k]=null; return; }
    const avg = sums[k]/counts[k];
    result[k] = GRADE[Math.round(avg)-1]||'C';
  });
  return result;
}

// 오른쪽 패널: 3개 대분류 + 세부 등급
function renderEvalPanel(evalData){
  if(!evalData || typeof evalData !== 'object') return '<div class="acc-right"></div>';

  // 저장된 대분류 데이터 우선 사용, 없으면 세부지표 평균 계산
  const get대분류 = (key, subKeys) => {
    if(evalData[key]?.grade) return evalData[key].grade;
    return groupGrade(subKeys, evalData);
  };
  const 학업G = get대분류('학업역량', ['학업성취도','학업태도','탐구력']);

  return `<div class="acc-right"><div class="eval-panel">

  const norm = s => String(s||'').replace(/\s/g,'').toLowerCase();
  const univNorm = norm(univInput || '');
  const univBase = univNorm.replace(/학교$|대학교$|대학$/, '');
  const deptNorm = norm(deptInput || '');

  // 학과명으로 계열 키워드 추출
  const deptKeywords = [];
  DEPT_KEYWORD_MAP.forEach(({ match, keywords }) => {
    if(match.some(m => deptNorm.includes(m))) {
      deptKeywords.push(...keywords);
    }
  });

  const matched = referencesList.filter(r => {
    // ① 학년 필터 (공통은 항상 통과)
    const target = r['적용학년'] || '공통';
    if(admYear && target !== '공통' && target !== admYear) return false;

    const title   = norm(r['제목'] || '');
    const preview = norm((r['내용'] || '').substring(0, 600)); // 300 → 600자로 확대

    // ② 전략·흐름 유형: 학년만 맞으면 항상 포함
    const isGeneral = GENERAL_KEYWORDS.some(k => title.includes(norm(k)));
    if(isGeneral) return true;

    // ③ 대학명 매칭
    if(univBase && (
      title.includes(univBase) || title.includes(univNorm) ||
      preview.includes(univBase) || preview.includes(univNorm)
    )) return true;

    // ④ 학과 계열 매칭 (수의대 지원 시 "전국 수의대 분석"도 포함)
    if(deptKeywords.length > 0) {
      if(deptKeywords.some(k => title.includes(k) || preview.includes(k))) return true;
    }

    return false;
  });

  // 프롬프트 토큰 과부하 방지: 총 5000자 이내로 제한
  let total = 0;
  return matched.filter(r => {
    const len = (r['내용'] || '').length;
    if(total + len > 5000) return false;
    total += len;
    return true;
  });
}


// ========== 합불 이력 조회 (GitHub JSON + 메모리 캐시) ==========
let _admAllCache = null;      // 전체 데이터 메모리 캐시
let _admAllLoading = null;    // 중복 fetch 방지

const ADM_JSON_URL = './admissions_all.json';  // GitHub Pages 경로

async function loadAdmissionsAll() {
  if (_admAllCache) return _admAllCache;
  if (_admAllLoading) return _admAllLoading;
  _admAllLoading = fetch(ADM_JSON_URL)
    .then(r => r.json())
    .then(json => {
      _admAllCache = json;  // { h: [...], d: [[...], ...] }
      _admAllLoading = null;
      return json;
    })
    .catch(() => { _admAllLoading = null; return null; });
  return _admAllLoading;
}

async function fetchAdmissionCases(univ, dept) {
  if (!univ || !dept) return { school: [], gb: [] };

  // ① GitHub JSON에서 전국 사례 필터
  let gb = [];
  try {
    const json = await loadAdmissionsAll();
    if (json && json.h && json.d) {
      const hi = {};
      json.h.forEach((h, i) => hi[h] = i);
      const norm = s => String(s||'').trim().toLowerCase().replace(/\s/g,'').replace(/[()（）]/g,'');
      const univNorm = norm(univ);
      const deptNorm = norm(dept);
      gb = json.d
        .filter(r => {
          const u = norm(r[hi['대학명']] || '');
          const uBase = u.replace(/학교$|대학교$|대학$/, '');
          const d = norm(r[hi['모집단위']] || '');
          const univMatch = u.includes(univNorm) || univNorm.includes(uBase) || uBase.includes(univNorm);
          const deptMatch = deptNorm.length < 2 || d.includes(deptNorm) || (deptNorm.length >= 3 && deptNorm.includes(d));
          return univMatch && deptMatch;
        })
        .map(r => ({
          대학명:   r[hi['대학명']],
          모집단위: r[hi['모집단위']],
          전형유형: r[hi['전형']],
          최종결과: r[hi['결과']],
          불합사유: r[hi['불합사유']],
          환산등급: r[hi['등급']],
        }));
    }
  } catch(e) { gb = []; }

  // ② Apps Script에서 우리 학교 자료 fetch
  let school = [];
  try {
    const timeout = new Promise((_,rej) => setTimeout(() => rej(new Error('timeout')), 8000));
    const data = await Promise.race([
      apiGet({ action: 'getAdmissions', password: currentPassword }),
      timeout
    ]);
    if (data && Array.isArray(data)) {
      const norm = s => String(s||'').trim().toLowerCase().replace(/\s/g,'').replace(/[()（）]/g,'');
      const univNorm = norm(univ);
      const deptNorm = norm(dept);
      school = data.filter(r => {
        const u = norm(r['대학명'] || '');
        const uBase = u.replace(/학교$|대학교$|대학$/, '');
        const d = norm(r['모집단위'] || '');
        const univMatch = u.includes(univNorm) || univNorm.includes(uBase) || uBase.includes(univNorm);
        const deptMatch = deptNorm.length < 2 || d.includes(deptNorm) || (deptNorm.length >= 3 && deptNorm.includes(d));
        return univMatch && deptMatch;
      });
    }
  } catch(e) { school = []; }

  return { school, gb };
}

function admissionsToPromptText(cases, univInput, deptInput) {
  const { school = [], gb = [] } = cases || {};
  if (!school.length && !gb.length) return '※ 합불 이력 없음 (해당 대학/학과 데이터 없음)';

  let text = '';

  // ① 우리 학교 자료 (집계형: 합격건수, 합격평균등급 등)
  if (school.length) {
    text += `※ 우리 학교 선배 합불 이력 (${univInput} — ${deptInput})\n`;
    const typeOrder = ['교과', '종합', '논술', '정시', '기타'];
    const byType = {};
    school.forEach(r => {
      const tf = String(r['전형유형'] || '기타');
      const key = typeOrder.find(t => tf.includes(t)) || '기타';
      if (!byType[key]) byType[key] = [];
      byType[key].push(r);
    });
    for (const tf of typeOrder) {
      if (!byType[tf]) continue;
      byType[tf].forEach(r => {
        let line = `  [${r['전형유형']}] 합격 ${r['합격건수'] || 0}건`;
        if (r['합격평균등급']) line += ` (평균 ${r['합격평균등급']}등급, 범위 ${r['합격최고등급']}~${r['합격최저등급']})`;
        line += ` / 불합격 ${r['불합격건수'] || 0}건`;
        if (r['불합격평균등급']) line += ` (불합 평균 ${r['불합격평균등급']}등급)`;
        text += line + '\n';
      });
    }
  }

  // ② 경북 지역 자료 (개별 사례형: 최종결과, 환산등급 등)
  if (gb.length) {
    text += `\n※ 경북 지역 합불 사례 (${univInput} — ${deptInput})\n`;
    const byType = {};
    gb.forEach(r => {
      const tf = String(r['전형유형'] || '');
      const key = tf.includes('교과') ? '교과' : tf.includes('종합') ? '종합' : tf.includes('논술') ? '논술' : '기타';
      if (!byType[key]) byType[key] = { pass: [], fail: [] };
      const result = String(r['최종결과'] || '');
      const grade = parseFloat(r['환산등급']);
      if (result.includes('합격')) {
        byType[key].pass.push(grade);
      } else {
        byType[key].fail.push({ grade, reason: r['불합사유'] || '' });
      }
    });
    for (const tf of ['교과', '종합', '논술', '기타']) {
      if (!byType[tf]) continue;
      const { pass, fail } = byType[tf];
      const passGrades = pass.filter(g => !isNaN(g));
      const failGrades = fail.map(f => f.grade).filter(g => !isNaN(g));
      const passAvg = passGrades.length ? (passGrades.reduce((a,b)=>a+b,0)/passGrades.length).toFixed(2) : null;
      const passMin = passGrades.length ? Math.min(...passGrades).toFixed(2) : null;
      const passMax = passGrades.length ? Math.max(...passGrades).toFixed(2) : null;
      const failAvg = failGrades.length ? (failGrades.reduce((a,b)=>a+b,0)/failGrades.length).toFixed(2) : null;
      const reasons = [...new Set(fail.map(f=>f.reason).filter(Boolean))].join(', ');
      let line = `  [${tf}전형] 합격 ${pass.length}건`;
      if (passAvg) line += ` (평균 ${passAvg}등급, 범위 ${passMin}~${passMax})`;
      line += ` / 불합 ${fail.length}건`;
      if (failAvg) line += ` (불합 평균 ${failAvg}등급)`;
      if (reasons) line += ` — 불합사유: ${reasons}`;
      text += line + '\n';
    }
  }

  return text.trim();
}

  // 3학년 30회, 1·2학년 10회
  const grade = parseInt(stu?.grade) || parseInt(String(stu?.hak||'')[0]) || 0;
  return grade >= 3 ? 30 : 10;
}

function getApplyCountKey(hak){
  // 학생 토큰 + 학번 조합으로 키 생성 (토큰은 개인 식별자)
  return `applyCount_${currentPassword}_${hak}`;
}

function getApplyUsed(hak){
  const key = getApplyCountKey(hak);
  return parseInt(localStorage.getItem(key) || '0');
}

function incrementApplyCount(hak){
  const key = getApplyCountKey(hak);
  const cur = getApplyUsed(hak);
  localStorage.setItem(key, String(cur + 1));
}

    ? `9등급제 (3학년, 2015개정) — 1~2:최상위 / 3~4:상위 / 5:중위 / 6~:하위`
    : `5등급제 (${grade}학년, 2022개정) — 1:최상위A / 2:상위B / 3:중위C / 4:하위D / 5:최하위E\n※ 교과전형 비교 시 9등급 환산 적용 (전체평균 ${stuGradeAvg??'-'}등급 기준)`;

  // 1-C. 모의고사 — 최근 2회차 핵심만
  let mockSummary = '모의고사 데이터 없음';
  if(mockData.length){
    const recent = mockData.slice(-2).reverse();
    mockSummary = recent.map(r=>{
      const scores = SUBJECTS.map(sub=>{
        const d = r[sub]; if(!d) return null;
        const sel = d.선택?.trim();
        return `${sub}${sel?`(${sel})`:''} ${d.등급??'-'}등급`;
      }).filter(Boolean).join(' / ');
      return `${ROUND_LABEL[r.round]||r.round}: ${scores}`;
    }).join('\n');
  }

  // 1-D. 세특 — 지원 학과 관련 키워드로 필터링
  const deptNormForFilter = dept.replace(/학과$|학부$|전공$/, '').toLowerCase();
  const DEPT_RELATED = { // 계열별 관련 키워드
    '의':['의학','생명','화학','생물','의료','해부','약리'],
    '약':['약학','화학','생명','제약','약리','유기화학'],
    '수의':['수의','동물','생명','미생물','해부','생물'],
    '치':['치의','구강','생명','화학','해부'],
    '한의':['한의','한방','동의','생명','약초'],
    '경':['경제','경영','금융','회계','마케팅','재무','무역'],
    '법':['법','헌법','민법','형법','법학','사회'],
    '교육':['교육','교사','수업','학습','학생'],
    '공':['공학','물리','전자','기계','화공','토목','컴퓨터','AI','프로그램'],
    '컴':['컴퓨터','소프트웨어','알고리즘','프로그래밍','AI','데이터','코딩'],
  };
  const relatedKeywords = Object.entries(DEPT_RELATED)
    .filter(([k])=>deptNormForFilter.includes(k))
    .flatMap(([,v])=>v);

  // 1-D. 세특 — 모의지원에는 원본(내용 필드)만 사용
  // ※ 요약·평가 필드는 선생님/학생 참고용 — 프롬프트에 절대 포함하지 않음
  const allSubjects = stuData?.subjects || [];

  // grades에서 과목명 → 등급 맵 생성 (세특 원본 없는 과목에 성적 표시용)
  const gradeMap = {};
  if(gradesData?.grades){
    Object.values(gradesData.grades).forEach(sd=>{
      (sd.subjects||[]).forEach(s=>{
        if(s.과목 && s.등급!=null){
          // 같은 과목이 여러 학기면 가장 좋은 등급 유지
          if(!gradeMap[s.과목] || s.등급 < gradeMap[s.과목]) gradeMap[s.과목] = s.등급;
        }
      });
    });
  }

  const relevantSubjects = relatedKeywords.length > 0
    ? allSubjects.filter(s=>{
        // 키워드 매칭도 원본 내용(내용 필드)만 사용 — 요약/평가 필드는 참조하지 않음
        const text = (s.내용||'').toLowerCase();
        return relatedKeywords.some(k=>text.includes(k));
      })
    : allSubjects;
  const baseSubjects = relevantSubjects.length > 0 ? relevantSubjects : allSubjects;

  const sewtukToShow = baseSubjects.slice(0, 10);
  const sewtukSummary = sewtukToShow.length > 0
    ? sewtukToShow.map(s => {
        const raw = (s.내용||'').trim();
        const hasRaw = raw && raw !== '내용을 입력해주세요.' && raw.length > 20;
        // 과목명으로 grades에서 등급 조회 (세특 과목명이 "공통국어1·공통국어2" 형태일 수 있어 분리 시도)
        const subjectNames = s.과목 ? s.과목.split(/[·,]/).map(n=>n.trim()) : [];
        const gradeVal = subjectNames.map(n=>gradeMap[n]).find(g=>g!=null) ?? null;
        const gradeTag = gradeVal!=null ? ` (${gradeVal}등급)` : '';
        if(hasRaw){
          return `[${s.교과}-${s.과목}${gradeTag}]\n${raw}`;
        } else {
          return `[${s.교과}-${s.과목}${gradeTag}] ※세특 미입력`;
        }
      }).join('\n\n')
    : null;

  // 1-E. 창체 — 모의지원에는 원본(내용 필드)만 사용, 원본 없는 활동은 완전 제외
  // ※ 요약·평가 필드는 선생님/학생 참고용 — 프롬프트에 절대 포함하지 않음
  const changcheData = changche[hak]
    || (currentStu.g3_hak ? changche[String(currentStu.g3_hak)] : null)
    || (currentStu.g2_hak ? changche[String(currentStu.g2_hak)] : null)
    || (currentStu.g1_hak ? changche[String(currentStu.g1_hak)] : null);
  const changcheSummary = (() => {
    const acts = (changcheData?.activities || []).filter(a => {
      const raw = (a.내용 || '').trim();
      return raw && raw !== '내용을 입력해주세요.' && raw.length > 20;
    });
    if(!acts.length) return null; // null이면 프롬프트에서 제외
    return acts.map(a =>
      `[${a.학년}학년 ${a.분류} - ${a.활동명}]\n${a.내용.trim()}`
    ).join('\n\n');
  })();

  // 1-F. 행발 — 모의지원에는 원문(행발 필드)만 사용, 없으면 제외
  // ※ 행발요약·행발종합평가 필드는 선생님/학생 참고용 — 프롬프트에 절대 포함하지 않음
  const haengbalRaw = haengbal[String(stu.hak)]?.원문 || {};
  const haengbalSummary = (() => {
    const entries = Object.entries(haengbalRaw).filter(([, v]) => v && String(v).trim().length > 10);
    if(!entries.length) return null;
    return entries
      .sort(([a],[b]) => a.localeCompare(b))
      .map(([g, text]) => `[${g}학년]\n${String(text).trim()}`)
      .join('\n\n');
  })();

  // 1-G. 종합역량평가 — 데이터 있을 때만 포함, 없으면 프롬프트에서 완전 제외
  const compEval = stuData?.종합역량평가 || null;
  const compSummary = compEval ? [
    `학업역량 ${compEval.학업역량?.grade??'-'} / 진로역량 ${compEval.진로역량?.grade??'-'} / 공동체역량 ${compEval.공동체역량?.grade??'-'}`,
    compEval.종합의견 ? compEval.종합의견.substring(0,300) : ''
  ].filter(Boolean).join('\n') : null;

  // ══════════════════════════════════════════════════
  // Layer 2: 입결 + 합불이력
  // ══════════════════════════════════════════════════
  btn.innerHTML = '<span class="apply-spinner"></span> 입결 조회 중...';
  const [cutoffRaw, admCases] = await Promise.all([
    fetchCutoffData(univ, dept),
    fetchAdmissionCases(univ, dept)
  ]);
  const cutoffText = cutoffToPromptText(cutoffRaw, univ, dept, type);
  btn.innerHTML = '<span class="apply-spinner"></span> Claude 분석 중...';

  // ══════════════════════════════════════════════════
  // Layer 3: 참고자료 Tier 계층화
  // ══════════════════════════════════════════════════
  const admYear = studentIs9 ? '2027' : '2028';
  const normRef = s => String(s||'').replace(/\s/g,'').toLowerCase();
  const univBase = normRef(univ).replace(/학교$|대학교$|대학$/, '');

  // Tier 분류 함수
  function classifyRef(r){
    const title   = normRef(r['제목']||'');
    const preview = normRef((r['내용']||'').substring(0,600));
    const isUnivMatch = title.includes(univBase) || preview.includes(univBase);
    const isDeptMatch = DEPT_KEYWORD_MAP.some(({match,keywords})=>
      match.some(m=>normRef(dept).includes(m)) &&
      keywords.some(k=>title.includes(normRef(k))||preview.includes(normRef(k)))
    );
    const isStrategy = ['전략','특징','흐름','변화사항','변화 사항','의약학'].some(k=>title.includes(normRef(k)));
    if(isUnivMatch) return 1;
    if(isDeptMatch) return 2;
    if(isStrategy)  return 3;
    return 4; // 제외
  }

  const allMatchedRefs = referencesList.filter(r=>{
    const target = r['적용학년']||'공통';
    if(admYear && target!=='공통' && target!==admYear) return false;
    return classifyRef(r) <= 3;
  });

  const tier1 = allMatchedRefs.filter(r=>classifyRef(r)===1);
  const tier2 = allMatchedRefs.filter(r=>classifyRef(r)===2);
  const tier3 = allMatchedRefs.filter(r=>classifyRef(r)===3);

  const formatTier = (refs, maxChars) => refs.map(r=>{
    const content = (r['내용']||'').substring(0, maxChars);
    return `📌 ${r['제목']||r.id}\n${content}`;
  }).join('\n\n');

  const refBlock = [
    tier1.length ? `▶ Tier1 해당 대학 전형 정보\n${formatTier(tier1, 900)}` : '',
    tier2.length ? `▶ Tier2 해당 계열 전국 분석\n${formatTier(tier2, 700)}` : '',
    tier3.length ? `▶ Tier3 대입 전략·흐름 (요약)\n${formatTier(tier3, 400)}` : '',
  ].filter(Boolean).join('\n\n') || '등록된 참고자료 없음';

  // ══════════════════════════════════════════════════
  // 최종 프롬프트 조합
  // ══════════════════════════════════════════════════
  const prompt = `당신은 한국 대입 전형 전문 컨설턴트입니다. 아래 데이터를 기반으로 학생의 ${univ} ${dept} ${type}전형 지원 가능성을 분석하세요.

━━━ 【학생 프로필】 ━━━
이름: ${currentStu.name} | ${grade}학년 | 학번: ${hak}
등급제: ${gradeSystemGuide}

【내신 성적 요약】
${gradeProfile}
${gradeDetail}

【모의고사 (최근 2회차)】
${mockSummary}

${compSummary ? `【종합역량평가】\n${compSummary}` : ''}

${sewtukSummary ? `【세특 원본 — ${dept} 관련 핵심 (${sewtukToShow.length}과목)】\n${sewtukSummary}` : '【세특】데이터 없음'}

${changcheSummary ? `【창체 활동 원본】\n${changcheSummary}` : ''}

${haengbalSummary ? `【행동발달사항 원본】\n${haengbalSummary}` : ''}

━━━ 【지원 대학 데이터】 ━━━
목표: ${univ} / ${dept} / ${type}전형
${note ? `추가 요청: ${note}` : ''}

【입결 데이터 (50컷·70컷 3개년)】
${cutoffText}

【우리 학교·지역 선배 합불 이력】
${admissionsToPromptText(admCases, univ, dept)}

━━━ 【입시 참고자료 — ${admYear}학년도 기준】 ━━━
※ Tier1=해당대학, Tier2=해당계열, Tier3=전략흐름 순으로 활용하세요.

${refBlock}

━━━ 【분석 지시】 ━━━
아래 기준으로 엄격하게 분석하세요:
1. 내신 해석: ${studentIs9?'9등급제 직접 적용':'5등급제이므로 9등급 환산(전체평균 '+stuGradeAvg+'등급) 후 입결과 비교'}
2. 입결 비교: 50컷·70컷이 있으면 반드시 학생 내신과 수치로 비교 (컷보다 높으면 불리, 낮으면 유리)
3. 수능최저: Tier1·2 자료의 수능최저 기준과 학생 모의고사 성적을 대조하여 충족 가능성 명시
4. 전형 특성: 교과/종합/논술 전형 특성에 맞게 강점·약점을 다르게 분석
5. 세특 활용: 원본 세특에서 ${dept} 관련 탐구 활동·역량을 직접 파악하여 종합전형 강점으로 연결
6. 창체·행발 활용: 창체 활동과 행발에서 드러나는 인성·리더십·공동체 역량을 종합전형 평가 요소로 반영
7. 지역인재: ${univ} 지역인재전형 해당 여부 확인 후 언급
⚠️ 주의: 수상경력·독서활동은 2024학년도부터 대입 미반영 항목이므로 분석에서 절대 언급하지 마세요. 종합역량평가 데이터가 없어도 이를 보완점으로 지적하지 마세요.

반드시 아래 JSON만 출력 (마크다운 코드블록 금지):
{
  "적합도": "상|중|하",
  "적합도점수": 75,
  "한줄평": "20자 이내",
  "수능최저충족": "가능|불확실|어려움",
  "수능최저근거": "모의 성적 기준 판단 근거 1~2문장",
  "강점": "지원에 유리한 강점 3~4가지 (음슴체)",
  "보완점": "부족한 부분 2~3가지 (음슴체)",
  "전형분석": "${type}전형 관점의 구체적 분석 (음슴체, 3~4문장, 입결 수치 반드시 포함)",
  "추천전략": "합격 가능성 높이는 전략 2~3가지 (음슴체)",
  "주의사항": "지원 시 주의할 점 (음슴체)"
}`;
    const res = await fetch(API_URL, {
      method: 'POST',
      body: JSON.stringify({ action: 'callClaude', password: currentPassword, prompt })
    });
    const data = await res.json();
    if(data.error) throw new Error(data.error);

    let obj;
    try{
      let clean = data.text.replace(/```json|```/g,'').trim();
      if(!clean.endsWith('}')){
        const last = clean.lastIndexOf('}');
        if(last > 0) clean = clean.substring(0, last+1);
        const opens = (clean.match(/{/g)||[]).length;
        const closes = (clean.match(/}/g)||[]).length;
        for(let i=0; i<opens-closes; i++) clean += '}';
      }
      obj = JSON.parse(clean);
    }catch{ throw new Error('결과 파싱 실패 — 잠시 후 다시 시도해주세요'); }

    // 기록 저장
    applyHistory[hak] = applyHistory[hak] || [];
    applyHistory[hak].push({ univ, dept, type, result: obj, date: new Date().toLocaleTimeString('ko-KR',{hour:'2-digit',minute:'2-digit'}) });

    // 결과 표시
    const GC = {'상':'#10b981','중':'#f59e0b','하':'#ef4444'};
    const BGC = {'상':'#dcfce7','중':'#fef9c3','하':'#fee2e2'};
    const color = GC[obj.적합도]||'#64748b';
    const bg = BGC[obj.적합도]||'#f1f5f9';
    // 입결 비교 패널 생성
    const typeMatched = cutoffRaw.filter(r=>!type||type==='종합+교과'||String(r['전형']||'').includes(type));
    const cutoffRows  = (typeMatched.length ? typeMatched : cutoffRaw).slice(0,3);
    const years = ['2025','2024','2023'];
    const scaleNote = studentIs9 ? '(9등급 기준)' : '(5→9등급 환산)';

    function gradeCompare(stuG, cutG){
      if(!stuG||!cutG) return {icon:'—',cls:'#94a3b8',diff:''};
      const diff = (parseFloat(stuG)-parseFloat(cutG)).toFixed(2);
      if(parseFloat(diff)<=-0.1) return {icon:'✅',cls:'#10b981',diff:`${diff}`};
      if(parseFloat(diff)<=0.3)  return {icon:'⚠️',cls:'#f59e0b',diff:`+${diff}`};
      return {icon:'❌',cls:'#ef4444',diff:`+${diff}`};
    }

    const cutoffPanelHtml = cutoffRows.length ? `
      <div style="padding:12px 14px;border-left:3px solid #e2e8f0;">
        <div style="font-size:11px;font-weight:700;color:#64748b;margin-bottom:8px;">
          📊 내신 vs 70컷 비교 ${scaleNote}
        </div>
        <div style="display:flex;align-items:baseline;gap:6px;margin-bottom:10px;">
          <span style="font-size:11px;color:#64748b;">내 내신 평균</span>
          <span style="font-size:26px;font-weight:900;color:#1e293b;">${stuGradeAvg||'-'}</span>
          <span style="font-size:11px;color:#94a3b8;">등급 ${stuGradeAvgNote}</span>
        </div>
        ${cutoffRows.map(r=>{
          const sejeon = r['세부전형명']||r['전형']||'-';
          const rows70 = years.map(y=>{
            const cut70 = r[`70컷_${y}`];
            const cmp = gradeCompare(stuGradeAvg, cut70);
            return `<div style="display:flex;align-items:center;justify-content:space-between;padding:3px 0;border-bottom:1px solid #f1f5f9;">
              <span style="font-size:11px;color:#64748b;width:36px;">${y}년</span>
              <span style="font-size:13px;font-weight:700;color:#334155;width:34px;">${cut70||'—'}</span>
              <span style="font-size:12px;">${cmp.icon}</span>
              <span style="font-size:11px;font-weight:600;color:${cmp.cls};width:40px;text-align:right;">${cmp.diff}</span>
            </div>`;
          }).join('');
          return `<div style="margin-bottom:8px;">
            <div style="font-size:10px;font-weight:700;color:#475569;background:#f8fafc;padding:3px 6px;border-radius:4px;margin-bottom:4px;">${escapeHtml(sejeon)}</div>
            ${rows70}
          </div>`;
        }).join('')}
      </div>` :
      `<div style="padding:14px;display:flex;align-items:center;justify-content:center;color:#94a3b8;font-size:12px;border-left:3px solid #f1f5f9;">
        입결 데이터 없음
      </div>`;

    resultEl.innerHTML = `
      <div class="apply-result-card">
        <div class="apply-result-head" style="display:flex;align-items:center;justify-content:space-between;">
          <span>📊 ${univ} ${dept} — ${type} 전형 분석 결과</span>
          <button onclick="printApplyResult()" class="print-no" style="padding:5px 12px;background:#f1f5f9;border:1px solid #cbd5e1;border-radius:6px;font-size:12px;cursor:pointer;display:flex;align-items:center;gap:5px;">🖨️ 인쇄</button>
