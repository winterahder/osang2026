  const resultEl = document.getElementById('applyResult');
  btn.disabled   = true;
  btn.innerHTML  = '<span class="apply-spinner"></span> 데이터 조회 중...';
  resultEl.innerHTML = '<div style="color:#64748b;padding:16px;text-align:center;">📡 입결·합불 데이터 조회 중...</div>';

  try {
    const result = await computeApplyResult(hak, univ, dept, type, note, subType);
    renderApplyResultHTML(result, resultEl);
    saveApplyHistoryItem(hak, univ, dept, type, result);
    const el = document.getElementById('tabContent');
    if(el) renderMockApplyTab(el);
  } catch(e) {
    resultEl.innerHTML = `<div style="color:#ef4444;padding:16px;">❌ 분석 오류: ${escapeHtml(e.message)}</div>`;
  }
  btn.disabled = false;
  btn.innerHTML = '🔍 학과 적합성 분석하기';
}

// ── 핵심 계산 엔진 (async) ──
async function computeApplyResult(hak, univ, dept, type, note, subType=''){
  const grade = parseInt(currentStu.grade) || parseInt(hak[0]);
  const studentIs9 = isStudent9Grade(currentStu);

  // ① 내신 평균 계산 (9등급 기준 통일)
  const gradesData = getStudentGrades(currentStu);
  let stuAvg = null;
  if(gradesData?.grades){
    let tc=0, tw=0;
    Object.entries(gradesData.grades).forEach(([sem,sd])=>{
      const semIs9 = isSem9Grade(currentStu, sd);
      (sd.subjects||[]).forEach(s=>{
        if(s.등급==null || !s.학점) return;
        let g;
        if(semIs9){ g=s.등급; }
        else { const est=estGrade9(s); if(est) g=est.grade; }
        if(g!=null){ tc+=s.학점; tw+=g*s.학점; }
      });
    });
    if(tc>0) stuAvg = tw/tc;
  }

  // ② 커트라인 — GAS API(cutoff_db) 실제 데이터 fetch
  let cutoffRows = [];
  try { cutoffRows = await fetchCutoffData(univ, dept, subType); } catch(e){}
  const cutoff = parseCutoff(cutoffRows, type);

  // ③ 합불 이력 — 전국(admissions_all.json) + 우리학교(alumniKb)
  let admCases = { school:[], gb:[] };
  try { admCases = await fetchAdmissionCases(univ, dept); } catch(e){}
  const alumniResult = getAlumniResult(univ, dept, stuAvg); // 우리학교 선배(alumniKb)

  // ③b 전국 합불 JSON에서 pseudo-cutoff 계산 (cutoff DB 없을 때 보조)
  const gbCutoff = parseGbCutoff(admCases.gb, type);

  // ④ 비교과 분석 (major_analysis 시트 → eval fallback)
  const majorData = majorAnalysisDB[hak] || evalData[hak]?.희망학과분석 || {};
  const deptNorm  = dept.replace(/학과|학부|전공|계열/g,'').trim();
  const majorEntry = Object.entries(majorData).find(([k])=>
    k.replace(/학과|학부|전공|계열/g,'').trim().includes(deptNorm)||
    deptNorm.includes(k.replace(/학과|학부|전공|계열/g,'').trim())
  ) || Object.entries(majorData)[0];
  const majorScore = majorEntry ? ({S:100,A:83,B:66,C:50,D:33}[majorEntry[1]?.전공적합성]||50) : null;

  // ⑤ 수능최저 판단
  const suneungResult = checkSuneung(univ, dept, type, grade);

  // ⑥ 종합역량평가 참조 — evalData → sewtuk 순서로 fallback
  const compEval = evalData[hak]?.종합역량평가
    || sewtuk[hak]?.종합역량평가
    || sewtuk[hak]?.종합평가
    || null;
  // 대학별 평가 비중 적용 (세부전형명 우선 매칭, 없으면 40/40/20 기본값)
  const univWeights = getUnivWeights(univ, type, subType);
  const compScore = compEval ? calcCompScore(compEval, univWeights) : null;

  // ⑦ 세특 종합의견 (buildComments에서 활용)
  const sewtukOverall = sewtuk[hak]?.종합평가?.종합의견
    || sewtuk[hak]?.종합역량평가?.종합의견
    || '';

  // ⑧ 최종 점수 계산 (cutoff 없으면 gbCutoff 보조 사용)
  const effectiveCutoff = cutoff || gbCutoff;
  const score = calcFinalScore({
    stuAvg, cutoff: effectiveCutoff, type, alumniResult, majorScore, compScore, suneungResult,
    admCases, subType
  });

  // ⑨ 코멘트 생성
  const comments = buildComments({
    stuAvg, cutoff: effectiveCutoff, gbCutoff, type,
    alumniResult, admCases,
    majorScore, majorEntry,
    compScore, compEval, sewtukOverall,
    suneungResult, grade, studentIs9,
    univ, dept, note, gradesData, hak,
    univWeights
  });

  return {
    id: `AH_${Date.now()}`,
    univ, dept, type, subType,
    적합도: score.grade,
    적합도점수: score.score,
    한줄평: score.summary,
    수능최저충족: suneungResult.status,
    수능최저근거: suneungResult.reason,
    강점: comments.strengths,
    보완점: comments.weaknesses,
    전형분석: comments.typeAnalysis,
    추천전략: comments.strategy,
    주의사항: comments.caution,
    _meta: { cutoff: effectiveCutoff, gbCutoff, alumniResult, admCases, stuAvg, majorScore, univWeights }
  };
}

// 커트라인 조회 (이미 로드된 cutoff DB에서)
// ── admissions_all.json 전국 합불 데이터에서 pseudo-cutoff 계산 ──
function parseGbCutoff(gbRows, type){
  if(!gbRows || !gbRows.length) return null;
  const norm = s => String(s||'').trim();
  // 전형 필터
  const filtered = type && type !== '종합+교과'
    ? gbRows.filter(r => norm(r.전형유형).includes(type))
    : gbRows;
  if(!filtered.length) return null;

  const passGrades = filtered
    .filter(r => { const res = norm(r.최종결과); return res.includes('합격') || res.includes('충원'); })
    .map(r => parseFloat(r.환산등급))
    .filter(v => !isNaN(v) && v > 0)
    .sort((a,b) => a-b);

  if(!passGrades.length) return null;
  const p50 = passGrades[Math.floor(passGrades.length * 0.5)] ?? null;
  const p70 = passGrades[Math.floor(passGrades.length * 0.7)] ?? null;

  const failGrades = filtered
    .filter(r => norm(r.최종결과).includes('불합'))
    .map(r => parseFloat(r.환산등급))
    .filter(v => !isNaN(v) && v > 0)
    .sort((a,b) => a-b);

  return {
    cut50: p50, cut70: p70,
    passCount: passGrades.length,
    failCount: failGrades.length,
    passMin: passGrades[0] ?? null,
    passMax: passGrades[passGrades.length-1] ?? null,
    source: 'gb' // admissions_all.json 출처 표시
  };
}

function parseCutoff(rows, type){
  if(!rows.length) return null;
  const years = ['2026','2025','2024'];
  const cuts50 = [], cuts70 = [];
  rows.forEach(r=>{
    years.forEach(y=>{
      const v50 = parseFloat(r[`50컷_${y}`]); if(!isNaN(v50)) cuts50.push(v50);
      const v70 = parseFloat(r[`70컷_${y}`]); if(!isNaN(v70)) cuts70.push(v70);
    });
  });
  const avg = arr => arr.length ? arr.reduce((a,b)=>a+b,0)/arr.length : null;
  return {
    cut50: avg(cuts50), cut70: avg(cuts70),
    raw: rows[0],
    모집인원: rows[0]?.['모집인원_2025'] || null,
    경쟁률: rows[0]?.['경쟁률_2025'] || null,
  };
}

function getAlumniResult(univ, dept, stuAvg){
  const norm = s=>String(s||'').trim().toLowerCase().replace(/\s/g,'').replace(/대학교$|대학$/,'');
  const uNorm=norm(univ), dNorm=norm(dept||'');
  const matched = alumniKb.filter(r=>{
    const ru=norm(r['지원대학']||''), rd=norm(r['지원학과']||'');
    return (ru.includes(uNorm)||uNorm.includes(ru)) && (!dNorm||rd.includes(dNorm)||dNorm.includes(rd));
  });
  if(!matched.length) return {pass:[], fail:[], passAvg:null, failAvg:null, total:0};
  const pass = matched.filter(r=>String(r['결과']||'').includes('합격'));
  const fail = matched.filter(r=>String(r['결과']||'').includes('불합격'));
  const avg = arr => {
    const vs = arr.map(r=>parseFloat(r['내신평균']||r['내신']||0)).filter(v=>v>0);
    return vs.length ? vs.reduce((a,b)=>a+b,0)/vs.length : null;
  };
  return { pass, fail, passAvg: avg(pass), failAvg: avg(fail), total: matched.length };
}

function checkSuneung(univ, dept, type, grade){
  // kb_univ에서 해당 대학 수능최저 확인
  const norm = s=>String(s||'').trim().toLowerCase().replace(/\s/g,'').replace(/대학교$|대학$/,'');
  const uNorm = norm(univ);
  const kbEntry = kbUniv.find(r=>{
    const u = norm(r['대학명']||'');
    return u.includes(uNorm)||uNorm.includes(u);
  });
  const suneungText = kbEntry?.['수능최저'] || '';
  if(!suneungText || suneungText==='없음' || suneungText==='미적용') {
    return { status:'해당없음', reason:'수능최저 없음 (서류/면접 100%)' };
  }
  return { status:'확인필요', reason:`수능최저 기준: ${suneungText} — 모의고사 성적 확인 필요` };
}

// 대학별 평가 비중 조회 (세부전형명 > 전형유형 > 기본값 40/40/20 순)
function getUnivWeights(univ, type, subType){
  if(!univ) return { 학업:40, 진로:40, 공동체:20 };
  const norm = s => String(s||'').trim().toLowerCase().replace(/\s/g,'').replace(/대학교$|대학$/,'');
  const uNorm = norm(univ);
  const hasWeight = r => r['학업비중'] && r['진로비중'] && r['공동체비중'];

  // 1순위: 대학명 + 세부전형명 정확 매칭
  if(subType){
    const sNorm = norm(subType);
    const exact = kbUniv.find(r => {
      const u = norm(r['대학명']||'');
      const s = norm(r['세부전형명']||'');
      return (u.includes(uNorm)||uNorm.includes(u)) && s.includes(sNorm) && hasWeight(r);
    });
    if(exact) return {
      학업: parseFloat(exact['학업비중']), 진로: parseFloat(exact['진로비중']),
      공동체: parseFloat(exact['공동체비중']), source: exact['대학명'], subType: exact['세부전형명']
    };
  }

  // 2순위: 대학명 + 전형유형 매칭
  const byType = kbUniv.find(r => {
    const u = norm(r['대학명']||'');
    const t = String(r['전형유형']||'');
    return (u.includes(uNorm)||uNorm.includes(u)) && (!type||t.includes(type)||type.includes(t)) && hasWeight(r);
  });
  if(byType) return {
    학업: parseFloat(byType['학업비중']), 진로: parseFloat(byType['진로비중']),
    공동체: parseFloat(byType['공동체비중']), source: byType['대학명']
  };

  // 3순위: 대학명만 매칭
  const byUniv = kbUniv.find(r => {
    const u = norm(r['대학명']||'');
    return (u.includes(uNorm)||uNorm.includes(u)) && hasWeight(r);
  });
  if(byUniv) return {
    학업: parseFloat(byUniv['학업비중']), 진로: parseFloat(byUniv['진로비중']),
    공동체: parseFloat(byUniv['공동체비중']), source: byUniv['대학명']
  };

  return { 학업:40, 진로:40, 공동체:20 }; // 기본값
}

function calcCompScore(compEval, weights){
  const GN = {S:100, A:83, B:66, C:50, D:33};
  const w = weights || { 학업:40, 진로:40, 공동체:20 };
  const 학업 = GN[compEval?.['학업역량']?.grade] || 0;
  const 진로 = GN[compEval?.['진로역량']?.grade] || 0;
  const 공동체 = GN[compEval?.['공동체역량']?.grade] || 0;
  const total = (w.학업 + w.진로 + w.공동체) || 100;
  return Math.round((학업 * w.학업 + 진로 * w.진로 + 공동체 * w.공동체) / total);
}

// 세부전형명으로 전형 성격 판단
function getSubTypeProfile(subType){
  const s = String(subType||'').replace(/\s/g,'').toLowerCase();
  if(s.includes('지역균형')||s.includes('지역인재')&&s.includes('추천')||s.includes('교사추천')||s.includes('추천형'))
    return 'local'; // 내신 중심, 수능최저 있음
  if(s.includes('논술')) return 'essay';
  if(s.includes('기회')||s.includes('농어촌')||s.includes('사회배려'))
    return 'opportunity';
  return 'general'; // 일반 종합 (비교과 중심)
}
 function calcFinalScore({stuAvg, cutoff, type, alumniResult, majorScore, compScore, suneungResult, admCases, subType}){
  let score = 50;
  const subProfile = getSubTypeProfile(subType);
  const is종합 = type==='종합' || type==='종합+교과';
  const is교과 = type==='교과';
  const is논술 = type==='논술';
  // 지역균형: 내신 비중 높음(교과전형에 가까움)
  const 내신가중 = (is종합 && subProfile==='local') ? 1.4 : 1.0;
  const 비교과가중 = (is종합 && subProfile==='local') ? 0.5 : 1.0;

  // 전국 합격자 데이터 전처리
  const gbPassGrades = (admCases?.gb||[])
    .filter(r=>{ const v=String(r.최종결과||''); return v.includes('합격')||v.includes('충원'); })
    .map(r=>parseFloat(r.환산등급)).filter(v=>!isNaN(v)&&v>0).sort((a,b)=>a-b);
  const gbPassMax = gbPassGrades.length ? gbPassGrades[gbPassGrades.length-1] : null;
  const gbPassMedian = gbPassGrades.length ? gbPassGrades[Math.floor(gbPassGrades.length*0.5)] : null;

  // ── ① 내신 vs 커트라인 ──────────────────────────────
  if(stuAvg && cutoff?.cut50){
    const diff = cutoff.cut50 - stuAvg; // 양수 = 학생이 커트보다 좋음

    if(is교과){
      // 교과전형: 내신이 사실상 전부 (±30점)
      if(diff >= 0.5)       score += 28;
      else if(diff >= 0.1)  score += 15;
      else if(diff >= -0.1) score += 5;
      else if(diff >= -0.5) score -= 15;
      else if(diff >= -1.0) score -= 25;
      else                  score -= 35;

    } else if(is종합){
      if(diff >= 0.5)       score += Math.round(18 * 내신가중);
      else if(diff >= 0)    score += Math.round(10 * 내신가중);
      else if(diff >= -0.5) score -= Math.round(5  * 내신가중);
      else if(diff >= -1.0) score -= Math.round(10 * 내신가중);
      else if(diff >= -1.5) score -= Math.round(15 * 내신가중);
      else                  score -= Math.round(20 * 내신가중);

    } else if(is논술){
      // 논술: 내신 영향 매우 작음 (±10점)
      if(diff >= 0)   score += 8;
      else if(diff >= -1.0) score -= 5;
      else                  score -= 10;
    } else {
      // 기타
      if(diff >= 0.5)  score += 15;
      else if(diff >= 0) score += 5;
      else if(diff >= -0.5) score -= 10;
      else               score -= 20;
    }
  }

  // ── ② 합격자 범위 내 여부 (전국 데이터) ─────────────
  // 종합전형에서 특히 중요 — 합격자 최고등급보다 낮으면 가능성 있음
  if(stuAvg && gbPassMax){
    if(is종합){
      if(stuAvg <= gbPassMedian)          score += 12; // 합격자 중간 이하 — 유리
      else if(stuAvg <= gbPassMax)         score += 6;  // 합격자 범위 내 — 가능
      else if(stuAvg <= gbPassMax + 0.3)   score += 0;  // 범위 아슬
      else                                score -= 8;  // 범위 밖
    } else if(is교과){
      if(stuAvg <= gbPassMedian)           score += 8;
      else if(stuAvg <= gbPassMax)         score += 3;
      else                                score -= 8;
    } else if(is논술){
      if(stuAvg <= gbPassMax)              score += 5;
    }
  }

  // ── ③ 우리학교 선배 합불 ─────────────────────────────
  if(alumniResult.total >= 3){
    const passRate = alumniResult.pass.length / alumniResult.total;
    if(passRate >= 0.7)      score += 10;
    else if(passRate >= 0.4) score += 4;
    else if(passRate <= 0.2) score -= 8;
    if(stuAvg && alumniResult.passAvg){
      if(stuAvg <= alumniResult.passAvg + 0.3)    score += 6;
      else if(stuAvg > alumniResult.passAvg + 0.8) score -= 8;
    }
  }

  // ── ④ 비교과 전공적합성 ───────────────────────────────
  // 종합전형에서 핵심 평가 요소 (±15점)
  // 교과전형에서도 세특 반영하는 경우 있으므로 ±5점 반영
  if(majorScore !== null){
    if(is종합){
      if(majorScore >= 100)     score += Math.round(15 * 비교과가중);
      else if(majorScore >= 83) score += Math.round(12 * 비교과가중);
      else if(majorScore >= 66) score += Math.round(6  * 비교과가중);
      else if(majorScore >= 50) score -= 3;
      else                      score -= 10;
    } else if(is교과){
      if(majorScore >= 83) score += 5;
      else if(majorScore <= 33) score -= 3;
    } else if(is논술){
      if(majorScore >= 83) score += 8;
      else if(majorScore >= 66) score += 3;
    }
  }

  // ── ⑤ 종합역량평가 ───────────────────────────────────
  // 종합전형에서 서류 강점 반영 (±10점)
  if(compScore !== null && is종합){
    if(compScore >= 80)      score += 10;
    else if(compScore >= 66) score += 5;
    else if(compScore >= 50) score += 1;
    else if(compScore <= 40) score -= 5;
  }

  // ── ⑥ 수능최저 페널티 ────────────────────────────────
  if(suneungResult?.status === '확인필요') score -= 5;

  score = Math.max(5, Math.min(95, Math.round(score)));

  // 등급 기준 (전형별로 다르게)
  let 상기준 = 68, 중기준 = 44;
  if(is종합){ 상기준 = 65; 중기준 = 42; } // 종합은 불확실성 크므로 기준 약간 낮춤

  const grade = score >= 상기준 ? '상' : score >= 중기준 ? '중' : '하';
  const summaries = {
    '상': '합격 가능성 높음 — 적극 지원 권장',
    '중': '합격 가능권 — 전략적 접근 필요',
    '하': '도전적 지원 — 보완 후 재검토 권장'
  };
  return { score, grade, summary: summaries[grade] };
}

function buildComments({stuAvg, cutoff, gbCutoff, type,
  alumniResult, admCases,
  majorScore, majorEntry,
  compScore, compEval, sewtukOverall,
  suneungResult, grade, studentIs9, univ, dept, note,
  gradesData, hak}){

  const GN = {S:100,A:83,B:66,C:50,D:33};

  // 비교과 분석 데이터
  const 근거들 = majorEntry ? (Array.isArray(majorEntry[1]?.핵심근거) ? majorEntry[1].핵심근거 : []) : [];
  const 약점들 = majorEntry ? (Array.isArray(majorEntry[1]?.약점)    ? majorEntry[1].약점    : []) : [];

  // 종합역량평가 세부 데이터
  const compA = compEval?.학업역량,  compJ = compEval?.진로역량,  compC = compEval?.공동체역량;
  const compAg = compA?.grade||compA?.학업역량, compJg = compJ?.grade||compJ?.진로역량, compCg = compC?.grade||compC?.공동체역량;

  // 전국 합불 통계
  const gbTotal  = admCases?.gb?.length || 0;
  const gbPass   = admCases?.gb?.filter(r=>{ const v=String(r.최종결과||''); return v.includes('합격')||v.includes('충원'); }) || [];
  const gbFail   = admCases?.gb?.filter(r=>String(r.최종결과||'').includes('불합')) || [];
  const gbPassGrades = gbPass.map(r=>parseFloat(r.환산등급)).filter(v=>!isNaN(v)&&v>0).sort((a,b)=>a-b);
  const gbPassAvg = gbPassGrades.length ? (gbPassGrades.reduce((a,b)=>a+b,0)/gbPassGrades.length).toFixed(2) : null;
  const gbPassMin = gbPassGrades[0]?.toFixed(2) ?? null;
  const gbPassMax = gbPassGrades[gbPassGrades.length-1]?.toFixed(2) ?? null;

  // 내신 핵심과목 추출 (국수영사과)
  const coreSubjects = [];
  if(gradesData?.grades){
    const allSubjs = [];
    Object.values(gradesData.grades).forEach(sd=>{
      (sd.subjects||[]).forEach(s=>{
        const cat = s.교과||'';
        const isCoreSubj = cat.includes('국어')||cat.includes('수학')||cat.includes('영어')||
          cat.includes('사회')||cat.includes('과학');
        if(isCoreSubj && s.등급) allSubjs.push({과목:s.과목||s.교과, 등급:s.등급, 교과:cat});
      });
    });
    // 교과별 최신(마지막) 등급
    const seen = new Set();
    [...allSubjs].reverse().forEach(s=>{ if(!seen.has(s.교과)){seen.add(s.교과);coreSubjects.push(s);} });
  }
  const coreAvg = coreSubjects.length
    ? (coreSubjects.reduce((a,b)=>a+b.등급,0)/coreSubjects.length).toFixed(2) : null;

 // ─── 강점 ───
  const strengths = [];
  // 내신 vs 커트라인 (입결DB → 전국추정 → 전국평균 순)
  if(stuAvg && cutoff?.cut50 && cutoff.source !== 'gb'){
    // 1순위: 입결DB 실제 데이터
    const diff = cutoff.cut50 - stuAvg;
    if(diff >= 0)
      strengths.push(`내신 ${stuAvg.toFixed(2)}등급으로 50컷(${cutoff.cut50.toFixed(2)}, 입결DB) 대비 ${diff.toFixed(2)}등급 여유`);
  } else if(stuAvg && gbCutoff?.cut50){
    // 2순위: 전국 합불 데이터 추정 50컷
    const diff = gbCutoff.cut50 - stuAvg;
    if(diff >= 0)
      strengths.push(`내신 ${stuAvg.toFixed(2)}등급으로 추정 50컷(${gbCutoff.cut50.toFixed(2)}, 전국표본) 대비 ${diff.toFixed(2)}등급 여유`);
  } else if(stuAvg && gbPassAvg && stuAvg <= parseFloat(gbPassAvg)){
    // 3순위: 전국 합격자 평균
    strengths.push(`전국 합격자 평균(${gbPassAvg}등급) 대비 내신 우위 (학생: ${stuAvg.toFixed(2)}등급)`);
  }
  // 비교과 핵심근거
  if(근거들.length) strengths.push(...근거들.slice(0,3));
  // 우리학교 선배 합격
  if(alumniResult.pass.length > 0 && stuAvg && alumniResult.passAvg){
    if(stuAvg <= alumniResult.passAvg + 0.3)
      strengths.push(`우리학교 선배 합격자 내신평균(${alumniResult.passAvg.toFixed(2)}) 대비 경쟁력 있음`);
  }
  // 종합역량 강점
  if(compAg && ['S','A'].includes(compAg)) strengths.push(`학업역량 ${compAg}등급 — ${compA?.근거?.slice(0,50)||'탐구력·학습태도 우수'}...`);
  if(compJg && ['S','A'].includes(compJg)) strengths.push(`진로역량 ${compJg}등급 — ${compJ?.근거?.slice(0,50)||'전공 연계 탐구 일관'}...`);
  if(compCg && ['S','A'].includes(compCg)) strengths.push(`공동체역량 ${compCg}등급 — 협업·소통·리더십 종합전형 서류 강점`);
  // 세특 종합의견 핵심 문장
  if(sewtukOverall){
    const sentences = sewtukOverall.replace(/\n/g,' ').split('.').filter(s=>s.trim().length>10);
    if(sentences.length) strengths.push(sentences[0].trim().slice(0,80)+'...');
  }
  if(!strengths.length) strengths.push('비교과 종합 분석을 먼저 생성하면 더 정확한 강점 파악 가능');

  // ─── 보완점 ───
  const weaknesses = [];
  // 내신 vs 커트라인 (입결DB → 전국추정 → 전국평균 순)
  if(stuAvg && cutoff?.cut50 && cutoff.source !== 'gb'){
    // 1순위: 입결DB 실제 데이터
    const diff = stuAvg - cutoff.cut50;
    if(diff > 0)
      weaknesses.push(`내신 ${stuAvg.toFixed(2)}등급이 50컷(${cutoff.cut50.toFixed(2)}, 입결DB)보다 ${diff.toFixed(2)}등급 부족`);
  } else if(stuAvg && gbCutoff?.cut50){
    // 2순위: 전국 합불 데이터 추정 50컷
    const diff = stuAvg - gbCutoff.cut50;
    if(diff > 0)
      weaknesses.push(`내신 ${stuAvg.toFixed(2)}등급이 추정 50컷(${gbCutoff.cut50.toFixed(2)}, 전국표본)보다 ${diff.toFixed(2)}등급 부족`);
  } else if(stuAvg && gbPassAvg && stuAvg > parseFloat(gbPassAvg)+0.3){
    // 3순위: 전국 합격자 평균
    weaknesses.push(`전국 합격자 평균(${gbPassAvg}등급) 대비 내신 부족 (학생: ${stuAvg.toFixed(2)}등급)`);
  }
  if(약점들.length) weaknesses.push(...약점들.slice(0,2));
 
  // 종합역량 취약점
  if(compJg && ['C','D'].includes(compJg)) weaknesses.push(`진로역량 ${compJg}등급 — 전공 연계 활동 강화 필요`);
  if(compAg && ['C','D'].includes(compAg)) weaknesses.push(`학업역량 ${compAg}등급 — 교과 성취도 제고 필요`);

  // 핵심과목 하위 등급 경고
  const weakCore = coreSubjects.filter(s=>s.등급>=5);
  if(weakCore.length>=2) weaknesses.push(`핵심교과 하위등급 과목(${weakCore.map(s=>s.과목).join('·')}) — 서류 학업역량 정량 지표 취약`);

  if(suneungResult.status === '확인필요') weaknesses.push(suneungResult.reason);
  if(!weaknesses.length) weaknesses.push('현재 데이터 기준 주요 보완점 없음 — 지속적 관리 권장');

  // ─── 전형 분석 ───
  let typeAnalysis = '';
  const avg  = stuAvg ? stuAvg.toFixed(2) : '-';
  const c50  = cutoff?.cut50 ? cutoff.cut50.toFixed(2) : (gbCutoff?.cut50 ? `~${gbCutoff.cut50.toFixed(2)}(전국추정)` : '-');
  const c70  = cutoff?.cut70 ? cutoff.cut70.toFixed(2) : (gbCutoff?.cut70 ? `~${gbCutoff.cut70.toFixed(2)}(전국추정)` : '-');

  if(type === '교과'){
    typeAnalysis = `학생부교과전형 — 내신 ${avg}등급 기준. 50컷 ${c50}등급, 70컷 ${c70}등급.`;
    if(alumniResult.pass.length > 0)
      typeAnalysis += ` 우리학교 선배 합격 ${alumniResult.pass.length}건(합격 평균 ${alumniResult.passAvg?.toFixed(2)||'-'}등급), 불합격 ${alumniResult.fail.length}건.`;
    else if(gbTotal > 0)
      typeAnalysis += ` 전국 ${gbTotal}건 데이터 기준 합격자(${gbPass.length}건) 등급 범위 ${gbPassMin}~${gbPassMax}.`;
    else typeAnalysis += ' 우리학교 선배 이력 없음.';
  } else if(type === '종합'){
    const compG = compEval ? `종합역량 ${compScore}점(학업${compAg||'-'}/진로${compJg||'-'}/공동체${compCg||'-'})` : '종합역량 데이터 없음';
    const majG  = majorEntry ? `전공적합성 ${majorEntry[1]?.전공적합성||'-'}등급` : '비교과 미분석';
    typeAnalysis = `학생부종합전형 — 서류 중심 정성평가. ${compG}, ${majG}.`;
    if(gbTotal > 0)
      typeAnalysis += ` 전국 ${gbTotal}건 기준 합격자(${gbPass.length}건) 평균내신 ${gbPassAvg||'-'}등급(범위 ${gbPassMin}~${gbPassMax}).`;
    if(alumniResult.total > 0)
      typeAnalysis += ` 우리학교 선배 ${alumniResult.total}건 지원(합격 ${alumniResult.pass.length}건).`;
    else typeAnalysis += ' 우리학교 선배 이력 없음 — 추가 조사 권장.';
  } else if(type === '논술'){
    typeAnalysis = `논술전형 — 논술 성적이 합격에 결정적(60~80% 반영). 내신 비중 낮음(20~30%).`;
    if(cutoff?.cut50) typeAnalysis += ` 내신 참고 커트 ${cutoff.cut50.toFixed(2)}등급.`;
    if(gbTotal > 0) typeAnalysis += ` 전국 ${gbPass.length}건 합격자 내신 평균 ${gbPassAvg||'-'}등급.`;
  } else {
    typeAnalysis = `${type}전형 — `;
    typeAnalysis += cutoff?.cut50 ? `50컷 ${c50}등급, 70컷 ${c70}등급.` : '입결 데이터 없음.';
    if(gbTotal > 0) typeAnalysis += ` 전국 ${gbTotal}건 기준 합격자 평균 ${gbPassAvg||'-'}등급.`;
  }

  // ─── 추천 전략 ───
  const strategy = [];

  if(type==='종합'||type==='종합+교과'){
    if(!majorEntry) strategy.push(`"비교과 종합 분석" 탭에서 ${dept} 세특 분석 먼저 생성 → 훨씬 정확한 강점 도출 가능`);
    else {
      const majorGrade = majorEntry[1]?.전공적합성;
      if(['S','A'].includes(majorGrade))
        strategy.push(`전공적합성 ${majorGrade}등급 비교과 분석을 면접·수업발표 핵심 소재로 활용`);
      else
        strategy.push(`${dept} 관련 세특 탐구 활동 추가·심화로 전공적합성 제고 필요`);
    }
  }

  if(stuAvg && cutoff?.cut50){
    const diff = cutoff.cut50 - stuAvg;
    if(diff >= 0.5) strategy.push('내신 여유폭 확보 — 추가 탐구활동·교과 연계 보고서로 서류 차별화 집중');
    else if(diff < -0.3 && diff >= -1.0) strategy.push('내신 소폭 미달 — 세특·창체·행발로 정성 평가 보완, 논술/수능 병행 검토');
    else if(diff < -1.0) strategy.push('내신 격차 과다 — 상향 소신 1장으로 활용, 중위권 안전 대학 복수 확보 필수');
  } else if(stuAvg && gbPassAvg){
    const diff = parseFloat(gbPassAvg) - stuAvg;
    if(diff >= 0) strategy.push(`전국 합격자 평균(${gbPassAvg}) 대비 우위 — 적극 지원 검토 가능`);
    else strategy.push(`전국 합격자 평균(${gbPassAvg}) 대비 내신 부족 — 전형 특성상 서류/논술로 보완 전략 수립`);
  }

  if(alumniResult.total >= 5)
    strategy.push(`우리학교 선배 ${alumniResult.total}명 지원 경험 — 담임 선생님께 구체 사례 상담 요청`);

  if(gbTotal >= 20)
    strategy.push(`전국 ${gbTotal}건 합불 데이터 분석 — 합격자 내신 범위 ${gbPassMin}~${gbPassMax}등급 참고하여 목표 등급 설정`);

  // 세특 기반 전략
  if(sewtukOverall && (type==='종합'||type==='종합+교과')){
    const keywords = sewtukOverall.match(/[가-힣]{2,8}(?:능력|역량|탐구|분석|활동|관심)/g)?.slice(0,3) || [];
    if(keywords.length) strategy.push(`세특 강점(${keywords.join('·')})을 면접·학업계획 핵심 키워드로 활용`);
  }

  if(!strategy.length) strategy.push('추가 희망학과 비교과 분석 후 전략 구체화 권장');

  // ─── 주의사항 ───
  let cautionParts = [];
  if(suneungResult.status==='확인필요') cautionParts.push(suneungResult.reason);
  if(!cutoff && !gbCutoff) cautionParts.push(`${univ} ${dept} 입결 DB 미수록 — 학교 홈페이지 직접 확인 필요`);
  else if(cutoff?.source==='gb') cautionParts.push('입결은 전국 합불 데이터 기반 추정치 — 공식 입결표와 비교 필요');
  if(!alumniResult.total) cautionParts.push('우리학교 선배 합불 데이터 없음 — 본 분석은 전국 데이터 기반 참고용');
  cautionParts.push('이 분석은 저장된 데이터 기반 참고용이며, 실제 지원 전 담임 선생님과 최종 상담 필수');
  const caution = cautionParts.join('.\n');

  return {
    strengths: strengths.join('\n'),
    weaknesses: weaknesses.join('\n'),
    typeAnalysis: typeAnalysis.trim(),
    strategy: strategy.join('\n'),
    caution: caution.trim()
  };
}

function renderApplyResultHTML(obj, resultEl){
  resultEl.innerHTML = buildApplyCardHTML(obj, null, true);
}

function buildApplyCardHTML(obj, dateStr, isNew){
  const meta = obj._meta || {};
  const score = obj.적합도점수 || 0;
  const grade = obj.적합도;

  const T = {
    '상': { c:'#065f46', bg:'#ecfdf5', accent:'#10b981', border:'#6ee7b7', tagBg:'#059669', barBg:'#d1fae5' },
    '중': { c:'#78350f', bg:'#fffbeb', accent:'#f59e0b', border:'#fcd34d', tagBg:'#d97706', barBg:'#fef3c7' },
    '하': { c:'#7f1d1d', bg:'#fef2f2', accent:'#ef4444', border:'#fca5a5', tagBg:'#dc2626', barBg:'#fee2e2' },
  };
  const t = T[grade] || { c:'#1e293b', bg:'#f8fafc', accent:'#64748b', border:'#e2e8f0', tagBg:'#475569', barBg:'#f1f5f9' };
  const gradeLabel = {'상':'합격 가능성 높음','중':'전략적 접근 필요','하':'도전적 지원'}[grade]||'분석 완료';

  // 게이지 SVG
  const r=42, cx=50, cy=50, circ=(2*Math.PI*r);
  const filled = (circ * score/100).toFixed(1);
  const gauge = `
    <div style="position:relative;width:110px;height:110px;flex-shrink:0;">
      <svg viewBox="0 0 100 100" width="110" height="110">
        <circle cx="${cx}" cy="${cy}" r="${r}" fill="none" stroke="${t.barBg}" stroke-width="9"/>
        <circle cx="${cx}" cy="${cy}" r="${r}" fill="none" stroke="${t.accent}" stroke-width="9"
          stroke-linecap="round"
          stroke-dasharray="${circ.toFixed(1)}"
          stroke-dashoffset="${(circ - filled).toFixed(1)}"
          transform="rotate(-90 ${cx} ${cy})"/>
      </svg>
      <div style="position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:1px;">
        <span style="font-size:26px;font-weight:900;color:${t.c};line-height:1;letter-spacing:-1px;">${score}</span>
        <span style="font-size:10px;color:#94a3b8;font-weight:600;">/100점</span>
      </div>
    </div>`;

  // 메타 지표 카드
  const stuAvg = meta.stuAvg ? meta.stuAvg.toFixed(2) : null;
  const cut50  = meta.cutoff?.cut50 ? meta.cutoff.cut50.toFixed(2) : null;
  const gbPass = (meta.admCases?.gb||[]).filter(r=>{ const v=String(r.최종결과||''); return v.includes('합격')||v.includes('충원'); });
  const gbPassGrades = gbPass.map(r=>parseFloat(r.환산등급||0)).filter(v=>v>0).sort((a,b)=>a-b);
  const gbPassAvg = gbPassGrades.length ? (gbPassGrades.reduce((a,b)=>a+b,0)/gbPassGrades.length).toFixed(2) : null;
  const gbPassMin = gbPassGrades[0]?.toFixed(2)??null;
  const gbPassMax = gbPassGrades[gbPassGrades.length-1]?.toFixed(2)??null;
  const majGrade = meta.majorScore!=null
    ? (meta.majorScore>=83?'A':meta.majorScore>=66?'B':meta.majorScore>=50?'C':'D')
    : null;
  const majColor = {'S':'#7c3aed','A':'#059669','B':'#0369a1','C':'#d97706','D':'#dc2626'}[majGrade]||'#94a3b8';

  // 수능최저 뱃지
  const suneungBadge = obj.수능최저충족==='해당없음'
    ? `<span style="background:#d1fae5;color:#065f46;padding:2px 9px;border-radius:20px;font-size:11px;font-weight:700;">수능최저 없음</span>`
    : obj.수능최저충족==='확인필요'
    ? `<span style="background:#fef3c7;color:#92400e;padding:2px 9px;border-radius:20px;font-size:11px;font-weight:700;">⚠ 수능최저 확인 필요</span>`
    : '';

  // 데이터 소스 뱃지
  const gbCount = meta.admCases?.gb?.length||0;
  const uw = meta.univWeights||{학업:40,진로:40,공동체:20};
  const srcBadges = [
    meta.cutoff && meta.cutoff.source!=='gb' ? '📊 입결DB' : '',
    meta.cutoff?.source==='gb'               ? '📊 전국추정' : '',
    gbCount                                  ? `🗂 전국 ${gbCount}건` : '',
    meta.alumniResult?.total                 ? `👥 선배 ${meta.alumniResult.total}명` : '',
    meta.majorScore!=null                    ? '🧬 비교과 반영' : '',
    uw.source                                ? `⚖ ${uw.학업}·${uw.진로}·${uw.공동체}` : '',
  ].filter(Boolean).map(t=>`<span style="background:#f1f5f9;color:#475569;padding:2px 8px;border-radius:5px;font-size:10px;font-weight:600;">${t}</span>`).join(' ');

  // 핵심 지표 3칸
  const metricItems = [
    stuAvg && cut50 ? {
      label:'내신 vs 50컷', icon:'📐',
      val: (parseFloat(cut50)-parseFloat(stuAvg)>=0?'+':'')+(parseFloat(cut50)-parseFloat(stuAvg)).toFixed(2),
      sub:`내 ${stuAvg} → 컷 ${cut50}`,
      color: parseFloat(cut50)-parseFloat(stuAvg)>=0?'#059669':'#dc2626'
    } : null,
    majGrade ? { label:'전공적합성', icon:'🧬', val:`${majGrade}등급`, sub:'비교과 분석', color:majColor } : null,
    gbPassAvg
      ? { label:'전국 합격자', icon:'📊', val:`${gbPassAvg}`, sub:`범위 ${gbPassMin}~${gbPassMax}`, color:'#0369a1' }
      : (meta.alumniResult?.passAvg
          ? { label:'선배 합격 평균', icon:'👥', val:`${meta.alumniResult.passAvg.toFixed(2)}등급`, sub:`${meta.alumniResult.pass.length}명`, color:'#0369a1' }
          : null),
  ].filter(Boolean);

  // 섹션 헬퍼 — 좌측 컬러 라인 + 배경 구분
  const SEC = (emoji, title, titleColor, bgColor, borderColor, body) => `
    <div style="background:${bgColor};border:1px solid ${borderColor};border-radius:12px;padding:16px 18px;margin-bottom:10px;">
      <div style="display:flex;align-items:center;gap:8px;margin-bottom:12px;">
        <span style="font-size:15px;line-height:1;">${emoji}</span>
        <span style="font-size:13px;font-weight:800;color:${titleColor};letter-spacing:.4px;">${title}</span>
      </div>
      ${body}
    </div>`;

  // 불릿 리스트
  const BULLETS = (items, dotColor) => items.map(s=>`
    <div style="display:flex;gap:9px;align-items:flex-start;padding:7px 10px;background:rgba(255,255,255,.7);border-radius:8px;margin-bottom:5px;">
      <span style="width:6px;height:6px;border-radius:50%;background:${dotColor};flex-shrink:0;margin-top:6px;"></span>
      <span style="font-size:13px;color:#1e293b;line-height:1.65;">${escapeHtml(s.trim())}</span>
    </div>`).join('');

  // 번호 리스트
  const NUMBERS = (items) => items.map((s,i)=>`
    <div style="display:flex;gap:10px;align-items:flex-start;padding:8px 12px;background:rgba(255,255,255,.75);border-radius:8px;margin-bottom:5px;">
      <span style="background:#4f46e5;color:#fff;min-width:20px;height:20px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:800;flex-shrink:0;">${i+1}</span>
      <span style="font-size:13px;color:#1e293b;line-height:1.65;">${escapeHtml(s.trim())}</span>
    </div>`).join('');

  // 텍스트 블록
  const TEXTBLOCK = (lines, lineColor) => `
    <div style="background:rgba(255,255,255,.65);border-radius:8px;padding:12px 14px;">
      ${lines.map(l=>`<div style="font-size:13px;color:${lineColor};line-height:1.85;padding:1px 0;">${escapeHtml(l)}</div>`).join('')}
    </div>`;

  const strengths  = (obj.강점||'').split('\n').filter(s=>s.trim());
  const weaknesses = (obj.보완점||'').split('\n').filter(s=>s.trim());
  const strategies = (obj.추천전략||'').split('\n').filter(s=>s.trim());
  const analysis   = (obj.전형분석||'').split(/\.(?:\s|\n)/).map(s=>s.trim()).filter(s=>s.length>2).map(s=>s+'.');
  const cautions   = (obj.주의사항||'').split('\n').filter(s=>s.trim());

  return `
<div style="font-family:'Pretendard',-apple-system,'Noto Sans KR',sans-serif;background:#f8fafc;border-radius:16px;overflow:hidden;border:1.5px solid ${t.border};box-shadow:0 6px 28px rgba(0,0,0,.07);">

  <!-- ① 헤더 바 -->
  <div style="background:${t.bg};border-bottom:2px solid ${t.border};padding:16px 20px 14px;">
    <div style="display:flex;align-items:flex-start;justify-content:space-between;gap:8px;flex-wrap:wrap;">
      <div>
        <div style="font-size:18px;font-weight:900;color:#0f172a;letter-spacing:-.3px;margin-bottom:6px;">
          ${escapeHtml(obj.univ)} <span style="color:#94a3b8;font-weight:300;">|</span> <span style="color:#1e40af;">${escapeHtml(obj.dept)}</span>
        </div>
        <div style="display:flex;align-items:center;gap:5px;flex-wrap:wrap;">
          <span style="background:${t.tagBg};color:#fff;padding:3px 11px;border-radius:20px;font-size:11px;font-weight:700;">${escapeHtml(obj.type)}전형</span>
          ${obj.subType?`<span style="background:#dbeafe;color:#1d4ed8;padding:3px 11px;border-radius:20px;font-size:11px;font-weight:700;">${escapeHtml(obj.subType)}</span>`:''}
          ${suneungBadge}
          ${dateStr?`<span style="color:#94a3b8;font-size:11px;margin-left:2px;">${dateStr}</span>`:''}
        </div>
      </div>
    </div>
    ${srcBadges ? `<div style="margin-top:8px;display:flex;flex-wrap:wrap;gap:4px;">${srcBadges}</div>` : ''}
  </div>

  <!-- ② 점수 히어로 -->
  <div style="background:${t.bg};border-bottom:1.5px solid ${t.border};padding:18px 20px;">
    <div style="display:flex;align-items:center;gap:18px;flex-wrap:wrap;">
      ${gauge}
      <div style="flex:1;min-width:160px;">
        <div style="display:flex;align-items:center;gap:8px;margin-bottom:5px;">
          <span style="background:${t.tagBg};color:#fff;padding:4px 14px;border-radius:20px;font-size:13px;font-weight:800;">${dispGrade(grade)} 등급</span>
          <span style="font-size:15px;font-weight:800;color:${t.c};">${gradeLabel}</span>
        </div>
        <div style="font-size:13px;color:#64748b;margin-bottom:12px;line-height:1.5;">${escapeHtml(obj.한줄평||'')}</div>
        ${metricItems.length ? `
        <div style="display:grid;grid-template-columns:repeat(${metricItems.length},1fr);gap:7px;">
          ${metricItems.map(m=>`
          <div style="background:#fff;border:1.5px solid #e2e8f0;border-radius:10px;padding:9px 8px;text-align:center;">
            <div style="font-size:10px;color:#94a3b8;font-weight:600;margin-bottom:2px;">${m.icon} ${m.label}</div>
            <div style="font-size:16px;font-weight:900;color:${m.color};line-height:1.2;">${m.val}</div>
            <div style="font-size:10px;color:#94a3b8;margin-top:1px;">${m.sub}</div>
          </div>`).join('')}
        </div>` : ''}
      </div>
    </div>
  </div>

  <!-- ③~⑦ 본문 섹션들 -->
  <div style="padding:14px 16px 6px;">

    ${SEC('✅','강점','#065f46','#f0fdf4','#bbf7d0',
      strengths.length ? BULLETS(strengths,'#10b981') : '<div style="color:#94a3b8;font-size:13px;padding:4px 0;">분석 데이터 없음</div>'
    )}

    ${SEC('⚠️','보완점','#92400e','#fffbeb','#fcd34d',
      weaknesses.length ? BULLETS(weaknesses,'#f59e0b') : '<div style="color:#94a3b8;font-size:13px;padding:4px 0;">주요 보완점 없음</div>'
    )}

    ${SEC('📋','전형 분석','#334155','#f1f5f9','#e2e8f0',
      TEXTBLOCK(analysis,'#475569')
    )}

    ${SEC('💡','추천 전략','#1d4ed8','#eff6ff','#bfdbfe',
      strategies.length ? NUMBERS(strategies) : '<div style="color:#94a3b8;font-size:13px;padding:4px 0;">비교과 분석 후 전략이 구체화됩니다.</div>'
    )}

    ${SEC('🔴','주의사항','#9f1239','#fff1f2','#fecaca',
      cautions.length ? BULLETS(cautions,'#f43f5e') : '<div style="color:#94a3b8;font-size:13px;padding:4px 0;">없음</div>'
    )}

  </div>

</div>`;
}

async function saveApplyHistoryItem(hak, univ, dept, type, result){
  const { _meta, ...resultToSave } = result;
  const histItem = {
    id: result.id, univ, dept, type,
    result: resultToSave,
    date: new Date().toLocaleDateString('ko-KR',{month:'2-digit',day:'2-digit'}) + ' ' +
          new Date().toLocaleTimeString('ko-KR',{hour:'2-digit',minute:'2-digit'})
  };
  applyHistory[hak] = applyHistory[hak] || [];
  applyHistory[hak].push(histItem);
  applyHistoryDB[hak] = applyHistoryDB[hak] || [];
  applyHistoryDB[hak].push(histItem);
  if(applyHistoryDB[hak].length > 50) applyHistoryDB[hak] = applyHistoryDB[hak].slice(-50);
  try {
    // 신 code.gs: saveApplyHistory (apply_history 시트)
    // 구 code.gs: 액션 없음 → error 반환 → saveEval fallback
    const r = await apiPost({ action:'saveApplyHistory', password:currentPassword, hak, item: histItem });
    if(r?.error === '알 수 없는 요청') {
      // 구 code.gs fallback: eval 시트에 저장
      const cur = evalData[hak] || {};
      cur.모의지원이력 = applyHistoryDB[hak];
      evalData[hak] = cur;
      await apiPost({ action:'saveEval', password:currentPassword, hak, evalData: evalData[hak] });
    }
  } catch(e){ console.warn('모의지원이력 DB 저장 실패:', e.message); }
}

async function deleteApplyHistory(id){
  if(!confirm('이 분석 기록을 삭제하시겠습니까?')) return;
  const hak = String(currentStu.hak);
  if(applyHistory[hak]) applyHistory[hak] = applyHistory[hak].filter(h=>h.id!==id);
  if(applyHistoryDB[hak]) applyHistoryDB[hak] = applyHistoryDB[hak].filter(h=>h.id!==id);
  try {
    const r = await apiPost({ action:'deleteApplyHistory', password:currentPassword, hak, id });
    if(r?.error === '알 수 없는 요청') {
      // 구 code.gs fallback
      const cur = evalData[hak] || {};
      cur.모의지원이력 = applyHistoryDB[hak] || [];
      evalData[hak] = cur;
      await apiPost({ action:'saveEval', password:currentPassword, hak, evalData: evalData[hak] });
    }
  } catch(e) { console.warn('삭제 DB 반영 실패:', e.message); }
  // UI 갱신
  const el = document.getElementById('tabContent');
  if(el) renderMockApplyTab(el);
}

async function runMajorAnalysis(){
  const dept = document.getElementById('majorDeptInput')?.value?.trim();
  if(!dept){ alert('학과명을 입력하세요.'); return; }

  const statusEl = document.getElementById('majorModalStatus');
  const runBtn = document.getElementById('majorRunBtn');
  if(runBtn){ runBtn.disabled=true; runBtn.textContent='⏳ 분석 중...'; }
  if(statusEl) statusEl.textContent = 'AI가 세특·창체·행발을 분석하고 있습니다...';

  const hak = String(currentStu.hak);
  const g2hak = currentStu.g2_hak ? String(currentStu.g2_hak) : null;
  const g1hak = currentStu.g1_hak ? String(currentStu.g1_hak) : null;

  const stuData = sewtuk[hak] || (g2hak?sewtuk[g2hak]:null) || (g1hak?sewtuk[g1hak]:null);
  const ccData  = changche[hak] || (g2hak?changche[g2hak]:null) || (g1hak?changche[g1hak]:null);

  // ── 행발 원문 추출 (구조: {1:'...', 2:'...'} 또는 {원문:{1:'...',2:'...'}}) ──
  const hbRaw = {};
  [hak, g2hak, g1hak].filter(Boolean).forEach(k => {
    const hb = haengbal[k];
    if(!hb) return;
    const raw = hb.원문 || hb;
    ['1','2','3'].forEach(g => { if(typeof raw[g]==='string' && !hbRaw[g]) hbRaw[g]=raw[g]; });
  });
  // 행발 AI 요약이 있으면 우선 사용
  const hbEval = evalData[hak] || (g2hak?evalData[g2hak]:null) || (g1hak?evalData[g1hak]:null) || {};
  const hbAISummary = hbEval.행발종합평가?.종합의견 || '';
  const hbRawText   = Object.values(hbRaw).join(' ');
  const hbSummary   = (hbAISummary || hbRawText).substring(0, 300);

  // 세특 요약 (교과별 핵심)
  let sewtukSummary = '';
  if(stuData?.subjects){
    stuData.subjects.slice(0,10).forEach(s=>{
      if(s.요약){
        const y = Array.isArray(s.요약) ? s.요약.join(' ') : String(s.요약||'');
        if(y.trim()) sewtukSummary += `[${s.교과}] ${y.substring(0,100)}\n`;
      }
    });
  }
  // 세특 없으면 종합역량 의견 활용
  if(!sewtukSummary){
    const evOp = (evalData[hak]||{})?.종합역량평가?.종합의견 || sewtuk[hak]?.종합평가?.종합의견 || '';
    if(evOp) sewtukSummary = evOp.substring(0, 400);
  }

  const ccSummary = String(ccData?.종합의견 || ccData?.창체종합평가?.종합의견 || '');

  // 내신 평균 계산 (프롬프트용)
  let stuAvgStr = '';
  const _gd = getStudentGrades(currentStu);
  if(_gd?.grades){
    let tc=0, tw=0;
    Object.values(_gd.grades).forEach(sd=>{
      (sd.subjects||[]).forEach(s=>{ if(s.등급&&s.학점){ tc+=s.학점; tw+=s.등급*s.학점; } });
    });
    if(tc>0) stuAvgStr = (tw/tc).toFixed(2)+'등급';
  }
  const _lastMock = (Array.isArray(mock[hak])?mock[hak]:[]).slice(-1)[0];
  const mockStr = _lastMock
    ? '국'+(_lastMock.국어?.등급||'?')+'·수'+(_lastMock.수학?.등급||'?')+'·영'+(_lastMock.영어?.등급||'?')
    : '미확인';

  const prompt = '다음은 고등학생의 학생부 데이터입니다. 이 학생이 "'+dept+'"에 지원할 때의 전공 적합성을 심층 분석해주세요.\n\n'
    +'[학생 기본 정보]\n'
    +'- 내신 평균: '+(stuAvgStr||'미확인')+'\n'
    +'- 최근 모의고사: '+mockStr+'\n\n'
    +'[세특 주요 활동]\n'+(sewtukSummary||'데이터 없음')+'\n\n'
    +'[창체 종합]\n'+(ccSummary.substring(0,400)||'데이터 없음')+'\n\n'
    +'[행발 종합]\n'+(hbSummary||'데이터 없음')+'\n\n'
    +'아래 JSON 형식으로만 응답하세요 (마크다운 없이). 실제 학생 데이터에 근거해 구체적으로 작성하세요:\n'
    +'{\n'
    +'  "전공적합성": "A",\n'
    +'  "한줄평": "25자 이내 핵심 특징 요약",\n'
    +'  "종합의견": "'+dept+' 전공 적합성 종합 평가 (70자 이내)",\n'
    +'  "핵심근거": ["세특·창체 기반 구체적 강점1 (30자 이내)", "강점2", "강점3", "강점4"],\n'
    +'  "약점": ["보완 필요 약점1 (25자 이내)", "약점2", "약점3"],\n'
    +'  "추천활동": ["전공 준비 추천 활동1", "추천활동2", "추천활동3"],\n'
    +'  "관련교과": ["전공 연관 교과목1", "교과목2", "교과목3"],\n'
    +'  "면접키워드": ["면접 강조 키워드1", "키워드2", "키워드3"]\n'
    +'}';

  try {
    // AI 호출
    const aiRes = await apiPost({ action:'callClaude', password:currentPassword, prompt }, 25000);
    if(aiRes.error) throw new Error(aiRes.error);

    let obj;
    try { obj = JSON.parse((aiRes.text||'').replace(/```json|```/g,'').trim()); }
    catch { throw new Error('응답 파싱 실패 — 다시 시도해주세요'); }

    // 로컬 상태 업데이트
    majorAnalysisDB[hak] = majorAnalysisDB[hak] || {};
    majorAnalysisDB[hak][dept] = { ...obj, 분석일: new Date().toLocaleDateString('ko-KR') };

    // DB 저장 (신 code.gs: major_analysis 시트 / 구 code.gs: eval 시트 fallback)
    if(statusEl) statusEl.textContent = '💾 DB에 저장 중...';
    let saveRes = await apiPost({
      action: 'saveMajorAnalysis', password: currentPassword, hak,
      dept, analysis: majorAnalysisDB[hak][dept]
    }, 15000);
    if(saveRes?.error === '알 수 없는 요청') {
      // 구 code.gs fallback: saveEval에 전체 객체로 저장
      saveRes = await apiPost({
        action: 'saveEval', password: currentPassword, hak,
        evalData: { 희망학과분석: majorAnalysisDB[hak] }
      }, 15000);
    } else if(saveRes?.error === '권한 없음') {
      // 구 code.gs saveMajorAnalysis 호환 형식으로 재시도 (data.analysis = 전체 객체)
      saveRes = await apiPost({
        action: 'saveMajorAnalysis', password: currentPassword, hak,
        analysis: majorAnalysisDB[hak]  // 구버전 형식: 전체 객체
      }, 15000);
    }
    if(saveRes?.error) throw new Error(`저장 실패: ${saveRes.error}`);

    if(statusEl) statusEl.innerHTML = `<span style="color:#10b981;">✅ ${dept} 분석 완료 (전공적합성: ${obj.전공적합성}등급) — DB 저장 완료</span>`;
    if(runBtn){ runBtn.disabled=false; runBtn.textContent='✨ 다시 분석'; }

    setTimeout(()=>{
      document.getElementById('majorModal')?.remove();
      const el = document.getElementById('tabContent');
      if(el) renderMockApplyTab(el);
    }, 1500);

  } catch(e) {
    if(statusEl) statusEl.innerHTML = `<span style="color:#ef4444;">❌ ${e.message}</span>`;
    if(runBtn){ runBtn.disabled=false; runBtn.textContent='✨ AI 분석 시작'; }
  }
}

async function deleteMajorAnalysis(dept){
  if(!confirm(`"${dept}" 분석을 삭제하시겠습니까?`)) return;
  const hak = String(currentStu.hak);
  if(majorAnalysisDB[hak]) delete majorAnalysisDB[hak][dept];
  try {
    const r = await apiPost({ action:'deleteMajorAnalysis', password:currentPassword, hak, dept });
    if(r?.error === '알 수 없는 요청') {
      // 구 code.gs fallback
      await apiPost({
        action: 'saveEval', password: currentPassword, hak,
        evalData: { 희망학과분석: majorAnalysisDB[hak] || {} }
      });
    }
  } catch(e) { console.warn('학과분석 삭제 DB 반영 실패'); }
  const el = document.getElementById('tabContent');
  if(el) renderMockApplyTab(el);
}

    || (currentStu.g2_hak ? sewtuk[String(currentStu.g2_hak)] : null)

    stuData.subjects.forEach(s=>{

        <div style="font-size:13px;font-weight:800;color:#92400e;margin-bottom:4px;">독서활동 안내 (1·2학년)</div>
        <div style="font-size:12.5px;color:#78350f;line-height:1.7;">
          2024학년도부터 <b>독서활동상황은 대입에 미반영</b>됩니다.<br>
          대신 세특에 책 제목·저자·독서 내용을 녹여 작성해야 독서역량이 평가됩니다.<br>
          아래는 세특에서 확인된 독서 관련 언급이에요.
        </div>
      </div>
    </div>
    ${mentions.length ? `
      <div style="font-size:13px;font-weight:700;color:#1e293b;margin-bottom:12px;">📚 세특에서 확인된 독서 관련 활동 (${mentions.length}건)</div>
      <div style="display:flex;flex-direction:column;gap:8px;">
        ${mentions.map(m=>`
          <div style="background:#f8fafc;border:1px solid #e8edf5;border-radius:10px;padding:12px 14px;">
            <div style="font-size:12px;font-weight:700;color:#6366f1;margin-bottom:4px;">${escapeHtml(m.교과)} — ${escapeHtml(m.과목)}</div>
            <div style="font-size:12px;color:#475569;line-height:1.7;">${escapeHtml(m.snippet)}…</div>
          </div>`).join('')}
      </div>` : `
      <div style="color:#94a3b8;text-align:center;padding:30px;font-size:13px;">
        세특에서 독서 관련 언급을 찾지 못했습니다.<br>
        <span style="font-size:12px;">세특에 도서명·저자를 명시하면 독서역량으로 평가받을 수 있습니다.</span>
      </div>`}
  </div>`;
}


function renderCompEvalTab(el){
  const hak = String(currentStu.hak);
  const g2hak = currentStu.g2_hak ? String(currentStu.g2_hak) : null;
  const g1hak = currentStu.g1_hak ? String(currentStu.g1_hak) : null;

  // evalData는 현재 학번 우선, 없으면 이전 학년 학번에서도 확인
  const eval_ = evalData[hak]?.종합역량평가
    || (g2hak ? evalData[g2hak]?.종합역량평가 : null)
    || (g1hak ? evalData[g1hak]?.종합역량평가 : null)
    // sewtuk에도 저장되는 구버전 호환
    || sewtuk[hak]?.종합역량평가
    || (g2hak ? sewtuk[g2hak]?.종합역량평가 : null)
    || null;

  // eval_ 없어도 합격사례 벤치마크는 표시 — 조건 완화
  if(!eval_){
    // evalData 없으면 합격사례만 표시
    el.innerHTML = `<div class="card" style="padding:16px;">
      <div class="no-data" style="margin-bottom:16px;">📋 종합 역량 평가 데이터가 없습니다<br>
        <small style="color:#94a3b8;">admin에서 🏆 종합 역량 평가 (내신+세특+창체+행발) 버튼으로 생성해주세요</small>
      </div>
      <div id="evalSuccessCasesAreaOnly"></div>
    </div>`;
    requestAnimationFrame(() => {
      const area = document.getElementById('evalSuccessCasesAreaOnly');
      if(area) area.innerHTML = renderSuccessCasesSection();
    });
    return;
  }

  // 활동분해·추천 데이터
  const decompData = evalData[hak]?.활동분해종합
    || (g2hak ? evalData[g2hak]?.활동분해종합 : null) || null;
  const recData = evalData[hak]?.맞춤활동추천
    || (g2hak ? evalData[g2hak]?.맞춤활동추천 : null) || null;

  el.innerHTML = `<div class="card" style="padding:16px;">
    <div id="evalRadarArea"></div>
    <div id="evalGradeTrendArea"></div>
    <div id="evalSwotArea"></div>
    <div id="evalSuccessCasesArea"></div>
    <div id="evalAdmissionsArea"></div>
    ${decompData ? renderIndexDecompSection(decompData) : ''}
    ${recData ? renderIndexRecSection(recData) : ''}
  </div>`;

  requestAnimationFrame(() => {
    drawEvalRadar(eval_, document.getElementById('evalRadarArea'));
    // 레이더 아래에 종합역량평가 패널 삽입
    const radArea = document.getElementById('evalRadarArea');
    if(radArea){
      const panelDiv = document.createElement('div');
      panelDiv.innerHTML = renderCompEvalPanel(eval_);
      radArea.after(panelDiv);
      // 아코디언 초기화: 첫 번째 항목 펼치기
      requestAnimationFrame(initEvalAccordions);
    }
    drawGradeTrend(document.getElementById('evalGradeTrendArea'));
    renderSwotSection(hak, eval_, document.getElementById('evalSwotArea'));
    // 합격사례 벤치마크 (학종 합격자 패턴)
    const sucArea = document.getElementById('evalSuccessCasesArea');
    if(sucArea) sucArea.innerHTML = renderSuccessCasesSection();
    // 희망전공 합불 현황
    const admArea = document.getElementById('evalAdmissionsArea');
    if(admArea) admArea.innerHTML = renderMajorAdmissions();
  });
}

// ========== 레이더 + 게이지 통합 카드 ==========
function drawEvalRadar(eval_, container){
  if(!container) return;
  if(radarChartInst){ radarChartInst.destroy(); radarChartInst=null; }

  // 새 10단계 등급 + 구 등급 하위호환
  const GN  = {'A+':97,'A0':91,'A-':84,'B+':78,'B0':72,'B-':66,'C+':60,'C0':54,'C-':48,'D':35, S:100,A:83,B:66,C:50,D:33};
  const GNR = {'A+':6,'A0':5.5,'A-':5,'B+':4.5,'B0':4,'B-':3.5,'C+':3,'C0':2.5,'C-':2,'D':1.5, S:6,A:5,B:4,C:3,D:2};
  const GC  = {'A+':'#4f46e5','A0':'#10b981','A-':'#34d399','B+':'#06b6d4','B0':'#0891b2','B-':'#0e7490','C+':'#f59e0b','C0':'#d97706','C-':'#b45309','D':'#ef4444','S':'#6366f1','A':'#10b981','B':'#06b6d4','C':'#f59e0b','-':'#cbd5e1'};
  const BGC = {'A+':'rgba(79,70,229,.1)','A0':'rgba(16,185,129,.1)','A-':'rgba(52,211,153,.08)','B+':'rgba(6,182,212,.1)','B0':'rgba(8,145,178,.1)','B-':'rgba(14,116,144,.08)','C+':'rgba(245,158,11,.1)','C0':'rgba(217,119,6,.1)','C-':'rgba(180,83,9,.08)','D':'rgba(239,68,68,.1)','S':'rgba(99,102,241,.1)','A':'rgba(16,185,129,.1)','B':'rgba(6,182,212,.1)','C':'rgba(245,158,11,.1)'};
  const GRP = {
    '학업역량':  {icon:'📚',color:'#6366f1',bg:'rgba(99,102,241,.08)',barColor:'#818cf8',
      subs:[['성취도','학업성취도'],['태도','학업태도'],['탐구력','탐구력']]},
    '진로역량':  {icon:'🎯',color:'#f59e0b',bg:'rgba(245,158,11,.08)',barColor:'#fbbf24',
      subs:[['교과이수','전공관련교과이수'],['교과성취','전공관련교과성취도'],['진로탐색','진로탐색활동']]},
    '공동체역량':{icon:'🤝',color:'#10b981',bg:'rgba(16,185,129,.08)',barColor:'#34d399',
      subs:[['협업','협업소통'],['나눔','나눔배려'],['성실','성실규칙준수'],['리더십','리더십']]}
  };
  const axes=[
    {label:'학업성취도',grp:'학업역량',  sub:'학업성취도'},
    {label:'학업태도',  grp:'학업역량',  sub:'학업태도'},
    {label:'탐구력',    grp:'학업역량',  sub:'탐구력'},
    {label:'교과이수',  grp:'진로역량',  sub:'전공관련교과이수'},
    {label:'교과성취도',grp:'진로역량',  sub:'전공관련교과성취도'},
    {label:'진로탐색',  grp:'진로역량',  sub:'진로탐색활동'},
    {label:'협업·소통', grp:'공동체역량',sub:'협업소통'},
    {label:'나눔·배려', grp:'공동체역량',sub:'나눔배려'},
    {label:'성실성',    grp:'공동체역량',sub:'성실규칙준수'},
    {label:'리더십',    grp:'공동체역량',sub:'리더십'},
  ];

  function getG(grp,sub){const d=eval_[grp]?.[sub];if(!d)return null;return typeof d==='string'?d:d.grade;}
  function gColor(g){return GC[g||'-']||'#cbd5e1';}
  function gPct(g){return GN[g]||16;}

  // 종합 점수 — admin이 저장한 값 우선, 없으면 계산
  const grps=Object.keys(GRP);
  const total = eval_.종합점수 != null ? Math.round(eval_.종합점수) :
    Math.round(grps.map(k=>GN[eval_[k]?.grade]||0).reduce((a,b)=>a+b,0)/grps.length);
  const overallGrade = eval_.종합등급 || (total>=97?'A+':total>=91?'A0':total>=84?'A-':total>=78?'B+':total>=72?'B0':total>=66?'B-':total>=60?'C+':total>=54?'C0':total>=48?'C-':'D');
  const color=GC[overallGrade]||'#64748b';

  // 게이지 SVG
  const r=44,cx=50,cy=50,circ=2*Math.PI*r;
  const dash=(circ*total/100).toFixed(1);

  // 내신 평균
  let gisuHtml='';
  const gradeData=grades[String(currentStu?.hak)];
  if(gradeData){
    const avg=calcStudentAvg(gradeData,null,currentStu);
    if(avg!=null){
      const is9=isStudent9Grade(currentStu);
      const bc=is9?'#ede9fe':'#dbeafe',tc=is9?'#6d28d9':'#1d4ed8';
      gisuHtml=`<span class="eval-gauge-gisu" style="background:${bc};color:${tc};padding:2px 8px;border-radius:6px;font-size:10px;font-weight:700;">내신 ${avg.toFixed(2)}등급</span>`;
    }
  }

  // 우측 역량 카드
  const statCards=Object.entries(GRP).map(([grp,cfg])=>{
    const g=eval_[grp]?.grade||'-';
    const pct=gPct(g);
    const subsHtml=cfg.subs.map(([lbl,sub])=>{
      const sg=getG(grp,sub)||'-';
      return `<span style="margin-right:9px;">${lbl}: <b style="color:${gColor(sg)};font-weight:800;">${dispGrade(sg)}</b></span>`;
    }).join('');
    return `<div class="radar-stat-card grp-${grp}">
      <div class="radar-stat-icon" style="background:${cfg.bg}">${cfg.icon}</div>
      <div class="radar-stat-info">
        <div class="radar-stat-name" style="color:${cfg.color}">${grp}</div>
        <div class="radar-stat-bar"><div class="radar-stat-bar-fill" style="width:${pct}%;background:${cfg.barColor}"></div></div>
        <div class="radar-stat-subs">${subsHtml}</div>
      </div>
      <div class="radar-stat-right">
        <div class="radar-stat-grade" style="color:${gColor(g)}">${dispGrade(g)}</div>
        <div class="radar-stat-grade-label">등급</div>
      </div>
    </div>`;
  }).join('');

  const gradeHints=['D','C','B','A','S'].map(g=>
    `<span class="radar-hint-grade" style="background:${GC[g]}18;color:${gColor(g)}">${g}</span>`
  ).join('');

  const 진로Val = currentStu?.진로 || currentStu?.career || '미입력';
  const 전공Val = currentStu?.전공 || currentStu?.major  || '미입력';

  container.innerHTML=`
    <div class="eval-radar-card">
      <div class="eval-radar-card-header">
        <div class="eval-radar-card-title">
          <span style="width:8px;height:8px;border-radius:50%;background:linear-gradient(135deg,#6366f1,#8b5cf6);display:inline-block;"></span>
          역량 레이더
          <span class="radar-card-badge">종합역량 프로필</span>
        </div>
        <div style="display:flex;align-items:center;gap:8px;flex-wrap:wrap;">
          <!-- 진로/전공 표시 -->
          <div id="careerDisplay" style="display:flex;align-items:center;gap:5px;font-size:12px;padding:5px 10px;background:#f8fafc;border:1px solid #e2e8f0;border-radius:8px;">
            <span style="color:#94a3b8;font-weight:500;">희망진로</span>
            <span id="careerVal" style="font-weight:700;color:#1e293b;max-width:100px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;" title="${escapeHtml(진로Val)}">${escapeHtml(진로Val)}</span>
            <span style="color:#e2e8f0;margin:0 2px;">|</span>
            <span style="color:#94a3b8;font-weight:500;">희망전공</span>
            <span id="majorVal" style="font-weight:700;color:#1e293b;max-width:130px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;" title="${escapeHtml(전공Val)}">${escapeHtml(전공Val)}</span>
          </div>
          <!-- 수정 버튼 -->
          <button onclick="openCareerEditModal()" class="print-no"
            style="display:flex;align-items:center;gap:4px;padding:5px 11px;background:#f0fdf4;border:1.5px solid #bbf7d0;border-radius:8px;font-size:12px;font-weight:600;color:#16a34a;cursor:pointer;white-space:nowrap;">
            ✏️ 수정
          </button>
          <!-- 인쇄 버튼 -->
          <button onclick="printCompEval()" class="print-no"
            style="display:flex;align-items:center;gap:5px;padding:5px 14px;background:#f8fafc;border:1.5px solid #e2e8f0;border-radius:8px;font-size:12px;font-weight:600;color:#475569;cursor:pointer;white-space:nowrap;"
            onmouseover="this.style.background='#eff6ff';this.style.borderColor='#6366f1';this.style.color='#6366f1';"
            onmouseout="this.style.background='#f8fafc';this.style.borderColor='#e2e8f0';this.style.color='#475569';">
            🖨️ 종합역량평가 인쇄
          </button>
        </div>
      </div>
      <div class="eval-radar-grid">
        <!-- 모바일: 게이지+레이더 나란히 wrapper -->
        <div class="eval-gauge-radar-row">
        <!-- 1열: 게이지 -->
        <div class="eval-gauge-col">
          <div class="eval-gauge-wrap">
            <svg viewBox="0 0 100 100" width="220" height="220">
              <circle class="eval-gauge-bg" cx="${cx}" cy="${cy}" r="${r}"/>
              <circle class="eval-gauge-fill" cx="${cx}" cy="${cy}" r="${r}"
                stroke="${color}" stroke-dasharray="${circ.toFixed(1)}"
                stroke-dashoffset="${(circ-dash).toFixed(1)}"/>
            </svg>
            <div class="eval-gauge-inner">
              <div class="eval-gauge-num" style="color:${color}">${total}</div>
              <div class="eval-gauge-denom">/ 100</div>
            </div>
          </div>
          <div class="eval-gauge-badge" style="background:${BGC[overallGrade]||'#f1f5f9'};color:${color};">${dispGrade(overallGrade)}등급 수준</div>
          ${gisuHtml}
        </div>
        <!-- 2열: 레이더 -->
        <div class="eval-radar-canvas-box"><canvas id="radarCanvas"></canvas></div>
        </div><!-- /eval-gauge-radar-row -->
        <!-- 3열: 역량 카드 -->
        <div class="eval-radar-stat-list">
          ${statCards}
          <div class="radar-hint" style="margin-top:4px;">등급 기준 &nbsp; ${gradeHints}</div>
        </div>
      </div>
    </div>`;

  const ctx=document.getElementById('radarCanvas');
  if(!ctx) return;

  const groupArcPlugin={
    id:'radarGroupArc',
    beforeDraw(chart){
      const {ctx:c,scales:{r}}=chart;if(!r)return;
      const cx=r.xCenter,cy=r.yCenter,n=axes.length;
      [{color:'rgba(99,102,241,.05)',indices:[0,1,2]},{color:'rgba(245,158,11,.05)',indices:[3,4]},{color:'rgba(16,185,129,.05)',indices:[5,6,7,8]}]
      .forEach(({color,indices})=>{
        if(indices.length<2)return;
        const a0=r.getIndexAngle(indices[0])-Math.PI/2-(Math.PI/n)*.3;
        const a1=r.getIndexAngle(indices[indices.length-1])-Math.PI/2+(Math.PI/n)*.3;
        const maxR=r.getDistanceFromCenterForValue(6)*1.08;
        c.save();c.beginPath();c.moveTo(cx,cy);c.arc(cx,cy,maxR,a0,a1);c.closePath();c.fillStyle=color;c.fill();c.restore();
      });
    }
  };

  radarChartInst=new Chart(ctx,{
    type:'radar',plugins:[groupArcPlugin],
    data:{
      labels:axes.map(a=>a.label),
      datasets:[{
        label:'역량 프로필',
        data:axes.map(a=>GNR[getG(a.grp,a.sub)]||1),
        backgroundColor:'rgba(99,102,241,.08)',borderColor:'#6366f1',borderWidth:2,
        pointBackgroundColor:axes.map(a=>GRP[a.grp]?.color||'#64748b'),
        pointBorderColor:'#fff',pointBorderWidth:2,pointRadius:5,pointHoverRadius:8,
      }]
    },
    options:{
      responsive:true,maintainAspectRatio:true,
      animation:{duration:700,easing:'easeOutQuart'},
      plugins:{

// ========== ⑤ 내신 학기별 등급 추이 ==========
function drawGradeTrend(container){
  if(!container) return;

  // getStudentGrades로 현재 학생의 전체 학기 데이터 수집 (3학년은 현재 hak에 1~3학년 모두 포함)
  const gradeData = getStudentGrades(currentStu);
  if(!gradeData?.grades){ container.innerHTML=''; return; }

  const semMap={};
  Object.entries(gradeData.grades).forEach(([sem,semData])=>{
    const subjs=semData.subjects||[];
    const semIs9=isSem9Grade(currentStu,semData);
    let cr=0,wt=0;
    subjs.forEach(s=>{
      if(s.등급==null||!s.학점) return;
      const g=s.등급;
      if(g!=null){cr+=s.학점;wt+=g*s.학점;}
    });
    if(cr>0) semMap[sem]={avg:wt/cr,is9:semIs9};
  });

  const sems=Object.keys(semMap).sort();
  if(!sems.length){ container.innerHTML=''; return; }

  const has9=sems.some(s=>semMap[s].is9);
  const maxG=has9?9:5;
  const MAX_H=160;

  function barH(avg){ return Math.max(6,Math.round((avg/maxG)*MAX_H)); }
  function gradeColor(avg){
    const pct=avg/maxG;
    if(pct<=0.22) return '#10b981';
    if(pct<=0.44) return '#06b6d4';
    if(pct<=0.67) return '#f59e0b';
    return '#ef4444';
  }
  function changeTag(prev,curr){
    const diff=Math.round((curr-prev)*100)/100;
    if(Math.abs(diff)<0.05) return `<span class="eval-grade-trend-change same">—</span>`;
    if(curr>prev) return `<span class="eval-grade-trend-change down">▲${Math.abs(diff).toFixed(2)}</span>`;
    return `<span class="eval-grade-trend-change up">▼${Math.abs(diff).toFixed(2)}</span>`;
  }

  // ── 자동 코멘트 생성 ──
  function buildTrendComment(){
    if(sems.length < 2) return null;
    const avgs = sems.map(s=>semMap[s].avg);
    const first = avgs[0], last = avgs[avgs.length-1];
    const totalDiff = last - first; // 양수=악화, 음수=향상
    const diffs = avgs.slice(1).map((v,i)=>v-avgs[i]);
    const upCount   = diffs.filter(d=>d>0.05).length;  // 악화
    const downCount = diffs.filter(d=>d<-0.05).length; // 향상
    const sameCount = diffs.filter(d=>Math.abs(d)<=0.05).length;

    let trend='', detail='', icon='', color='';

    if(totalDiff < -0.3){
      trend='전체적으로 성적이 꾸준히 향상되고 있음';
      icon='📈'; color='#10b981';
    } else if(totalDiff > 0.3){
      trend='전체적으로 성적이 하락하는 추세임';
      icon='📉'; color='#ef4444';
    } else {
      trend='전체적으로 성적이 비슷한 수준을 유지하고 있음';
      icon='📊'; color='#06b6d4';
    }

    if(downCount > upCount){
      detail = `${sems.length}개 학기 중 ${downCount}회 향상, ${upCount}회 하락`;
    } else if(upCount > downCount){
      detail = `${sems.length}개 학기 중 ${upCount}회 하락, ${downCount}회 향상`;
    } else {
      detail = `${sems.length}개 학기 중 향상·하락이 균등하게 나타남`;
    }

    const bestSem = sems[avgs.indexOf(Math.min(...avgs))];
    const [by,bs] = bestSem.split('-');
    detail += ` · 최고 ${by}학년 ${bs}학기 (${Math.min(...avgs).toFixed(2)}등급)`;

    return {trend, detail, icon, color};
  }

  const comment = buildTrendComment();

  const cols=sems.map((sem,i)=>{
    const {avg,is9}=semMap[sem];
    const h=barH(avg);
    const c=gradeColor(avg);
    const [yr,st]=sem.split('-');
    const prev=i>0?semMap[sems[i-1]].avg:null;
    const chg=prev!=null?changeTag(prev,avg):'';
    const scaleTag=`<span style="font-size:9px;color:#9333ea;font-weight:700;">[${is9?9:5}]</span>`;
    return `<div class="eval-grade-trend-col">
      <div class="eval-grade-trend-val" style="color:${c};font-size:13px;font-weight:900;">${avg.toFixed(2)}</div>
      <div class="eval-grade-trend-bar-wrap">
        <div class="eval-grade-trend-bar" style="height:${h}px;background:linear-gradient(180deg,${c}cc,${c});width:36px;"></div>
      </div>
      <div class="eval-grade-trend-label" style="font-size:11px;">${yr}학년<br>${st}학기${scaleTag}</div>
      <div style="margin-top:3px;min-height:16px;">${chg}</div>
    </div>`;
  }).join('');

  const yLabels=Array.from({length:maxG},(_,i)=>i+1)
    .map(v=>`<div style="font-size:9px;color:#e2e8f0;font-weight:600;line-height:1;">${v}</div>`)
    .join('');

  container.innerHTML=`
    <div class="eval-grade-trend-card">
      <div class="eval-grade-trend-header">
        <div class="eval-grade-trend-title">
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="#06b6d4" stroke-width="2.5"><polyline points="22 12 18 12 15 21 9 3 6 12 2 12"/></svg>
          내신 학기별 등급 변화
          <span style="font-size:11px;color:#94a3b8;font-weight:500;">(${maxG}등급제 · 낮을수록 우수)</span>
        </div>
        <span style="font-size:11px;color:#94a3b8;background:#f1f5f9;padding:3px 10px;border-radius:20px;font-weight:600;">${sems.length}개 학기</span>
      </div>
      ${comment ? `
      <div style="display:flex;align-items:flex-start;gap:10px;background:${comment.color}0f;border:1.5px solid ${comment.color}30;border-radius:12px;padding:12px 16px;margin-bottom:16px;">
        <span style="font-size:18px;flex-shrink:0;">${comment.icon}</span>
        <div>
          <div style="font-size:14px;font-weight:800;color:${comment.color};margin-bottom:3px;">${comment.trend}</div>
          <div style="font-size:12px;color:#64748b;">${comment.detail}</div>
        </div>
      </div>` : ''}
      <div style="display:flex;align-items:flex-end;gap:0;overflow-x:auto;">
        <div style="display:flex;flex-direction:column;justify-content:space-between;height:${MAX_H+44}px;padding:0 8px 44px 0;flex-shrink:0;">${yLabels}</div>
        <div style="flex:1;display:flex;align-items:flex-end;gap:0;">${cols}</div>
      </div>
    </div>`;
}

function buildSwotHTML(swot){
  const strengths  = Array.isArray(swot.강점)   ? swot.강점   : (swot.강점||'').split('\n').filter(Boolean);
  const weaknesses = Array.isArray(swot.보완점) ? swot.보완점 : (swot.보완점||'').split('\n').filter(Boolean);
  const summary = swot.한줄요약 || '';

  const strItems  = strengths.map(s=>`<div class="eval-swot-item"><div class="eval-swot-dot" style="background:#16a34a"></div><span>${escapeHtml(String(s).replace(/^[-·•\d.]\s*/,''))}</span></div>`).join('');
  const weakItems = weaknesses.map(w=>`<div class="eval-swot-item"><div class="eval-swot-dot" style="background:#ea580c"></div><span>${escapeHtml(String(w).replace(/^[-·•\d.]\s*/,''))}</span></div>`).join('');

  const summaryRow = summary
    ? `<div class="eval-swot-summary"><span class="eval-swot-summary-icon">💡</span><span><strong>한줄요약</strong>  ${escapeHtml(summary)}</span></div>`
    : '';

  return `<div class="eval-swot-section">
    ${summaryRow}
    <div class="eval-swot-card strength">
      <div class="eval-swot-title" style="color:#15803d;">✅ 핵심 강점</div>
      ${strItems||'<div style="color:#94a3b8;font-size:12px;">데이터 없음</div>'}
    </div>
    <div class="eval-swot-card weakness">
      <div class="eval-swot-title" style="color:#c2410c;">⚠️ 보완 포인트</div>
      ${weakItems||'<div style="color:#94a3b8;font-size:12px;">데이터 없음</div>'}
    </div>
  </div>`;
}

      </div>
      ${groupHtml}
    </div>`;
}

    const bgCls=`og-${d.grade||'X'}`;
    const subHtml=Object.entries(d.세부||{}).map(([k,v])=>
      `<div class="overall-sub-row"><span class="overall-sub-name">${k}</span><span class="overall-sub-grade" style="color:${GC[v]||'#94a3b8'}">${dispGrade(v)}</span></div>`
    ).join('');
    return `<div class="overall-eval-group ${bgCls}" style="border-top:3px solid ${color};">
      <div class="overall-group-header">
        <div class="overall-group-label">${label}</div>
      </div>
      <div class="overall-group-body">
        <div class="overall-group-grade" style="color:${color}">${dispGrade(d.grade)}</div>
        <div class="overall-sub-list">${subHtml}</div>
      </div>
      ${d.근거?`<div class="overall-reason-bar" data-pid="${pid}">${escapeHtml(d.근거)}</div>`:''}
    </div>`;
  };

  const has근거 = ['학업역량','진로역량','공동체역량'].some(k=>overall[k]?.근거);

  return `<div class="overall-eval-panel">
    <div class="overall-eval-header">
      <div class="overall-eval-header-title">${title}</div>
      <span class="overall-eval-scope">${scope}</span>
    </div>
    <div class="overall-eval-grid">
      ${card('학업역량','📚 학업역량')}
      ${card('진로역량','🎯 진로역량')}
      ${card('공동체역량','🤝 공동체역량')}
    </div>
    ${has근거?`<div class="overall-reason-toggle-row" id="${pid}-btn" onclick="toggleAllReason('${pid}')">
      <span id="${pid}-arr">▶</span><span id="${pid}-lbl">근거 보기</span>
    </div>`:''}
    ${overall.종합의견?`<div style="margin-top:10px;font-size:16px;color:#475569;line-height:1.7;padding:12px 14px;background:#f8fafc;border-radius:8px;border-left:3px solid #6366f1;"><span style="font-size:15px;font-weight:700;color:#94a3b8;display:block;margin-bottom:5px;">💬 종합 의견</span>${escapeHtml(overall.종합의견)}</div>`:''}
  </div>`;
}

// ========== 종합 평가 패널 렌더링 ==========
function renderOverallEvalPanel(subjects, title, subjOverall){
  title = title || '전체 세특 종합';
  const evalSubjects = subjects.filter(s=>s.평가&&typeof s.평가==='object');
  if(evalSubjects.length===0) return `<div class="overall-eval-panel"><div class="overall-eval-empty">📊 평가 데이터가 없습니다<br><small>admin에서 평가를 먼저 생성해주세요</small></div></div>`;
  const overall = calcOverallEval(evalSubjects);
  const GC={'A+':'#4f46e5','A0':'#10b981','A-':'#34d399','B+':'#06b6d4','B0':'#0891b2','B-':'#0e7490','C+':'#f59e0b','C0':'#d97706','C-':'#b45309','D':'#ef4444','S':'#6366f1','A':'#10b981','B':'#06b6d4','C':'#f59e0b'};
  const get대G = (key, subKeys) => {
    // 교과별평가 대분류 우선 사용
    if(subjOverall?.[key]?.grade) return subjOverall[key].grade;
    if(overall[key]?.grade) return overall[key].grade;
    if(typeof overall[key] === 'string') return overall[key];
    return groupGrade(subKeys, overall);
  };
  const 학업G = get대G('학업역량', ['학업성취도','학업태도','탐구력']);
  const 진로G  = get대G('진로역량',  ['전공적합성','진로탐색']);
  const 공동G  = get대G('공동체역량', ['협업소통','나눔배려','성실규칙준수','리더십']);

  const subRow = (label, key) => {
    const v = overall[key];
    const g = v && typeof v === 'string' ? v : v?.grade;
    return g ? `<div class="overall-sub-row"><span class="overall-sub-name">${label}</span><span class="overall-sub-grade g-${dispGrade(g)}">${dispGrade(g)}</span></div>` : '';
  };

  const pid=`rop-${Math.random().toString(36).slice(2,6)}`;

  const group = (label, grade, rows, 근거) => grade ? `
    <div class="overall-eval-group og-${grade||'X'}" style="border-top:3px solid ${GC[grade]||'#64748b'};">
      <div class="overall-group-header">
        <div class="overall-group-label">${label}</div>
      </div>
      <div class="overall-group-body">
        <div class="overall-group-grade" style="color:${GC[grade]||'#64748b'}">${dispGrade(grade)}</div>
        <div class="overall-sub-list">${rows}</div>
      </div>
      ${근거?`<div class="overall-reason-bar" data-pid="${pid}">${escapeHtml(근거)}</div>`:''}
    </div>` : '';

  const has근거 = !!(subjOverall?.학업역량?.근거 || subjOverall?.진로역량?.근거 || subjOverall?.공동체역량?.근거);
  const 의견 = subjOverall?.종합의견 || null;

  return `<div class="overall-eval-panel">
    <div class="overall-eval-header">
      <div class="overall-eval-header-title">📊 ${title}</div>
      <span class="overall-eval-scope">${evalSubjects.length}개 과목 기준${subjOverall?'  ·  AI 교과 분석':''}</span>
    </div>
    <div class="overall-eval-grid">
      ${group('학업역량', 학업G, subRow('성취도','학업성취도')+subRow('학업태도','학업태도')+subRow('탐구력','탐구력'), subjOverall?.학업역량?.근거)}
      ${group('진로역량', 진로G, subRow('전공적합','전공적합성')+subRow('진로탐색','진로탐색'), subjOverall?.진로역량?.근거)}
      ${group('공동체역량', 공동G, subRow('협업·소통','협업소통')+subRow('나눔·배려','나눔배려')+subRow('성실성','성실규칙준수')+subRow('리더십','리더십'), subjOverall?.공동체역량?.근거)}
    </div>
    ${has근거?`<div class="overall-reason-toggle-row" id="${pid}-btn" onclick="toggleAllReason('${pid}')">
      <span id="${pid}-arr">▶</span><span id="${pid}-lbl">근거 보기</span>
    </div>`:''}
    ${의견?`<div style="margin-top:10px;font-size:16px;color:#475569;line-height:1.7;padding:12px 14px;background:#f8fafc;border-radius:8px;border-left:3px solid #06b6d4;"><span style="font-size:15px;font-weight:700;color:#94a3b8;display:block;margin-bottom:5px;">💬 ${escapeHtml(title)} 종합 의견</span>${escapeHtml(의견)}</div>`:''}
  </div>`;
}

// ========== 세특 탭 ==========
function renderSewtuk(el){
  const hak = String(currentStu.hak);
  const grade = parseInt(currentStu.grade) || parseInt(hak[0]);
  let data = sewtuk[hak];
  if(!data && currentStu.g2_hak) data = sewtuk[String(currentStu.g2_hak)];
  if(!data && currentStu.g1_hak) data = sewtuk[String(currentStu.g1_hak)];
  if(!data || !data.subjects){
    el.innerHTML = `<div class="no-data">📋 세특 데이터가 없습니다</div>`;
    return;
  }
  const gradeBtns = SEWTUK_GRADES.map(g=>`<button class="toggle-btn ${g===sewtukGrade?'active':''}" data-gfil="${g}">${g}</button>`).join('');
  const semBtns = SEWTUK_SEMESTERS.map(s=>`<button class="toggle-btn ${s===sewtukSem?'active':''}" data-sfil="${s}">${s}</button>`).join('');
  const catBtns = SEWTUK_CATEGORIES.map(c=>`<button class="toggle-btn ${c===sewtukCat?'active':''}" data-cfil="${c}">${c}</button>`).join('');
  // 교과명 → 필터 카테고리 매핑
  const getSewtukFilterCat = s => {
    const g = s.교과 || '';
    const sub = s.과목 || '';
    if(['국어'].includes(g)) return '국어';
    if(['영어'].includes(g)) return '영어';
    if(['수학'].includes(g)) return '수학';
    if(['과학'].includes(g)) return '과학';
    if(['사회','역사','도덕','사회(역사/도덕포함)'].includes(g)) return '사회(역사/도덕포함)';
    if(g === '예체능'){
      if(['음악','미술','연극','영화','무용'].some(k=>sub.includes(k))) return '예술';
      if(['체육','운동','스포츠'].some(k=>sub.includes(k))) return '체육';
      return '예술';
    }
    if(['예술','음악','미술'].includes(g)) return '예술';
    if(['체육','스포츠'].includes(g)) return '체육';
    if(['교양','교양 및 기타','기술가정','정보','생활교양','생활·교양'].includes(g)) return '교양';
    if(['제2외국어','한문','제2외국어/한문','중국어','일본어','독일어','프랑스어','스페인어','러시아어','아랍어','베트남어'].includes(g)
       || ['중국어','일본어','한문','독일어','프랑스어','스페인어','러시아어','아랍어','베트남어'].some(k=>sub.includes(k)||g.includes(k)))
      return '제2외국어/한문';
    return g;
  };

  const filtered = data.subjects.filter(s=>{
    if(sewtukGrade!=='전체 학년'){ const g = parseInt(sewtukGrade[0]); if(s.학년 !== g) return false; }
    if(sewtukSem!=='전체 학기'){ const sem = sewtukSem[0]; if(s.학기 !== 'both' && String(s.학기) !== sem) return false; }
    if(sewtukCat!=='전체 과목'){ if(getSewtukFilterCat(s) !== sewtukCat) return false; }
    return true;
  });
  const filterTitle = sewtukCat==='전체 과목' ? '전체 세특 종합' : sewtukCat+' 종합';
  // 평가 관련 변수 제거됨
  // 전체 키워드 수집 (세특 전체 과목)
  const allKws = sewtukCat==='전체 과목'
    ? [...new Set(data.subjects.flatMap(s=>Array.isArray(s.키워드)?s.키워드:[]))]
    : [...new Set(filtered.flatMap(s=>Array.isArray(s.키워드)?s.키워드:[]))];

  const kwSummaryPanel = '';

  let html = `
    <div class="sewtuk-top-wrap">
      <div class="sewtuk-filters">
        <div class="filter-row"><span class="filter-label">📚 학년</span><div class="toggle-group" style="margin:0;">${gradeBtns}</div></div>
        <div class="filter-row"><span class="filter-label">🗓 학기</span><div class="toggle-group" style="margin:0;">${semBtns}</div></div>
        <div class="filter-row"><span class="filter-label">📖 과목</span><div class="toggle-group" style="margin:0;">${catBtns}</div></div>
        <div style="color:#64748b;font-size:12px;margin-top:6px;">총 ${filtered.length}개 과목 · 클릭하면 전문이 펼쳐집니다</div>
      </div>
      ${kwSummaryPanel}
    </div>
  `;

  if(filtered.length===0){
    html += `<div class="no-data">🔍 필터 조건에 해당하는 세특이 없습니다</div>`;
  }else{
    filtered.forEach(s=>{
      const key = `${s.학년}-${s.학기}-${s.과목}`;
      const isOpen = openAccordions.has(key);
      const kwBlock = '';
      html += `
        <div class="accordion ${isOpen?'open':''}" data-key="${key}">
          <div class="accordion-head">
            <div class="acc-left accordion-title" style="flex:1;">
              <div class="acc-top-row">
                <span class="sub-cat">${s.교과}</span>
                <span class="sub-name">${s.과목}</span>
                <span class="sub-meta">${s.학년}학년 ${s.학기==='both'?'전체':s.학기+'학기'}</span>
                <div class="status-badges">
                  <span class="status-badge ${Array.isArray(s.요약)&&s.요약.length>0?'sb-done':'sb-none'}">
                    ${Array.isArray(s.요약)&&s.요약.length>0?'✓ 요약':'요약 미완료'}
                  </span>

                </div>
              </div>
              ${renderSummary(s.요약)}
              ${kwBlock}
            </div>
            <span class="arrow">▶</span>
          </div>
          <div class="accordion-body">
            ${escapeHtml(s.내용)}
            ${renderDecompBlock(
              s.활동분해 ||
              evalData[String(currentStu?.hak)]?.세특활동분해?.[`${s.교과}-${s.과목}-${s.학년}`]?.활동분해 ||
              null
            )}
          </div>
        </div>
      `;
    });
  }
  el.innerHTML = html;
  el.querySelectorAll('[data-gfil]').forEach(b=>b.onclick=()=>{ sewtukGrade=b.dataset.gfil; renderTab(); });
  el.querySelectorAll('[data-sfil]').forEach(b=>b.onclick=()=>{ sewtukSem=b.dataset.sfil; renderTab(); });
  el.querySelectorAll('[data-cfil]').forEach(b=>b.onclick=()=>{ sewtukCat=b.dataset.cfil; renderTab(); });
  el.querySelectorAll('.accordion-head').forEach(h=>{
    h.onclick = ()=>{
      const acc = h.parentElement;
      const key = acc.dataset.key;
      if(openAccordions.has(key)){ openAccordions.delete(key); acc.classList.remove('open'); }
      else { openAccordions.add(key); acc.classList.add('open'); }
    };
  });
}

function toggleMajorCard(uid){
  const el = document.getElementById(uid);

/* ========== 등급 표시 헬퍼 (A0 → A 표시) ========== */
function dispGrade(g){ return g==='A0'?'A':String(g||''); }


/* ========== 활동 분해 태그 렌더링 ========== */
const DECOMP_META = {
  핵심주제: { color: '#4f46e5', bg: 'rgba(79,70,229,.08)', border: 'rgba(79,70,229,.2)', icon: '🎯' },
  활동유형: { color: '#0891b2', bg: 'rgba(8,145,178,.08)', border: 'rgba(8,145,178,.2)', icon: '⚙️' },
  교과연계: { color: '#059669', bg: 'rgba(5,150,105,.08)', border: 'rgba(5,150,105,.2)', icon: '📚' },
  사고수준: { color: '#d97706', bg: 'rgba(217,119,6,.08)', border: 'rgba(217,119,6,.2)', icon: '💡' },
};

function renderDecompBlock(분해, compact=false){
  if(!분해 || typeof 분해 !== 'object') return '';
  const cats = Object.keys(DECOMP_META);
  const hasAny = cats.some(c => Array.isArray(분해[c]) && 분해[c].length);
  if(!hasAny) return '';

  if(compact){
    const tags = cats.flatMap(c => {
      const m = DECOMP_META[c];
      return (분해[c]||[]).map(t =>
        `<span style="background:${m.bg};color:${m.color};border:1px solid ${m.border};border-radius:14px;padding:2px 8px;font-size:10px;font-weight:600;white-space:nowrap;">${t}</span>`
      );
    }).join('');
    return `<div style="display:flex;flex-wrap:wrap;gap:4px;margin-top:6px;">${tags}</div>`;
  }

  const rows = cats.map(c => {
    const tags = 분해[c] || [];
    if(!tags.length) return '';
    const m = DECOMP_META[c];
    const pills = tags.map(t =>
      `<span style="background:${m.bg};color:${m.color};border:1px solid ${m.border};border-radius:14px;padding:2px 9px;font-size:11px;font-weight:600;">${escapeHtml(t)}</span>`

function idxSwitchRecTab(key){
