<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>오상고 상담카드 시스템 2026</title>
<link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>📋</text></svg>">
<link rel="stylesheet" href="css/styles.css">
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
</head>
<body>
<header class="topbar">
  <div class="brand"><span class="logo">📋</span> <b>오상고 상담카드 시스템</b> <span class="year">2026</span></div>
  <div id="statusBar" class="status">로딩중...</div>
</header>
<main class="layout">
  <aside class="sidebar">
    <input id="searchBox" class="search" placeholder="🔍 이름 또는 학번 검색" />
    <div class="filters">
      <select id="gradeFilter"><option value="">전체 학년</option><option value="1">1학년</option><option value="2">2학년</option><option value="3">3학년</option></select>
      <select id="classFilter"><option value="">전체 반</option></select>
    </div>
    <div id="countLabel" class="count">-</div>
    <ul id="studentList" class="student-list"></ul>
  </aside>
  <section class="content">
    <div id="studentHeader" class="student-header"></div>
    <nav id="tabBar" class="tabs"></nav>
    <div id="tabContent" class="tab-content">
      <div class="empty">👈 왼쪽에서 학생을 선택하세요</div>
    </div>
  </section>
</main>
<script src="js/app.js"></script>
</body>
</html>
