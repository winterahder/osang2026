<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>오상고 상담카드 시스템 2026</title>
<link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'%3E%3Ctext y='.9em' font-size='90'%3E📋%3C/text%3E%3C/svg%3E">
<link rel="stylesheet" href="css/styles.css">
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
</head>
<body>
<header class="topbar">
  <div class="title">📋 오상고 상담카드 시스템 <span class="year">2026</span></div>
  <div id="statusBar" class="status">로딩중...</div>
</header>

<main class="layout">
  <aside class="sidebar">
    <div class="filters">
      <input type="text" id="searchInput" placeholder="🔍 이름 또는 학번 검색">
      <div class="filter-row">
        <select id="gradeFilter">
          <option value="all">전체</option>
          <option value="1">1학년</option>
          <option value="2">2학년</option>
          <option value="3">3학년</option>
        </select>
        <select id="classFilter" style="display:none">
          <option value="all">전체 반</option>
        </select>
      </div>
      <div id="countInfo" class="count">-</div>
    </div>
    <ul id="studentList" class="student-list"></ul>
  </aside>

  <section class="detail">
    <div id="detailHeader" class="detail-header">
      <div class="placeholder">👈 왼쪽에서 학생을 선택하세요</div>
    </div>
    <nav id="tabNav" class="tab-nav" style="display:none"></nav>
    <div id="tabContent" class="tab-content"></div>
  </section>
</main>

<script src="js/app.js"></script>
</body>
</html>
