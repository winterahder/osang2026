<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, viewport-fit=cover">
<title>오상고 상담카드 시스템 2026</title>
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="오상고 상담">
<meta name="theme-color" content="#1e40af">
<link rel="manifest" href="manifest.json">
<link rel="apple-touch-icon" href="icon-192.png">
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
<script src="https://accounts.google.com/gsi/client" async defer onload="window._googleGsiLoaded=true"></script>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  :root {
    /* 모바일 타이포 시스템 */
    --m-title:    16px;   /* 학생 이름, 큰 제목 */
    --m-section:  15px;   /* 섹션 제목 (학기 등) */
    --m-body:     14px;   /* 일반 본문 */
    --m-meta:     12px;   /* 메타 정보, 회색 텍스트 */
    --m-tiny:     11px;   /* 뱃지, 라벨 */
    --m-num-big:  28px;   /* 큰 숫자 (평균, 점수) */
    --m-num-mid:  20px;   /* 중간 숫자 (등급) */
    /* 색상 */
    --m-text:     #0f172a;
    --m-text-sub: #64748b;
    --m-text-lt:  #94a3b8;
    --m-border:   #e5e7eb;
    --m-border-l: #f1f5f9;
    --m-bg:       #ffffff;
    --m-bg-soft:  #f8fafc;
  }
  body { font-family: 'Pretendard', -apple-system, sans-serif; background: #f5f6fa; color: #222; font-size: 14px; }

  /* 데스크탑/모바일 토글 (기본은 데스크탑) */
  .m-show-on-mobile { display: none; }
  .m-hide-on-mobile { display: table; }
  /* ===== 구글 로그인 화면 ===== */
  #lockScreen { position: fixed; inset: 0; background: linear-gradient(135deg, #1e3a8a 0%, #1e40af 50%, #2563eb 100%); display: flex; align-items: center; justify-content: center; z-index: 9999; }
  #lockScreen.hidden { display: none; }
  .lock-box { background: #fff; border-radius: 16px; padding: 40px 44px; width: 360px; text-align: center; box-shadow: 0 25px 60px rgba(0,0,0,0.35); }
  .lock-box .lock-icon { font-size: 48px; margin-bottom: 12px; }
  .lock-box h2 { font-size: 18px; color: #1e293b; margin-bottom: 4px; }
  .lock-box p { font-size: 13px; color: #64748b; margin-bottom: 24px; }
  .lock-error { color: #ef4444; font-size: 13px; margin-top: 10px; min-height: 20px; }
  .lock-spinner { display: none; align-items: center; justify-content: center; gap: 10px; color: #2563eb; font-size: 13px; margin-top: 10px; }
  .lock-spinner.show { display: flex; }
  .ls-spin { width: 18px; height: 18px; border: 3px solid #dbeafe; border-top-color: #2563eb; border-radius: 50%; animation: kp-spin 0.75s linear infinite; }
  .google-btn { display: flex; align-items: center; justify-content: center; gap: 12px; width: 100%; padding: 12px 16px; background: #fff; color: #3c4043; border: 2px solid #e2e8f0; border-radius: 8px; font-size: 15px; font-weight: 600; cursor: pointer; transition: all 0.2s; box-shadow: 0 1px 4px rgba(0,0,0,0.1); }
  .google-btn:hover { background: #f8faff; border-color: #2563eb; box-shadow: 0 2px 8px rgba(37,99,235,0.15); }
  .google-btn svg { flex-shrink: 0; }
  .pending-box { background: #fefce8; border: 1px solid #fde68a; border-radius: 10px; padding: 16px; margin-top: 16px; font-size: 13px; color: #92400e; line-height: 1.6; }
  .logout-btn { background: none; border: 1px solid #e2e8f0; border-radius: 6px; padding: 5px 10px; font-size: 12px; color: #64748b; cursor: pointer; white-space: nowrap; flex-shrink: 0; }
  .logout-btn:hover { background: #f1f5f9; }
  header { background: #fff; padding: 14px 24px; border-bottom: 1px solid #e5e7eb; display: flex; justify-content: space-between; align-items: center; }
  header h1 { font-size: 18px; display: flex; align-items: center; gap: 8px; }
  header h1 span.year { color: #94a3b8; font-weight: 400; font-size: 14px; margin-left: 4px; }
  #status { color: #64748b; font-size: 13px; display: flex; align-items: center; gap: 10px; flex-shrink: 0; }
  .layout { display: grid; grid-template-columns: 260px 1fr; gap: 16px; padding: 16px; height: calc(100vh - 60px); overflow: hidden; }
  aside { background: #fff; border-radius: 8px; padding: 12px; overflow: hidden; display: flex; flex-direction: column; }
  aside input, aside select { width: 100%; padding: 8px 10px; border: 1px solid #e2e8f0; border-radius: 6px; font-size: 13px; margin-bottom: 6px; }
  aside .filters { display: grid; grid-template-columns: 1fr 1fr; gap: 6px; margin-bottom: 8px; }
  .stu-list { flex: 1; overflow-y: auto; margin-top: 6px; }
  .stu-item { display: grid; grid-template-columns: 55px 1fr; gap: 8px; padding: 7px 8px; border-radius: 6px; cursor: pointer; font-size: 13px; align-items: center; }
  .stu-item:hover { background: #f1f5f9; }
  .stu-item.active { background: #dbeafe; color: #1e40af; font-weight: 600; }
  .stu-item .hak { color: #64748b; font-variant-numeric: tabular-nums; }
  .stu-item.active .hak { color: #1e40af; }
  main { background: transparent; overflow-y: auto; display: flex; flex-direction: column; gap: 12px; min-height: 0; }
  .card { background: #fff; border-radius: 8px; padding: 18px 22px; }
  .stu-header h2 { font-size: 20px; margin-bottom: 8px; }
  .badges { display: flex; gap: 6px; flex-wrap: wrap; }
  .badge { padding: 4px 10px; background: #eff6ff; color: #1e40af; border-radius: 12px; font-size: 12px; }
  .badge.gender-m { background: #dbeafe; color: #1e40af; }
  .badge.gender-f { background: #fce7f3; color: #9f1239; }
  .tabs { display: flex; gap: 4px; border-bottom: 1px solid #e5e7eb; padding: 0 12px; background: #fff; border-radius: 8px 8px 0 0; }
  .tab { padding: 12px 18px; cursor: pointer; font-size: 14px; color: #64748b; border-bottom: 2px solid transparent; }
  .tab.active { color: #2563eb; border-bottom-color: #2563eb; font-weight: 600; background: #eff6ff; border-radius: 6px 6px 0 0; }
  .tab-content { background: #fff; border-radius: 0 0 8px 8px; padding: 20px; }
  .placeholder { text-align: center; color: #94a3b8; padding: 80px 0; font-size: 15px; }
  table.info { width: 100%; border-collapse: collapse; }
  table.info td { padding: 10px 12px; border-bottom: 1px solid #f1f5f9; }
  table.info td:first-child { width: 180px; background: #f8fafc; font-weight: 600; color: #475569; }
  .toggle-group { display: flex; gap: 4px; margin-bottom: 14px; flex-wrap: wrap; }
  .toggle-btn { padding: 6px 14px; border: 1px solid #cbd5e1; background: #fff; border-radius: 6px; cursor: pointer; font-size: 13px; }
  .toggle-btn.active { background: #2563eb; color: #fff; border-color: #2563eb; }
  .chart-wrap { position: relative; height: 340px; margin-bottom: 18px; }
  table.mock, table.grade { width: 100%; border-collapse: collapse; font-size: 13px; }
  table.mock th, table.mock td, table.grade th, table.grade td { padding: 8px 10px; border-bottom: 1px solid #f1f5f9; text-align: center; }
  table.mock th, table.grade th { background: #f8fafc; font-weight: 600; color: #475569; }
  table.grade td.subj { text-align: left; font-weight: 500; }
  table.grade td.grade-1 { color: #1e40af; font-weight: 700; }
  table.grade td.grade-2 { color: #2563eb; font-weight: 600; }
  table.grade td.grade-3 { color: #10b981; font-weight: 500; }
  table.grade td.grade-4 { color: #059669; }
  table.grade td.grade-5 { color: #64748b; }
  table.grade td.grade-6 { color: #d97706; }
  table.grade td.grade-7, table.grade td.grade-8, table.grade td.grade-9 { color: #dc2626; font-weight: 600; }
  table.mock td.grade-1 { color: #2563eb; font-weight: 700; }
  table.mock td.grade-2 { color: #2563eb; }
  table.mock td.grade-9 { color: #dc2626; font-weight: 700; }
  table.mock td.grade-8 { color: #dc2626; }
  table.mock td.big { font-size: 15px; font-weight: 600; padding: 6px; }
  table.mock td.bg-1 { background: #1e40af; color: #fff; }
  table.mock td.bg-2 { background: #3b82f6; color: #fff; }
  table.mock td.bg-3 { background: #60a5fa; color: #fff; }
  table.mock td.bg-4 { background: #93c5fd; }
  table.mock td.bg-5 { background: #fde68a; }
  table.mock td.bg-6 { background: #fdba74; }
  table.mock td.bg-7 { background: #fb923c; color: #fff; }
  table.mock td.bg-8 { background: #ef4444; color: #fff; }
  table.mock td.bg-9 { background: #991b1b; color: #fff; }

  /* ===== 모의고사 새 섹션 (데스크탑) ===== */
  .mock-chart-wrap {
    display: grid;
    grid-template-columns: 240px 1fr;
    gap: 18px;
    margin: 18px 0;
    align-items: stretch;
  }
  .mock-side-panel {
    background: #fff;
    border: 1px solid #e8edf5;
    border-radius: 12px;
    padding: 14px 12px;
    display: flex;
    flex-direction: column;
    gap: 4px;
  }
  .mock-side-title {
    font-size: 12px; font-weight: 800; color: #475569;
    padding: 0 4px 8px;
    border-bottom: 1px solid #f1f5f9;
    margin-bottom: 4px;
  }
  .mock-side-row {
    display: flex; align-items: center; gap: 8px;
    padding: 8px 8px; border-radius: 8px;
    cursor: pointer; transition: background .15s;
    font-size: 13px;
  }
  .mock-side-row:hover { background: #f8fafc; }
  .mock-side-row.mock-side-all {
    background: #f1f5f9; font-weight: 700;
    margin-bottom: 4px; border-bottom: 1px dashed #e2e8f0;
    padding-bottom: 10px;
  }
  .mock-side-check {
    font-size: 16px; flex-shrink: 0;
    width: 18px; text-align: center;
  }
  .mock-side-check.checked { color: #6366f1; }
  .mock-side-name {
    flex: 1; color: #1e293b; font-weight: 600;
  }
  .mock-side-sel {
    display: block; font-size: 10px; color: #94a3b8;
    font-weight: 500; margin-top: 1px;
  }
  .mock-side-avg {
    font-size: 12px; font-weight: 800; color: #6366f1;
    white-space: nowrap;
  }
  .mock-chart-canvas {
    background: #fff;
    border: 1px solid #e8edf5;
    border-radius: 12px;
    padding: 14px 16px;
    min-height: 340px;
  }
  .mock-section {
    background: #fff;
    border: 1px solid #e8edf5;
    border-radius: 12px;
    padding: 16px 18px;
    margin: 14px 0;
  }
  .mock-section-title {
    font-size: 14px; font-weight: 800; color: #1e293b;
    margin-bottom: 12px;
    display: flex; align-items: center; gap: 8px;
  }
  .mock-section-sub {
    font-size: 11px; color: #94a3b8; font-weight: 500;
    background: #f1f5f9; padding: 2px 8px; border-radius: 10px;
  }
  .mock-suneung-info {
    background: #eff6ff; border-left: 3px solid #6366f1;
    padding: 10px 14px; border-radius: 8px;
    font-size: 12px; color: #334155; line-height: 1.7;
    margin-bottom: 14px;
  }
  .mock-suneung-info b { color: #1e40af; }
  .mock-table-scroll {
    overflow-x: auto;
    -webkit-overflow-scrolling: touch;
  }
  .mock-summary-table, .mock-suneung-table {
    min-width: 600px;
  }

  /* 히트맵: 배경 없이 숫자에 작은 박스 뱃지만 적용 */
  .heat-badge { display:inline-block; padding:2px 8px; border-radius:5px; font-weight:700; line-height:1.4; }
  .heat-badge.heat-1 { background:#dbeafe; color:#1e3a8a; }
  .heat-badge.heat-2 { background:#bfdbfe; color:#1e40af; }
  .heat-badge.heat-3 { background:#e0f2fe; color:#0369a1; }
  .heat-badge.heat-4 { background:#f0fdf4; color:#166534; }
  .heat-badge.heat-5 { background:#fefce8; color:#854d0e; }
  .heat-badge.heat-6 { background:#fff7ed; color:#9a3412; }
  .heat-badge.heat-7 { background:#fef2f2; color:#991b1b; }
  .heat-badge.heat-8 { background:#fee2e2; color:#7f1d1d; font-weight:800; }
  .heat-badge.heat-9 { background:#fecaca; color:#7f1d1d; font-weight:800; }
  .semester-block { margin-bottom: 24px; }
  .semester-title { font-size: 15px; font-weight: 700; color: #1e293b; margin-bottom: 10px; padding: 8px 12px; background: #f1f5f9; border-left: 4px solid #2563eb; border-radius: 4px; }
  /* ===== 내신 요약 패널 ===== */
  .grade-summary-panel { display: grid; grid-template-columns: 210px 1fr; gap: 16px; margin-bottom: 20px; align-items: stretch; }
  .grade-stats { display: flex; flex-direction: column; gap: 10px; }
  .grade-avg-big { background: linear-gradient(145deg, #eff6ff 0%, #dbeafe 100%); border: 1.5px solid #93c5fd; border-radius: 14px; padding: 22px 16px 18px; text-align: center; flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: center; }
  .grade-avg-big.is9 { background: linear-gradient(145deg, #faf5ff 0%, #f3e8ff 100%); border-color: #c084fc; }
  .grade-avg-big .avg-label { font-size: 12px; color: #64748b; margin-bottom: 6px; font-weight: 500; }
  .grade-avg-big .avg-val { font-size: 58px; font-weight: 800; color: #1e40af; line-height: 1; letter-spacing: -2px; }
  .grade-avg-big.is9 .avg-val { color: #9333ea; }
  .grade-avg-big .avg-filter { font-size: 11px; color: #94a3b8; margin-top: 8px; }
  .grade-stat-row { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; }
  .grade-stat-card { background: #fff; border: 1px solid #e2e8f0; border-radius: 10px; padding: 12px 10px; text-align: center; }
  .grade-stat-card .sc-label { font-size: 11px; color: #94a3b8; margin-bottom: 4px; }
  .grade-stat-card .sc-val { font-size: 22px; font-weight: 700; color: #334155; }
  .grade-chart-panel { background: #fff; border: 1px solid #e2e8f0; border-radius: 14px; padding: 16px 18px; display: flex; flex-direction: column; }
  .grade-chart-title { font-size: 13px; font-weight: 600; color: #475569; margin-bottom: 12px; display: flex; align-items: center; gap: 6px; }
  .grade-chart-wrap { position: relative; flex: 1; min-height: 160px; }
  .summary-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(140px, 1fr)); gap: 10px; margin: 10px 0 14px; }
  .summary-card { background: #fff; border: 1px solid #e2e8f0; border-radius: 8px; padding: 10px 14px; text-align: center; }
  .summary-card .label { color: #64748b; font-size: 12px; margin-bottom: 4px; }
  .summary-card .value { font-size: 20px; font-weight: 700; color: #1e40af; }
  .summary-card.highlight { background: linear-gradient(135deg, #eff6ff, #dbeafe); border-color: #93c5fd; }
  .summary-card.est { background: linear-gradient(135deg, #faf5ff, #f3e8ff); border-color: #c084fc; }
  .summary-card.est .value { color: #a855f7; }
  .filter-label { display: inline-block; margin-right: 8px; font-weight: 600; color: #475569; font-size: 13px; }
  .no-data { padding: 40px; text-align: center; color: #94a3b8; background: #f8fafc; border-radius: 8px; }
  .filter-row { display: flex; align-items: center; gap: 8px; margin-bottom: 10px; flex-wrap: wrap; }
  /* ===== 아코디언 ===== */
  .accordion { border: 1px solid #e2e8f0; border-radius: 10px; margin-bottom: 10px; overflow: hidden; background: #fff; box-shadow: 0 1px 3px rgba(0,0,0,.04); }
  .accordion-head { padding: 14px 16px; cursor: pointer; display: flex; align-items: stretch; gap: 0; transition: background 0.15s; }
  .accordion-head:hover { background: #f8fafc; }
  .accordion.open .accordion-head { background: #eff6ff; border-bottom: 1px solid #dbeafe; }

  /* 왼쪽: 요약 영역 */
  .acc-left { flex: 1; min-width: 0; display: flex; flex-direction: column; gap: 4px; padding-right: 12px; max-width: 50%; }
  .acc-top-row { display: flex; align-items: center; gap: 8px; flex-wrap: wrap; margin-bottom: 2px; }
  .accordion-title .sub-cat { padding: 3px 9px; background: #e0f2fe; color: #0369a1; border-radius: 12px; font-size: 12px; font-weight: 700; flex-shrink: 0; }
  .accordion-title .sub-name { font-weight: 700; color: #1e293b; font-size: 15px; flex-shrink: 0; }

  /* 필터 — 세로 단독 배치 */
  .sewtuk-top-wrap { display: flex; flex-direction: column; gap: 14px; margin-bottom: 14px; }
  .sewtuk-filters { display: flex; flex-direction: column; gap: 0; }

  /* 종합 평가 패널 */
  .overall-eval-panel { background: #fff; border: 1px solid #e2e8f0; border-radius: 14px; padding: 18px 20px; box-shadow: 0 2px 8px rgba(0,0,0,.06); }
  .overall-eval-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 14px; }
  .overall-eval-header-title { font-size: 15px; font-weight: 800; color: #1e293b; display: flex; align-items: center; gap: 6px; }
  .overall-eval-scope { font-size: 12px; color: #94a3b8; font-weight: 500; background: #f1f5f9; padding: 3px 10px; border-radius: 20px; }
  .overall-eval-grid { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 12px; align-items: stretch; }
  @media(max-width: 860px){ .overall-eval-grid { grid-template-columns: 1fr; } }
  @media(max-width: 860px){ .eval-radar-grid { grid-template-columns: 1fr !important; } .eval-gauge-col,.eval-radar-canvas-box { width:100% !important; height:auto !important; } }

  /* 역량 카드 — 등급별 배경색 */
  .overall-eval-group { display: flex; flex-direction: column; border-radius: 12px; overflow: hidden; box-shadow: 0 2px 8px rgba(0,0,0,.08); transition: box-shadow .2s; border: none; }
  .overall-eval-group:hover { box-shadow: 0 6px 18px rgba(0,0,0,.15); }
  .og-S { background: #ede9fe; } .og-A { background: #e0f2fe; } .og-B { background: #dcfce7; }
  .og-C { background: #fef9c3; } .og-D { background: #fee2e2; } .og-X { background: #f1f5f9; }
  .overall-group-header { padding: 10px 14px 8px; border-bottom: 1px solid rgba(0,0,0,.06); }
  .overall-group-label { font-size: 12px; font-weight: 700; color: #475569; letter-spacing: 0.3px; }
  .overall-group-body { display: flex; align-items: center; gap: 0; padding: 12px 14px 14px; flex: 1; }
  .overall-group-grade { font-size: 40px; font-weight: 900; line-height: 1; letter-spacing: -1px; flex: 0 0 38%; text-align: center; }
  .overall-sub-list { flex: 1; display: flex; flex-direction: column; gap: 5px; align-items: flex-end; }
  .overall-sub-row { display: flex; align-items: center; gap: 8px; font-size: 13px; }
  .overall-sub-name { color: #475569; font-weight: 500; }
  .overall-sub-grade { font-weight: 800; font-size: 14px; min-width: 14px; text-align: right; }

  /* 근거 토글 */
  .overall-reason-bar { font-size: 12px; color: #334155; line-height: 1.7; display: none; padding: 10px 14px; background: rgba(0,0,0,.06); border-top: 1px solid rgba(0,0,0,.06); }
  .overall-reason-toggle-row { display: flex; align-items: center; justify-content: center; gap: 5px; margin-top: 10px; cursor: pointer; color: #64748b; font-size: 12px; font-weight: 600; user-select: none; padding: 6px 16px; border-radius: 20px; border: 1px solid #e2e8f0; width: fit-content; margin-left: auto; margin-right: auto; transition: all .15s; background: #fff; }
  .overall-reason-toggle-row:hover { background: #f1f5f9; color: #334155; border-color: #cbd5e1; }
  .overall-eval-empty { display: flex; align-items: center; justify-content: center; min-height: 80px; color: #cbd5e1; font-size: 16px; text-align: center; padding: 20px; }
  /* 역량 레이더 차트 */
  .radar-card {
    background: #fff;
    border: 1px solid #e8edf5;
    border-radius: 20px;
    padding: 28px 32px 24px;
    margin-bottom: 20px;
    box-shadow: 0 2px 12px rgba(15,23,42,.06);
    overflow: hidden;
    position: relative;
  }
  .radar-card::before {
    content: '';
    position: absolute; inset: 0;
    background: linear-gradient(135deg, rgba(99,102,241,.03) 0%, rgba(16,185,129,.02) 50%, rgba(245,158,11,.02) 100%);
    pointer-events: none;
  }
  .radar-card-header {
    display: flex; align-items: center; justify-content: space-between;
    margin-bottom: 24px;
  }
  .radar-card-title {
    font-size: 15px; font-weight: 800; color: #1e293b;
    display: flex; align-items: center; gap: 8px;
  }
  .radar-card-title-dot {
    width: 8px; height: 8px; border-radius: 50%;
    background: linear-gradient(135deg, #6366f1, #8b5cf6);
    box-shadow: 0 0 0 3px rgba(99,102,241,.15);
  }

  /* ① 종합 점수 게이지 */
  /* ① 레이더 + 게이지 통합 카드 */
  .eval-radar-card {

  /* 레이더 */
  .eval-radar-canvas-box { position: relative; width: 320px; height: 320px; }

  /* 역량 카드 목록 */
  .eval-radar-stat-list { display: flex; flex-direction: column; gap: 10px; }

  /* ⑤ 내신 학기별 추이 */
  .eval-grade-trend-card {

  .eval-grade-trend-col    { flex: 1; min-width: 60px; display: flex; flex-direction: column; align-items: center; gap: 5px; position: relative; }

  .eval-grade-trend-axis { display: flex; flex-direction: column; gap: 0; justify-content: space-between; padding: 0 8px 28px 0; height: 160px; flex-shrink: 0; }

  .eval-grade-trend-no-data { color: #cbd5e1; font-size: 13px; text-align: center; padding: 20px; }
  /* ② 강점/보완점 */
  .eval-swot-section { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; margin-bottom: 12px; }
  .eval-swot-card { border-radius: 14px; padding: 18px 20px; border: 1.5px solid; position: relative; overflow: hidden; }
  .eval-swot-card::before { content: ''; position: absolute; top: -24px; right: -24px; width: 90px; height: 90px; border-radius: 50%; opacity: .08; }

  .eval-swot-card.strength::before { background: #16a34a; }

  .eval-swot-card.weakness::before { background: #ea580c; }

  .eval-swot-item { display: flex; align-items: flex-start; gap: 8px; font-size: 13px; color: #1e293b; line-height: 1.65; margin-bottom: 8px; }

  .eval-swot-summary-icon { font-size: 18px; flex-shrink: 0; }

  /* ③ 내신 연동 배지 */
  .grade-link-badge { display: inline-flex; align-items: center; gap: 5px; font-size: 11px; font-weight: 700; padding: 3px 9px; border-radius: 6px; }

  /* ④ 학년별 역량 추이 */
  .eval-trend-section { background: #fff; border: 1px solid #e8edf5; border-radius: 18px; padding: 24px 28px; margin-bottom: 12px; box-shadow: 0 2px 10px rgba(15,23,42,.05); }

  .eval-trend-change { font-size: 10px; font-weight: 800; padding: 2px 7px; border-radius: 20px; white-space: nowrap; display: inline-flex; align-items: center; gap: 2px; }
  .eval-trend-change.up   { background: #dcfce7; color: #16a34a; }
  .eval-trend-change.down { background: #fee2e2; color: #dc2626; }
  .eval-trend-change.same { background: #f1f5f9; color: #94a3b8; }
  .eval-trend-connector { display: flex; flex-direction: column; justify-content: center; align-items: center; gap: 8px; padding-top: 28px; }
  .eval-trend-connector svg { color: #e2e8f0; }
  @media(max-width:900px){
    .radar-body { grid-template-columns: 300px 1fr; gap: 24px; }

  }

  /* 모의지원 탭 — 2패널 레이아웃 */
  .apply-layout { display: grid; grid-template-columns: 1fr 420px; gap: 16px; padding: 16px; align-items: start; max-width: 100%; }

    if(semKeys.length > 0){
      const normalized = { ...d, grades: {} };
      semKeys.forEach(s => { normalized.grades[s] = d[s]; });

    }
  }
  return null;
}

// ========== 9등급 환산 로직 (성취도 분포 + 원점수 기반 추정) ==========
// 분포 문자열 파싱: "A(22.1) B(30.0) C(22.1) D(20.2) E(5.7)" → {A:22.1, B:30.0, ...}
function parseDist(str){
  if(!str) return null;
  const r = {};
  const re = /([A-E])\s*\(\s*([\d.]+)\s*\)/g;
  let m;
  while((m = re.exec(str)) !== null){ r[m[1]] = parseFloat(m[2]); }
  return r;
}

// 원점수 + 분포 → 추정 누적 백분위 (상위 %)
function estPercentile(score, dist){
  if(score==null || !dist) return null;
  const order = ['A','B','C','D','E'];
  const cuts = { A:[90,100], B:[80,90], C:[70,80], D:[60,70], E:[0,60] };
  let band = 'E';
  if(score >= 90) band = 'A';
  else if(score >= 80) band = 'B';
  else if(score >= 70) band = 'C';
  else if(score >= 60) band = 'D';
  // 해당 구간 위쪽 누적 %
  let above = 0;
  for(const b of order){ if(b === band) break; above += (dist[b] || 0); }
  // 구간 내 위치 (0=최상위, 1=최하위)
  const [lo, hi] = cuts[band];
  const pos = hi > lo ? (hi - score) / (hi - lo) : 0.5;
  const clamped = Math.max(0, Math.min(1, pos));
  const thisBand = dist[band] || 0;
  return above + clamped * thisBand;
}

// 백분위 → 9등급
function percentileToGrade9(p){
  if(p == null) return null;
  if(p <= 4) return 1;
  if(p <= 11) return 2;
  if(p <= 23) return 3;
  if(p <= 40) return 4;
  if(p <= 60) return 5;
  if(p <= 77) return 6;
  if(p <= 89) return 7;
  if(p <= 96) return 8;
  return 9;
}

// 과목 객체 → 9등급 (석차 기반 직접 계산 우선)
function estGrade9(subj){
  if(!subj || subj.등급 == null) return null;
  // 1순위: 석차 + 수강자수 → 실제 백분위로 9등급 직접 계산
  if(subj.석차 != null && subj.수강자수 != null && subj.수강자수 > 0){
    const p = (subj.석차 / subj.수강자수) * 100;
    return { grade: percentileToGrade9(p), percentile: p, source: '실제' };
  }
  // 2순위: JSON에 등급9 필드가 직접 있는 경우 (석차 없는 과목 fallback)
  if(subj.등급9 != null){
    return { grade: subj.등급9, percentile: subj.백분위, source: '실제' };
  }
  // 3순위: 성취도 분포 기반 추정
  const p = estPercentile(subj.원점수, parseDist(subj.분포));
  if(p == null) return null;
  return { grade: percentileToGrade9(p), percentile: p, source: '추정' };
}

function getG(subj, stu, semData){
  if(!subj || subj.등급 == null) return null;

  if(currentGradeIs9) return subj.등급; // 3학년: 이미 9등급 데이터
  const est = estGrade9(subj); // 1·2학년: 9등급 환산
  return est ? est.grade : null;
}

// ========== AES-GCM 복호화 ==========
async function deriveKey(password, salt){
  const enc = new TextEncoder();
  const keyMat = await crypto.subtle.importKey('raw', enc.encode(password), 'PBKDF2', false, ['deriveKey']);
  return crypto.subtle.deriveKey(
    { name:'PBKDF2', salt, iterations:100000, hash:'SHA-256' },
    keyMat, { name:'AES-GCM', length:256 }, false, ['decrypt']
  );
}

function b64ToArr(b64){ return Uint8Array.from(atob(b64), c=>c.charCodeAt(0)); }

async function decryptJSON(encObj, key){
  const iv   = b64ToArr(encObj.iv);
  const data = b64ToArr(encObj.data);
  const plain = await crypto.subtle.decrypt({ name:'AES-GCM', iv }, key, data);
  return JSON.parse(new TextDecoder().decode(plain));
}

async function fetchAndDecrypt(url, key){
  const res = await fetch(url);
  if(!res.ok) return null;
  const encObj = await res.json();
  // 암호화 안 된 일반 JSON이면 그냥 반환 (개발 편의)
  if(!encObj.iv) return encObj;
  return decryptJSON(encObj, key);
}

async function apiGet(params, timeoutMs = 15000){
  const url = API_URL + '?' + new URLSearchParams(params);
  const controller = new AbortController();
  const timer = setTimeout(() => controller.abort(), timeoutMs);
  try {
    const res = await fetch(url, { signal: controller.signal });
    const data = await res.json();
    if(data.error) throw new Error(data.error);
    return data;
  } catch(e) {
    if(e.name === 'AbortError') throw new Error('서버 응답 시간이 초과됐습니다. 다시 시도해주세요.');
    throw e;
  } finally {
    clearTimeout(timer);
  }
}

async function apiPost(body, timeoutMs = 20000){
  const controller = new AbortController();
  const timer = setTimeout(() => controller.abort(), timeoutMs);
  try {
    const res = await fetch(API_URL, {
      method: 'POST',
      body: JSON.stringify(body),
      signal: controller.signal
    });
    const data = await res.json();
    if(data.error) throw new Error(data.error);
    return data;
  } catch(e) {
    if(e.name === 'AbortError') throw new Error('서버 응답 시간이 초과됐습니다. 다시 시도해주세요.');
    throw e;
  } finally {
    clearTimeout(timer);
  }
}

const SESSION_KEY = 'osh_google_session';

// ── Google 로그인 후 토큰 처리 (공통) ──
async function processGoogleToken(accessToken) {
  googleToken = accessToken;
  document.getElementById('lockSpinner').classList.add('show');
  document.getElementById('lockError').textContent = '';
  try {
    const userInfo = await fetch('https://www.googleapis.com/oauth2/v3/userinfo', {
      headers: { Authorization: 'Bearer ' + accessToken }
    }).then(r => r.json());

    const email = userInfo.email;
    if(!email || !email.endsWith('@osang.hs.kr')) {
      document.getElementById('lockSpinner').classList.remove('show');
      showLockError('오상고 계정(@osang.hs.kr)만 접속 가능합니다.');
      return;
    }
    currentEmail = email;

    const result = await apiGet({ action: 'checkEmail', email });
    if(result.role === 'pending') {
      document.getElementById('lockSpinner').classList.remove('show');
      document.getElementById('lockError').innerHTML =
        '<div class="pending-box">⏳ <strong>승인 대기 중</strong><br>' + email + '<br>관리자가 역할을 지정하면 접속 가능합니다.</div>';
      return;
    }

    currentRole = result.role;
    currentPassword = result.token;
    localStorage.setItem(SESSION_KEY, JSON.stringify({ email, role: result.role, token: result.token, exp: 9999999999999 }));
    await init(result.token);
    document.getElementById('lockScreen').classList.add('hidden');
    showLogoutBtn(email);

  } catch(e) {
    document.getElementById('lockSpinner').classList.remove('show');
    showLockError('오류: ' + e.message);
  }
}

// ── 버튼 클릭 → 리다이렉트 방식 (PC/모바일 통일, 팝업 차단 없음) ──
function handleGoogleLogin() {
  const base = location.origin + location.pathname;
  // 경로 끝 슬래시 정규화 (github pages는 / 로 끝남)
  const redirectUri = base.endsWith('/') ? base : base + '/';
  const params = new URLSearchParams({
    client_id: GOOGLE_CLIENT_ID,
    redirect_uri: redirectUri,
    response_type: 'token',
    scope: 'email profile',
    include_granted_scopes: 'true',
    prompt: 'select_account',
  });
  location.href = 'https://accounts.google.com/o/oauth2/v2/auth?' + params.toString();
}

// ── 리다이렉트 복귀 후 URL 해시에서 토큰 자동 처리 ──
(function handleOAuthCallback() {
  if (!location.hash) return;
  const params = new URLSearchParams(location.hash.slice(1));
  const token = params.get('access_token');
  if (!token) return;
  // URL에서 토큰 즉시 제거 (보안)
  history.replaceState(null, '', location.pathname);
  // DOM 준비되면 처리
  if (document.readyState === 'loading') {
    document.addEventListener('DOMContentLoaded', () => processGoogleToken(token), { once: true });
  } else {
    processGoogleToken(token);
  }
})();

function showLockError(msg) {
  document.getElementById('lockError').innerHTML = msg;
  document.getElementById('lockSpinner').classList.remove('show');
}

function showLogoutBtn(email) {
  const btn = document.createElement('button');
  btn.className = 'logout-btn';
  btn.textContent = '로그아웃 (' + email.replace('@osang.hs.kr','') + ')';
  btn.onclick = () => {
    localStorage.removeItem(SESSION_KEY);
    location.reload();
  };
  const status = document.getElementById('status');
  if (status) status.appendChild(btn);
  else document.body.appendChild(btn);
}

document.addEventListener('DOMContentLoaded', () => {
  // 세션 복원 시도
  try {
    const saved = JSON.parse(localStorage.getItem(SESSION_KEY) || 'null');
    if(saved && saved.token) {
      currentRole = saved.role;
      currentEmail = saved.email;
      currentPassword = saved.token;
      document.getElementById('lockSpinner').classList.add('show');
      const autoTimer = setTimeout(() => {
        document.getElementById('lockSpinner').classList.remove('show');
      }, 30000);
      init(saved.token).then(() => {
        clearTimeout(autoTimer);
        document.getElementById('lockScreen').classList.add('hidden');
        showLogoutBtn(saved.email);
      }).catch(() => {
        clearTimeout(autoTimer);
        localStorage.removeItem(SESSION_KEY);
        document.getElementById('lockSpinner').classList.remove('show');
      });
    }
  } catch(e) {}
});

// 학생 한 명의 필터 기준 가중평균 계산 (stu 전달 시 등급제 자동 판별)
function calcStudentAvg(studentData, filter, stu){
  if(!studentData || !studentData.grades) return null;
  let totalCredit=0, weighted=0;
  Object.entries(studentData.grades).forEach(([sem, semData])=>{
    const semIs9 = stu ? isSem9Grade(stu, semData) : (currentGradeIs9 || gradeScale===9);
    (semData.subjects||[]).forEach(sub=>{
      if(sub.등급==null || !sub.학점) return;
      const inFilter = filter ? filter.includes(sub.교과) : true;
      if(!inFilter) return;
      let g;
      if(semIs9){ g = sub.등급; }
      else {
        if(gradeScale===9){ const est=estGrade9(sub); g = est?est.grade:null; }
        else { g = sub.등급; }
      }
      if(g!=null){ totalCredit+=sub.학점; weighted+=g*sub.학점; }
    });
  });
  return totalCredit>0 ? weighted/totalCredit : null;
}

// 전체 학생 중 현재 학생의 등수 계산
function calcRank(currentData, filter){
  const myAvg = calcStudentAvg(currentData, filter, currentStu);
  if(myAvg===null) return null;
  let rank=1, total=0;
  students.forEach(stu=>{
    const data = getStudentGrades(stu);
    if(!data) return;
    const avg = calcStudentAvg(data, filter, stu);
    if(avg!==null){ total++; if(avg < myAvg) rank++; }
  });
  return { rank, total };
}

  const subjectBtns = ['전체','국어','영어','수학','사회','과학','기타'].map(k=>{

    return `<button class="toggle-btn ${isActive?'active':''}" data-subjfilter="${k}">${k}</button>`;
  }).join('');
  // 9등급제 학생은 이미 9등급 데이터 — 환산 버튼 불필요
  const scaleBtn = currentGradeIs9 ? '' : `<button class="toggle-btn scale-btn ${gradeScale===9?'active':''}" data-scale="toggle">9등급 환산</button>`;
  const rankBtn  = `<button class="toggle-btn rank-btn ${showRank?'active':''}" data-rank="toggle">🏅 학교 등수</button>`;
  const semesters = Object.keys(data.grades).sort();

  let html = `<div style="margin-bottom:14px;display:flex;align-items:center;flex-wrap:wrap;gap:6px;"><span class="filter-label">📚 교과:</span><div class="toggle-group" style="margin:0;">${subjectBtns}${scaleBtn}${rankBtn}</div></div>`;

  if(gradeScale === 9 && !currentGradeIs9){
    html += `<div class="est-info">
      <strong>📊 9등급 환산</strong> — 실제 석차 기반으로 표준 내신 9등급 컷(상위 4/11/23/40/60/77/89/96%)에 따라 환산합니다.
      석차 없는 과목(체육·예술 등)은 기존 성취도 표시.<br>
      <span style="color:#94a3b8;">※ <span class="est-tag">실제</span> 석차 기반 · <span class="est-tag" style="background:#fef3c7;color:#92400e;">추정</span> 분포 기반</span>
    </div>`;
  }

  html += renderGradeFilterSummary(data, semesters);
  semesters.forEach(sem=>{ html += renderSemesterBlock(sem, data.grades[sem]); });
  el.innerHTML = html;

  // 이벤트
  el.querySelectorAll('[data-subjfilter]').forEach(b=>{ b.onclick = ()=>{
    const k = b.dataset.subjfilter;
    if(k==='전체'){
      selectedSubjectFilters.clear();
    } else {
      if(selectedSubjectFilters.has(k)) selectedSubjectFilters.delete(k);
      else selectedSubjectFilters.add(k);
      if(selectedSubjectFilters.size===0) selectedSubjectFilters.clear();
    }
    renderTab();
  }; });
  el.querySelectorAll('[data-scale]').forEach(b=>{ b.onclick = ()=>{ gradeScale = gradeScale===5 ? 9 : 5; renderTab(); }; });
  el.querySelectorAll('[data-rank]').forEach(b=>{ b.onclick = ()=>{ showRank = !showRank; renderTab(); }; });

  // 학기별 추이 차트 그리기
  drawGradeChart(data, semesters);

  // 희망전공 합불 현황 (내신 탭 하단)
  // admissionsDB는 항상 있고, cutoffDB는 늦게 올 수 있음 → id 부여해서 나중에 갱신
  requestAnimationFrame(() => {
    const div = document.createElement('div');
    div.id = 'admissionsSection';
    el.appendChild(div);
    // admissionsDB만 있어도 표시 (cutoffDB 없어도 우리학교 데이터로)
    const section = renderMajorAdmissions();
    if(section) div.innerHTML = section;
    else div.innerHTML = ''; // cutoffDB 로드 후 자동 갱신됨
  });
}

function getActiveSubjectFilter(){
  // 선택된 교과들로부터 실제 교과명 배열 반환
  if(selectedSubjectFilters.size===0) return null; // 전체
  let result = [];
  selectedSubjectFilters.forEach(k=>{
    if(k==='기타') return; // 기타는 별도 처리
    const arr = SUBJECT_FILTER_MAP[k];
    if(arr) result = result.concat(arr);
  });
  return result.length > 0 ? result : null;
}

function isSubjectInFilter(subj){
  if(selectedSubjectFilters.size===0) return subj.등급!=null; // 전체: 등급 있는 과목만
  const group = getSubjectGroup(subj.교과||'');
  for(const k of selectedSubjectFilters){
    if(k==='기타'){
      if(group==='기타' && subj.등급!=null) return true;
    } else {
      if(group===k) return true;
    }
  }
  return false;
}

function renderGradeFilterSummary(data, semesters){
  const filter = getActiveSubjectFilter();
  const filterLabel = selectedSubjectFilters.size===0 ? '전체' : [...selectedSubjectFilters].join('+');
  const allSubjects = [];
  Object.entries(data.grades).forEach(([sem,semData])=>{ (semData.subjects||[]).forEach(sub=>{ allSubjects.push({...sub, sem}); }); });
  const filtered = selectedSubjectFilters.size===0
    ? allSubjects.filter(s=>s.등급!=null)
    : allSubjects.filter(s=>isSubjectInFilter(s));
  let totalCredit=0, weighted=0, cntWithGrade=0;
  filtered.forEach(s=>{ const g=getG(s); if(g!=null && s.학점){ totalCredit+=s.학점; weighted+=g*s.학점; cntWithGrade++; } });
  const avg = totalCredit>0 ? (weighted/totalCredit).toFixed(2) : '-';
  const subjNames = [...new Set(filtered.map(s=>s.과목))].join(', ');
  const is9 = isStudent9Grade(currentStu);
  const scaleLabel = is9 ? ' (9등급)' : '';

  // 등수 카드
  let rankCardHtml = '';
  if(showRank){
    const rankInfo = calcRank(data, filter);
    if(rankInfo){
      const pct = ((rankInfo.rank / rankInfo.total)*100).toFixed(0);
      rankCardHtml = `
        <div class="grade-stat-card rank-card">
          <div class="sc-label">🏅 ${selectedSubjectFilters.size>0?[...selectedSubjectFilters].join("+"): "전체"} 학교 등수${scaleLabel}</div>
          <div class="rank-right">
            <span class="rank-val">${rankInfo.rank}위</span>
            <span class="rank-sub">/ ${rankInfo.total}명 (상위 ${pct}%)</span>
          </div>
        </div>`;
    } else {
      rankCardHtml = `<div class="grade-stat-card rank-card"><div class="sc-label">🏅 등수</div><div class="rank-right"><span class="rank-val" style="font-size:14px;color:#94a3b8;">산출 불가</span></div></div>`;
    }
  }

  return `
    <div class="grade-summary-panel">
      <div class="grade-stats">
        <div class="grade-avg-big ${is9?'is9':''}">
          <div class="avg-label">${selectedSubjectFilters.size>0?[...selectedSubjectFilters].join("+"):"전체"} 평균등급${scaleLabel}</div>
          <div class="avg-val">${avg}</div>
          <div class="avg-filter">${selectedSubjectFilters.size>0?filterLabel+' 교과 필터':'전체 등급 과목 반영'}</div>
        </div>
        <div class="grade-stat-row">
          <div class="grade-stat-card"><div class="sc-label">반영 학점</div><div class="sc-val">${totalCredit}</div></div>
          <div class="grade-stat-card"><div class="sc-label">반영 과목수</div><div class="sc-val">${cntWithGrade}</div></div>
          ${rankCardHtml}
        </div>
      </div>
      <div class="grade-chart-panel">
        <div class="grade-chart-title">📈 학기별 평균등급 추이 ${is9?'<span style="color:#9333ea;font-size:11px;">[9등급]</span>':'<span style="color:#2563eb;font-size:11px;">[5등급]</span>'}</div>
        <div class="grade-chart-wrap"><canvas id="gradeChart"></canvas></div>
      </div>
    </div>
    ${filter?`<div style="color:#64748b;font-size:12px;margin-bottom:14px;">📌 포함 과목: ${subjNames||'없음'}</div>`:''}
  `;
}

function drawGradeChart(data, semesters){
  if(gradeChartInst){ gradeChartInst.destroy(); gradeChartInst=null; }
  const ctx = document.getElementById('gradeChart');
  if(!ctx) return;

  const n = semesters.length;
  const xPos = semesters.map((_, i) => (2 * i + 1) / (2 * n));
  // 9등급 학생은 라벨에 등급제 표시 없이 깔끔하게, 5등급 학생만 [5등급] 안내
  const is9 = isStudent9Grade(currentStu);
  const semLabels = semesters.map(sem => `${sem.split('-')[0]}학년\n${sem.split('-')[1]}학기`);

  // ★ 버그2 수정: null 제거 → 일부 학기만 있어도 해당 포인트만 정상 표시
  function toXY(avgs){
    return avgs
      .map((v, i) => v != null ? { x: xPos[i], y: v } : null)
      .filter(Boolean);
  }

  // 전체 평균 계산
  function semAllAvg(semData){
    const subjects = (semData && semData.subjects) || [];
    let cr = 0, wt = 0;
    subjects.forEach(s => {
      const g = getG(s);
      if(g != null && s.학점){ cr += s.학점; wt += g * s.학점; }
    });
    return cr > 0 ? wt / cr : null;
  }

  // ★ 버그3 수정: isSubjectInFilter 사용 → 기타 포함 모든 필터 정확하게 처리
  function semFilteredAvg(semData){
    const subjects = (semData && semData.subjects) || [];
    let cr = 0, wt = 0;
    subjects.forEach(s => {
      if(!isSubjectInFilter(s)) return;
      const g = getG(s);
      if(g != null && s.학점){ cr += s.학점; wt += g * s.학점; }
    });
    return cr > 0 ? wt / cr : null;
  }

  // ★ 버그3 수정: !filter 대신 size로 직접 판단 (기타 선택시 filter=null이라 틀렸던 것)
  const hasFilter = selectedSubjectFilters.size > 0;
  const allAvgs  = semesters.map(sem => semAllAvg(data.grades[sem]));
  const filtAvgs = hasFilter ? semesters.map(sem => semFilteredAvg(data.grades[sem])) : null;

  const mainColor = is9 ? '#9333ea' : (gradeScale === 9 ? '#9333ea' : '#2563eb');
  // 3학년(is9=true): 항상 9등급 기준
  // 1·2학년(is9=false): 9등급 환산 버튼 눌렀을 때만(gradeScale===9) 9등급 기준, 기본은 5등급
  const maxG = is9 ? 9 : (gradeScale === 9 ? 9 : 5);

  // 포인트 위에 등급 수치를 직접 그리는 인라인 플러그인
  const dataLabelPlugin = {
    id: 'gradePointLabels',
    afterDatasetsDraw(chart){
      const { ctx } = chart;
      chart.data.datasets.forEach((ds, di) => {
        const meta = chart.getDatasetMeta(di);
        meta.data.forEach((pt, pi) => {
          const raw = ds.data[pi];
          if(!raw || raw.y == null) return;
          ctx.save();
          ctx.font = 'bold 12px -apple-system, sans-serif';
          ctx.textAlign = 'center';
          ctx.textBaseline = 'bottom';
          const label = raw.y.toFixed(2);
          const tw = ctx.measureText(label).width;
          ctx.fillStyle = 'rgba(255,255,255,0.85)';
          ctx.fillRect(pt.x - tw/2 - 3, pt.y - 22, tw + 6, 16);
          ctx.fillStyle = ds.borderColor;
          ctx.fillText(label, pt.x, pt.y - 8);
          ctx.restore();
        });
      });
    }
  };

  const datasets = [];
  if(!hasFilter){
    datasets.push({
      label:'전체 평균', data: toXY(allAvgs), borderColor: mainColor, backgroundColor: mainColor+'22',
      tension: 0.3, pointRadius: 6, pointHoverRadius: 8, pointBackgroundColor: mainColor,
      fill: true, spanGaps: true
    });
  } else {
    datasets.push({
      label: [...selectedSubjectFilters].join('+'),
      data: toXY(filtAvgs),
      borderColor: mainColor, backgroundColor: mainColor+'22',
      tension: 0.3, pointRadius: 6, pointHoverRadius: 8, pointBackgroundColor: mainColor,
      fill: true, spanGaps: true
    });
  }

  // 유효 데이터 없으면 차트 미생성
  if(!datasets[0].data.length) return;

  gradeChartInst = new Chart(ctx, {
    type: 'line',
    plugins: [dataLabelPlugin],
    data: { datasets },
    options: {
      responsive: true, maintainAspectRatio: false,
      layout: { padding: { top: is9 ? 28 : 18 } },
      plugins:{
        legend:{ position:'bottom', labels:{ font:{size:11}, boxWidth:14 } },
        subtitle:{
          display: true,
          text: is9 ? '9등급제 (3학년)' : (gradeScale === 9 ? '5등급제 → 9등급 환산 적용 중' : '5등급제 (1·2학년) — 9등급 환산 버튼으로 전환 가능'),
          color: is9 ? '#9333ea' : (gradeScale === 9 ? '#9333ea' : '#2563eb'),
          font:{ size:11 }, padding:{ bottom:4 }
        },
        tooltip:{ callbacks:{ label: c => ` ${c.dataset.label}: ${c.parsed.y != null ? c.parsed.y.toFixed(2)+'등급' : '-'}` } }
      },
      scales:{
        y:{
          reverse: true, min: 0.5, max: maxG + 0.5,
          afterBuildTicks: axis => {
            axis.ticks = Array.from({length: maxG}, (_, i) => ({ value: i + 1 }));
          },
          ticks:{ callback: v => v+'등급', font:{size:11} },
          grid:{ color:'#f1f5f9' }
        },
        x:{
          type: 'linear', min: 0, max: 1,
          ticks:{
            callback: (val) => {
              const idx = xPos.indexOf(val);
              return idx >= 0 ? semLabels[idx] : '';
            },
            stepSize: null, includeBounds: false,
            font: { size: 11 }, maxTicksLimit: n + 2, autoSkip: false
          },
          afterBuildTicks: axis => { axis.ticks = xPos.map(v => ({ value: v })); },
          grid:{ display: false }
        }
      }
    }
  });
}

function renderSemesterBlock(sem, semData){
  const summary = semData.summary || {};
  const subjects = semData.subjects || [];
  const semLabel = `${sem.split('-')[0]}학년 ${sem.split('-')[1]}학기`;
  const semIs9 = isSem9Grade(currentStu, semData);
  let semCredit=0, semWeighted=0;
  subjects.forEach(s=>{
    let g;
    if(semIs9){ g = (s.등급!=null) ? s.등급 : null; }
    else { g = (gradeScale===9) ? (estGrade9(s)?.grade??null) : s.등급; }
    if(g!=null && s.학점){ semCredit+=s.학점; semWeighted+=g*s.학점; }
  });
  const semAvg = semCredit>0 ? (semWeighted/semCredit).toFixed(2) : '-';

  // 과목별 데이터 가공
  const subjectData = subjects.map(s=>{
    if(selectedSubjectFilters.size > 0 && !isSubjectInFilter(s)) return null;
    if(selectedSubjectFilters.size === 0 && s.등급 == null) return null;
    let g, estTag = '';
    if(semIs9){
      g = s.등급;
    } else {
      if(gradeScale===9){
        const info = estGrade9(s);
        g = info ? info.grade : null;
        if(info?.source==='실제') estTag = '<span class="est-tag" style="background:#dcfce7;color:#15803d;">실제</span>';
        else if(info?.source==='추정') estTag = '<span class="est-tag" style="background:#fef3c7;color:#92400e;">추정</span>';
      } else {
        g = s.등급;
      }
    }
    return { s, g, estTag };
  }).filter(Boolean);

  // 데스크탑: 테이블
  const showRankCol = semIs9 || gradeScale===9;
  const rows = subjectData.map(({s, g, estTag})=>{
    const gradeClass = g!=null ? 'grade-'+g : '';
    const rankCell = (showRankCol && s.석차 && s.수강자수)
      ? `${s.석차}/${s.수강자수}`.replace(/(\/\d+)\1+$/, '$1')
      : (s.수강자수||'-');
    const gDisplay = g!=null ? g : '-';
    return `<tr><td>${s.교과||'-'}</td><td class="subj">${s.과목}</td><td>${s.학점||'-'}</td><td>${s.원점수!=null?s.원점수:'-'}</td><td>${s.과목평균!=null?s.과목평균:'-'}</td><td>${s.성취도||'-'}</td><td class="${gradeClass}">${gDisplay}${estTag}</td><td>${rankCell}</td></tr>`;
  }).join('');

  // 모바일: 카드 (4열 그리드, 전체 배경색)
  const mobileCards = subjectData.map(({s, g, estTag})=>{
    // 5등급제: grade-5-1 ~ grade-5-5 클래스 사용 (9등급제는 grade-1~9)
    const gradeClass = g!=null ? (semIs9 ? 'grade-'+g : 'grade5-'+g) : '';
    const gDisplay = g!=null ? g : '-';
    const 석차Raw = (showRankCol && s.석차 && s.수강자수)
      ? `${s.석차}/${s.수강자수}`.replace(/(\/\d+)\1+$/, '$1')
      : null;

    const badgeHtml = badge => badge
      ? '<span style="flex-shrink:0;font-size:10px;font-weight:800;padding:2px 6px;border-radius:5px;">' + badge + '</span>'
      : '';

    const infoHtml = '<div style="margin:2px 5px 3px;padding:4px 5px;background:rgba(255,255,255,.15);border-radius:6px;display:flex;justify-content:space-between;gap:4px;">'
      + '<div style="display:flex;flex-direction:column;align-items:center;gap:1px;flex:1;">'
      + '<span style="font-size:9px;color:rgba(255,255,255,.6);font-weight:600;">학점</span>'
      + '<span style="font-size:12px;color:#fff;font-weight:800;">' + (s.학점||'-') + '</span>'
      + '</div>'
      + (s.원점수!=null ? '<div style="display:flex;flex-direction:column;align-items:center;gap:1px;flex:1;">'
      + '<span style="font-size:9px;color:rgba(255,255,255,.6);font-weight:600;">원점수</span>'
      + '<span style="font-size:12px;color:#fff;font-weight:800;">' + s.원점수 + '</span>'
      + '</div>' : '')
      + '</div>';

    const rankHtml = 석차Raw
      ? '<div style="font-size:9.5px;color:rgba(255,255,255,.7);padding:2px 6px 6px;text-align:center;font-weight:600;">석차 <b style="color:#fff;">' + 석차Raw + '</b></div>'
      : '';

    return '<div class="m-grade-card ' + gradeClass + '">'
      + '<div style="padding:7px 7px 2px;display:flex;flex-direction:column;gap:1px;">'
      + '<span style="font-size:9px;font-weight:700;color:rgba(255,255,255,.65);">' + escapeHtml(s.교과||'-') + '</span>'
      + '<span style="font-size:13px;font-weight:800;color:#fff;line-height:1.2;word-break:keep-all;">' + escapeHtml(s.과목) + '</span>'
      + '</div>'
      + '<div style="display:flex;align-items:baseline;justify-content:center;gap:3px;padding:4px 4px 2px;">'
      + '<span style="font-size:32px;font-weight:900;line-height:1;color:#fff;letter-spacing:-2px;text-shadow:0 1px 4px rgba(0,0,0,.25);">' + gDisplay + '</span>'
      + '<span style="font-size:10px;color:rgba(255,255,255,.65);font-weight:700;">등급</span>'
      + '</div>'
      + infoHtml
      + rankHtml
      + '</div>';
  }).join('');

  const scaleTag = semIs9
    ? ' <span style="color:#9333ea;font-weight:600;">[9등급]</span>'
    : (gradeScale===9 ? ' <span style="color:#9333ea;font-weight:600;">[9등급환산]</span>' : '');

  return `<div class="semester-block">
    <div class="semester-title">📚 ${semLabel}
      <span class="semester-meta">· 평균 ${semAvg}등급${scaleTag} · 총 ${summary.총학점||'-'}학점 (등급 ${summary.등급대상학점||'-'}학점)</span>
    </div>
    <!-- 데스크탑 테이블 -->
    <table class="grade m-hide-on-mobile"><thead><tr><th>교과</th><th>과목</th><th>학점</th><th>원점수</th><th>평균</th><th>성취도</th><th>등급</th><th>석차/수강자</th></tr></thead><tbody>${rows}</tbody></table>
    <!-- 모바일 카드 -->
    <div class="m-grade-cards m-show-on-mobile">${mobileCards}</div>
  </div>`;
}

// ========== 세특 요약 렌더링 ==========
function renderSummary(summary){
  if(!summary) return '';
  if(Array.isArray(summary)){
    const labels = ['①','②','③'];
    const items = summary.map((p,i) =>
      `<div class="sewtuk-summary"><span class="sum-bullet">${labels[i]||'·'}</span>${escapeHtml(p)}</div>`
    ).join('');
    return items;
  }
  return `<div class="sewtuk-summary"><span class="sum-bullet">요약</span>${escapeHtml(summary)}</div>`;
}

/* 세특/창체 개별평가 렌더링 함수 제거됨 — 키워드 시스템으로 대체 */

function toggleAllReason(pid){
  const bars=document.querySelectorAll(`.overall-reason-bar[data-pid="${pid}"]`);
  const arr=document.getElementById(pid+'-arr');
  const lbl=document.getElementById(pid+'-lbl');
  const isOpen=bars.length>0&&bars[0].style.display==='block';
  bars.forEach(b=>b.style.display=isOpen?'none':'block');
  if(arr) arr.textContent=isOpen?'▶':'▼';
  if(lbl) lbl.textContent=isOpen?'근거 보기':'근거 닫기';
}

// ========== 모의지원 자동완성 ==========
// ── 세부전형명 자동완성 ──────────────────────────────
function onSubTypeInput(){
  const univ  = document.getElementById('applyUniv').value.trim().toLowerCase();
  const type  = document.getElementById('applyType').value;
  const q     = document.getElementById('applySubType').value.trim().toLowerCase();
  const drop  = document.getElementById('subTypeDrop');
  const norm  = s => String(s||'').toLowerCase().replace(/\s/g,'').replace(/대학교$|대학$/, '');
  const univNorm = norm(univ);

  const seen = new Set();
  const candidates = kbUniv.filter(r => {
    const u   = norm(r['대학명']||'');
    const t   = String(r['전형유형']||'');
    const sub = String(r['세부전형명']||'').trim();
    if(!sub || seen.has(sub)) return false;
    const uMatch = !univ || u.includes(univNorm) || univNorm.includes(u);
    const tMatch = !type || t.includes(type) || type.includes(t);
    const qMatch = !q || sub.toLowerCase().includes(q);
    if(uMatch && tMatch && qMatch){ seen.add(sub); return true; }
    return false;
  }).slice(0,10);

  if(!candidates.length){ drop.style.display='none'; return; }

  drop.innerHTML = candidates.map(r => {
    const sub  = String(r['세부전형명']||'').trim();
    const type = String(r['전형유형']||'').trim();

    return `<div class="drop-item" data-val="${escapeHtml(sub)}" data-type="${escapeHtml(type)}"
      style="padding:9px 12px;cursor:pointer;font-size:13px;border-bottom:1px solid #f1f5f9;display:flex;justify-content:space-between;align-items:center;"
      onmouseover="this.style.background='#eff6ff'" onmouseout="this.style.background=''">
      <span><b>${escapeHtml(sub)}</b> <span style="color:#94a3b8;font-size:11px;">${type?'· '+type:''}</span></span>
      ${w}
    </div>`;
  }).join('');

  drop.querySelectorAll('.drop-item').forEach(el => {
    el.addEventListener('click', () => selectSubType(el.dataset.val, el.dataset.type));

// 입결 데이터 → Claude 프롬프트 텍스트
// ========== KB → 프롬프트 텍스트 변환 ==========
function buildKbPromptText(univ, dept, grade) {
  const norm = s => String(s||'').trim().toLowerCase()
    .replace(/\s/g,'').replace(/학교$|대학교$|대학$/,'');
  const univNorm = norm(univ);
  const deptNorm = norm(dept||'');
  const admYear  = grade===3?'2027': grade===2?'2028': null;
  let out = '';

  // ── kb_univ: 해당 대학 + 입시년도 매칭 ──
  const univEntries = kbUniv.filter(r=>{
    const u = norm(r['대학명']||'');
    const univMatch = u.includes(univNorm)||univNorm.includes(u);
    const entryYear = String(r['입시년도']||'').trim();
    const yearMatch = !entryYear || !admYear || entryYear===admYear;
    return univMatch && yearMatch;
  });
  if(univEntries.length){
    out += `▶ ${univ} 대학 정보 (KB)\n`;
    univEntries.slice(0, 5).forEach(r=>{ // 최대 5개
      const tags = [r['전형유형'],r['세부전형명'],r['모집단위'],r['수능최저']?`최저:${r['수능최저']}`:null]
        .filter(Boolean).join('/');
      out += `[${tags}] ${(r['내용']||'').substring(0,150)}\n`; // 150자로 축소
    });
    out += '\n';
  }

  // ── kb_topic: 학년/입시년도 맞는 주제 ──
  const topicEntries = kbTopic.filter(r=>{
    const targets = String(r['적용대상']||'공통').split(',').map(s=>s.trim());
    if(targets.includes('공통')) return true;
    if(admYear && targets.some(t=>t===admYear||t===`${grade}학년`)) return true;
    return false;
  });
  if(topicEntries.length){
    out += `▶ 입시 전략·정보 (KB)\n`;
    topicEntries.slice(0, 3).forEach(r=>{ // 최대 3개
      out += `[${r['주제']||''}] ${(r['내용']||'').substring(0,120)}\n`; // 120자로 축소
    });
    out += '\n';
  }

  // ── alumni: 해당 대학+학과 졸업생 합불 ──
  const alumniEntries = alumniKb.filter(r=>{
    const u = norm(r['지원대학']||'');
    const d = norm(r['지원학과']||'');
    const univMatch = u.includes(univNorm)||univNorm.includes(u);
    const deptMatch = !deptNorm||d.includes(deptNorm)||deptNorm.includes(d);
    return univMatch && deptMatch;
  }).slice(0,15);
  if(alumniEntries.length){
    out += `▶ 우리학교 졸업생 합불 사례 (KB)\n`;
    const pass = alumniEntries.filter(r=>String(r['결과']||'').includes('합격'));
    const fail = alumniEntries.filter(r=>String(r['결과']||'').includes('불합격'));
    if(pass.length){
      const passAvg = (pass.map(r=>parseFloat(r['내신평균']||0)).filter(v=>v>0)
        .reduce((a,b)=>a+b,0)/pass.length||0).toFixed(2);
      out += `  합격 ${pass.length}건 (내신평균 ${passAvg}등급)`;
      const keywords = [...new Set(pass.flatMap(r=>(r['세특키워드']||'').split(',').map(s=>s.trim()).filter(Boolean)))].slice(0,5);
      if(keywords.length) out += ` / 세특키워드: ${keywords.join(',')}`;
      out += '\n';
    }
    if(fail.length){
      const failAvg = (fail.map(r=>parseFloat(r['내신평균']||0)).filter(v=>v>0)
        .reduce((a,b)=>a+b,0)/fail.length||0).toFixed(2);
      out += `  불합격 ${fail.length}건 (내신평균 ${failAvg}등급)\n`;
    }
  }

  return out.trim() || null;
}

// ========== 학과 계열 키워드 매핑 ==========
// 학과명 → 레퍼런스 검색 키워드
const DEPT_KEYWORD_MAP = [
  { match: ['수의'],                keywords: ['수의대', '수의학'] },
  { match: ['의예', '의학', '의대'], keywords: ['의대', '의학', '의예'] },
  { match: ['약학', '약대'],         keywords: ['약대', '약학'] },
  { match: ['한의', '한의예'],       keywords: ['한의대', '한의학'] },
  { match: ['치의', '치대', '치과'], keywords: ['치의대', '치의학', '치과'] },
  { match: ['간호'],                 keywords: ['간호대', '간호학'] },
  { match: ['교육', '사범'],         keywords: ['교육대', '사범대', '교육학'] },
  { match: ['경영', '경제'],         keywords: ['경영', '경제', '상경'] },
  { match: ['법학', '법대'],         keywords: ['법대', '법학'] },
  { match: ['컴퓨터', 'sw', 'ai', '소프트웨어'], keywords: ['컴퓨터', 'it', 'sw', 'ai', '소프트웨어'] },
];

// 자료 제목의 유형을 판별 — 항상 포함할 "전략·흐름" 유형
const GENERAL_KEYWORDS = ['전략', '특징', '흐름', '변화사항', '변화 사항', '입시동향', '대입분석'];

function filterReferences(univInput, deptInput) {
  if (!referencesList.length) return [];

  // 현재 학생 학년 기준 입시년도 계산
  const stuGrade = currentStu ? (parseInt(currentStu.grade) || parseInt(String(currentStu.hak||'')[0])) : null;
  const admYear = stuGrade === 3 ? '2027' : stuGrade === 2 ? '2028' : null;

  const norm = s => String(s||'').replace(/\s/g,'').toLowerCase();
  const univNorm = norm(univInput || '');
  const univBase = univNorm.replace(/학교$|대학교$|대학$/, '');
  const deptNorm = norm(deptInput || '');

  // 학과명으로 계열 키워드 추출
  const deptKeywords = [];
  DEPT_KEYWORD_MAP.forEach(({ match, keywords }) => {
    if(match.some(m => deptNorm.includes(m))) {
      deptKeywords.push(...keywords);
    }
  });

  const matched = referencesList.filter(r => {
    // ① 학년 필터 (공통은 항상 통과)
    const target = r['적용학년'] || '공통';
    if(admYear && target !== '공통' && target !== admYear) return false;

    const title   = norm(r['제목'] || '');
    const preview = norm((r['내용'] || '').substring(0, 600)); // 300 → 600자로 확대

    // ② 전략·흐름 유형: 학년만 맞으면 항상 포함
    const isGeneral = GENERAL_KEYWORDS.some(k => title.includes(norm(k)));
    if(isGeneral) return true;

    // ③ 대학명 매칭
    if(univBase && (
      title.includes(univBase) || title.includes(univNorm) ||
      preview.includes(univBase) || preview.includes(univNorm)
    )) return true;

    // ④ 학과 계열 매칭 (수의대 지원 시 "전국 수의대 분석"도 포함)
    if(deptKeywords.length > 0) {
      if(deptKeywords.some(k => title.includes(k) || preview.includes(k))) return true;
    }

    return false;
  });

  // 프롬프트 토큰 과부하 방지: 총 5000자 이내로 제한
  let total = 0;
  return matched.filter(r => {
    const len = (r['내용'] || '').length;
    if(total + len > 5000) return false;
    total += len;
    return true;
  });
}


// ========== 합불 이력 조회 (GitHub JSON + 메모리 캐시) ==========
let _admAllCache = null;      // 전체 데이터 메모리 캐시
let _admAllLoading = null;    // 중복 fetch 방지

const ADM_JSON_URL = './admissions_all.json';  // GitHub Pages 경로

async function loadAdmissionsAll() {
  if (_admAllCache) return _admAllCache;
  if (_admAllLoading) return _admAllLoading;
  _admAllLoading = fetch(ADM_JSON_URL)
    .then(r => r.json())
    .then(json => {
      _admAllCache = json;  // { h: [...], d: [[...], ...] }
      _admAllLoading = null;
      return json;
    })
    .catch(() => { _admAllLoading = null; return null; });
  return _admAllLoading;
}

// 접속 직후 백그라운드 프리로드
function preloadAdmissions() { loadAdmissionsAll(); }

async function fetchAdmissionCases(univ, dept) {
  if (!univ || !dept) return { school: [], gb: [] };

  // ① GitHub JSON에서 전국 사례 필터
  let gb = [];
  try {
    const json = await loadAdmissionsAll();
    if (json && json.h && json.d) {
      const hi = {};
      json.h.forEach((h, i) => hi[h] = i);
      const norm = s => String(s||'').trim().toLowerCase().replace(/\s/g,'').replace(/[()（）]/g,'');
      const univNorm = norm(univ);
      const deptNorm = norm(dept);
      gb = json.d
        .filter(r => {
          const u = norm(r[hi['대학명']] || '');
          const uBase = u.replace(/학교$|대학교$|대학$/, '');
          const d = norm(r[hi['모집단위']] || '');
          const univMatch = u.includes(univNorm) || univNorm.includes(uBase) || uBase.includes(univNorm);
          const deptMatch = deptNorm.length < 2 || d.includes(deptNorm) || (deptNorm.length >= 3 && deptNorm.includes(d));
          return univMatch && deptMatch;
        })
        .map(r => ({
          대학명:   r[hi['대학명']],
          모집단위: r[hi['모집단위']],
          전형유형: r[hi['전형']],
          최종결과: r[hi['결과']],
          불합사유: r[hi['불합사유']],
          환산등급: r[hi['등급']],
        }));
    }
  } catch(e) { gb = []; }

  // ② Apps Script에서 우리 학교 자료 fetch
  let school = [];
  try {
    const timeout = new Promise((_,rej) => setTimeout(() => rej(new Error('timeout')), 8000));
    const data = await Promise.race([
      apiGet({ action: 'getAdmissions', password: currentPassword }),
      timeout
    ]);
    if (data && Array.isArray(data)) {
      const norm = s => String(s||'').trim().toLowerCase().replace(/\s/g,'').replace(/[()（）]/g,'');
      const univNorm = norm(univ);
      const deptNorm = norm(dept);
      school = data.filter(r => {
        const u = norm(r['대학명'] || '');
        const uBase = u.replace(/학교$|대학교$|대학$/, '');
        const d = norm(r['모집단위'] || '');
        const univMatch = u.includes(univNorm) || univNorm.includes(uBase) || uBase.includes(univNorm);
        const deptMatch = deptNorm.length < 2 || d.includes(deptNorm) || (deptNorm.length >= 3 && deptNorm.includes(d));
        return univMatch && deptMatch;
      });
    }
  } catch(e) { school = []; }

  return { school, gb };
}

function admissionsToPromptText(cases, univInput, deptInput) {
  const { school = [], gb = [] } = cases || {};
  if (!school.length && !gb.length) return '※ 합불 이력 없음 (해당 대학/학과 데이터 없음)';

  let text = '';

  // ① 우리 학교 자료 (집계형: 합격건수, 합격평균등급 등)
  if (school.length) {
    text += `※ 우리 학교 선배 합불 이력 (${univInput} — ${deptInput})\n`;
    const typeOrder = ['교과', '종합', '논술', '정시', '기타'];
    const byType = {};
    school.forEach(r => {
      const tf = String(r['전형유형'] || '기타');
      const key = typeOrder.find(t => tf.includes(t)) || '기타';
      if (!byType[key]) byType[key] = [];
      byType[key].push(r);
    });
    for (const tf of typeOrder) {
      if (!byType[tf]) continue;
      byType[tf].forEach(r => {
        let line = `  [${r['전형유형']}] 합격 ${r['합격건수'] || 0}건`;
        if (r['합격평균등급']) line += ` (평균 ${r['합격평균등급']}등급, 범위 ${r['합격최고등급']}~${r['합격최저등급']})`;
        line += ` / 불합격 ${r['불합격건수'] || 0}건`;
        if (r['불합격평균등급']) line += ` (불합 평균 ${r['불합격평균등급']}등급)`;
        text += line + '\n';
      });
    }
  }

  // ② 경북 지역 자료 (개별 사례형: 최종결과, 환산등급 등)
  if (gb.length) {
    text += `\n※ 경북 지역 합불 사례 (${univInput} — ${deptInput})\n`;
    const byType = {};
    gb.forEach(r => {
      const tf = String(r['전형유형'] || '');
      const key = tf.includes('교과') ? '교과' : tf.includes('종합') ? '종합' : tf.includes('논술') ? '논술' : '기타';
      if (!byType[key]) byType[key] = { pass: [], fail: [] };
      const result = String(r['최종결과'] || '');
      const grade = parseFloat(r['환산등급']);
      if (result.includes('합격')) {
        byType[key].pass.push(grade);
      } else {
        byType[key].fail.push({ grade, reason: r['불합사유'] || '' });
      }
    });
    for (const tf of ['교과', '종합', '논술', '기타']) {
      if (!byType[tf]) continue;
      const { pass, fail } = byType[tf];
      const passGrades = pass.filter(g => !isNaN(g));
      const failGrades = fail.map(f => f.grade).filter(g => !isNaN(g));
      const passAvg = passGrades.length ? (passGrades.reduce((a,b)=>a+b,0)/passGrades.length).toFixed(2) : null;
      const passMin = passGrades.length ? Math.min(...passGrades).toFixed(2) : null;
      const passMax = passGrades.length ? Math.max(...passGrades).toFixed(2) : null;
      const failAvg = failGrades.length ? (failGrades.reduce((a,b)=>a+b,0)/failGrades.length).toFixed(2) : null;
      const reasons = [...new Set(fail.map(f=>f.reason).filter(Boolean))].join(', ');
      let line = `  [${tf}전형] 합격 ${pass.length}건`;
      if (passAvg) line += ` (평균 ${passAvg}등급, 범위 ${passMin}~${passMax})`;
      line += ` / 불합 ${fail.length}건`;
      if (failAvg) line += ` (불합 평균 ${failAvg}등급)`;
      if (reasons) line += ` — 불합사유: ${reasons}`;
      text += line + '\n';
    }
  }

  return text.trim();
}

// ========== 모의지원 횟수 관리 (학생 전용) ==========
// 저장 키: applyCount_{token}_{hak} → 사용 횟수
// 교사/관리자는 횟수 제한 없음

function getApplyLimit(stu){ return 9999; } // API-free — 횟수 제한 없음

function getApplyCountKey(hak){
  // 학생 토큰 + 학번 조합으로 키 생성 (토큰은 개인 식별자)
  return `applyCount_${currentPassword}_${hak}`;
}

function getApplyUsed(hak){
  const key = getApplyCountKey(hak);
  return parseInt(localStorage.getItem(key) || '0');
}

function incrementApplyCount(hak){
  const key = getApplyCountKey(hak);
  const cur = getApplyUsed(hak);
  localStorage.setItem(key, String(cur + 1));
}
