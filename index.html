<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<title>오상고 상담카드 시스템 2026</title>
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: 'Pretendard', -apple-system, sans-serif; background: #f5f6fa; color: #222; }
  .app { display: grid; grid-template-columns: 280px 1fr; grid-template-rows: 60px 1fr; height: 100vh; }
  header { grid-column: 1 / -1; background: #fff; border-bottom: 1px solid #e5e7eb; display: flex; align-items: center; padding: 0 24px; justify-content: space-between; }
  .logo { font-size: 18px; font-weight: 700; }
  .logo .year { color: #6b7280; font-weight: 500; margin-left: 8px; font-size: 14px; }
  .counter { color: #6b7280; font-size: 13px; }
  aside { background: #fff; border-right: 1px solid #e5e7eb; padding: 16px; overflow-y: auto; }
  aside input, aside select { width: 100%; padding: 8px 10px; border: 1px solid #d1d5db; border-radius: 6px; font-size: 14px; margin-bottom: 8px; }
  .filters { display: grid; grid-template-columns: 1fr 1fr; gap: 6px; }
  .student-list { margin-top: 12px; }
  .student-item { display: grid; grid-template-columns: 60px 1fr auto; gap: 8px; padding: 8px 10px; cursor: pointer; border-radius: 6px; font-size: 14px; align-items: center; }
  .student-item:hover { background: #f3f4f6; }
  .student-item.active { background: #fef3c7; font-weight: 600; }
  .student-item .hak { color: #6b7280; font-variant-numeric: tabular-nums; }
  .student-item .gender { font-size: 11px; color: #9ca3af; }
  main { padding: 20px; overflow-y: auto; }
  .card { background: #fff; border-radius: 10px; padding: 20px; margin-bottom: 16px; box-shadow: 0 1px 3px rgba(0,0,0,.04); }
  .student-header h2 { font-size: 22px; margin-bottom: 10px; }
  .badges { display: flex; gap: 6px; flex-wrap: wrap; }
  .badge { padding: 4px 10px; border-radius: 999px; font-size: 12px; background: #eff6ff; color: #1e40af; border: 1px solid #bfdbfe; }
  .badge.gender-m { background: #dbeafe; color: #1e40af; }
  .badge.gender-f { background: #fce7f3; color: #9d174d; }
  .tabs { display: flex; gap: 4px; border-bottom: 2px solid #e5e7eb; margin-bottom: 16px; }
  .tab { padding: 10px 16px; cursor: pointer; border: none; background: none; font-size: 14px; color: #6b7280; border-bottom: 2px solid transparent; margin-bottom: -2px; font-weight: 500; }
  .tab.active { color: #1e40af; border-bottom-color: #1e40af; font-weight: 700; background: #eff6ff; border-radius: 6px 6px 0 0; }
  .empty { text-align: center; color: #9ca3af; padding: 60px 20px; }
  table.info-table { width: 100%; border-collapse: collapse; }
  table.info-table td { padding: 10px 14px; border-bottom: 1px solid #f3f4f6; font-size: 14px; }
  table.info-table td.label { background: #f9fafb; font-weight: 600; color: #374151; width: 160px; }
  .toolbar { display: flex; gap: 6px; margin-bottom: 12px; }
  .toolbar button { padding: 6px 14px; border: 1px solid #d1d5db; background: #fff; border-radius: 6px; cursor: pointer; font-size: 13px; }
  .toolbar button.active { background: #1e40af; color: #fff; border-color: #1e40af; }
  table.mock-table { width: 100%; border-collapse: collapse; font-size: 13px; }
  table.mock-table th, table.mock-table td { padding: 8px 10px; text-align: center; border-bottom: 1px solid #f3f4f6; }
  table.mock-table th { background: #f9fafb; font-weight: 600; color: #374151; }
  table.mock-table td.round { color: #1e40af; font-weight: 600; }
  .grade-1 { color: #1e40af; font-weight: 700; }
  .grade-2 { color: #2563eb; font-weight: 600; }
  .grade-3 { color: #059669; font-weight: 600; }
  .grade-4 { color: #ca8a04; }
  .grade-5 { color: #d97706; }
  .grade-6, .grade-7, .grade-8, .grade-9 { color: #dc2626; }
  .chart-wrap { height: 400px; margin-bottom: 16px; }
  .section-title { font-size: 15px; font-weight: 700; margin-bottom: 10px; color: #111827; }
</style>
</head>
<body>
<div class="app">
  <header>
    <div class="logo">📋 오상고 상담카드 시스템 <span class="year">2026</span></div>
    <div class="counter" id="counter">-</div>
  </header>
  <aside>
    <input type="text" id="search" placeholder="🔍 이름 또는 학번 검색">
    <div class="filters">
      <select id="gradeFilter"><option value="">전체 학년</option><option value="1">1학년</option><option value="2">2학년</option><option value="3">3학년</option></select>
      <select id="classFilter"><option value="">전체 반</option></select>
    </div>
    <div class="student-list" id="studentList"></div>
  </aside>
  <main id="main">
    <div class="empty">👈 왼쪽에서 학생을 선택하세요</div>
  </main>
</div>

<script>
const LABELS = { hak:'학번', grade:'학년', class:'반', no:'번호', name:'이름', gender:'성별', g1_hak:'1학년 학번', g2_hak:'2학년 학번', g3_hak:'3학년 학번' };
const ORDER = ['hak','grade','class','no','name','gender','g1_hak','g2_hak','g3_hak'];
const ROUND_ORDER = {'g1_3월':1,'g1_6월':2,'g1_9월':3,'g1_11월':4,'g2_3월':5,'g2_6월':6,'g2_9월':7,'g2_11월':8,'g3_3월':9,'g3_6월':10,'g3_9월':11,'g3_11월':12};
const ROUND_LABEL = {'g1_3월':'1학년 3월','g1_6월':'1학년 6월','g1_9월':'1학년 9월','g1_11월':'1학년 11월','g2_3월':'2학년 3월','g2_6월':'2학년 6월','g2_9월':'2학년 9월','g2_11월':'2학년 11월','g3_3월':'3학년 3월','g3_6월':'3학년 6월','g3_9월':'3학년 9월','g3_11월':'3학년 11월'};
const SUBJECTS = ['국어','수학','영어','한국사','탐구1','탐구2'];
const COLORS = { '국어':'#3b82f6', '수학':'#ef4444', '영어':'#10b981', '한국사':'#8b5cf6', '탐구1':'#f97316', '탐구2':'#06b6d4' };

let students = [], mock = {}, current = null, mode = '등급', chart = null;

async function init() {
  try {
    const [sRes, mRes] = await Promise.all([fetch('data/students.json'), fetch('data/mock.json')]);
    const sData = await sRes.json();
    students = Array.isArray(sData) ? sData : (sData.students || Object.values(sData));
    mock = await mRes.json();
    document.getElementById('counter').textContent = `총 ${students.length}명 로드됨`;
    renderList();
  } catch(e) {
    document.getElementById('counter').textContent = '오류: ' + e.message;
    console.error(e);
  }
  document.getElementById('search').addEventListener('input', renderList);
  document.getElementById('gradeFilter').addEventListener('change', () => { updateClassFilter(); renderList(); });
  document.getElementById('classFilter').addEventListener('change', renderList);
}

function updateClassFilter() {
  const g = document.getElementById('gradeFilter').value;
  const sel = document.getElementById('classFilter');
  sel.innerHTML = '<option value="">전체 반</option>';
  if (!g) return;
  const classes = [...new Set(students.filter(s => String(s.hak||'').startsWith(g)).map(s => String(s.hak).substring(1,3)))].sort();
  classes.forEach(c => { sel.innerHTML += `<option value="${c}">${parseInt(c)}반</option>`; });
}

function renderList() {
  const q = document.getElementById('search').value.toLowerCase();
  const g = document.getElementById('gradeFilter').value;
  const c = document.getElementById('classFilter').value;
  const filtered = students.filter(s => {
    const hak = String(s.hak||'');
    if (g && !hak.startsWith(g)) return false;
    if (c && hak.substring(1,3) !== c) return false;
    if (q && !(s.name||'').toLowerCase().includes(q) && !hak.includes(q)) return false;
    return true;
  });
  const list = document.getElementById('studentList');
  list.innerHTML = filtered.map(s => `
    <div class="student-item ${current && current.hak===s.hak?'active':''}" data-hak="${s.hak}">
      <span class="hak">${s.hak}</span>
      <span class="name">${s.name||''}</span>
      <span class="gender">${s.gender||''}</span>
    </div>`).join('');
  list.querySelectorAll('.student-item').forEach(el => {
    el.addEventListener('click', () => {
      current = students.find(s => String(s.hak) === el.dataset.hak);
      document.querySelector('.tabs .tab.active')?.classList.remove('active');
      window._activeTab = '기본정보';
      renderList();
      renderMain();
    });
  });
}

function renderMain() {
  if (!current) return;
  const activeTab = window._activeTab || '기본정보';
  const tabs = ['기본정보','모의고사','내신','세특','행발','수상','독서'];
  const hak = String(current.hak||'');
  const grade = hak[0], cls = parseInt(hak.substring(1,3)), no = parseInt(hak.substring(3,5));
  const genderClass = current.gender === '남' ? 'gender-m' : 'gender-f';
  document.getElementById('main').innerHTML = `
    <div class="card student-header">
      <h2>${current.name} (${current.hak})</h2>
      <div class="badges">
        <span class="badge">${grade}학년 ${cls}반 ${no}번</span>
        <span class="badge ${genderClass}">${current.gender||''}</span>
        ${current.g1_hak?`<span class="badge">1학년 학번: ${current.g1_hak}</span>`:''}
        ${current.g2_hak?`<span class="badge">2학년 학번: ${current.g2_hak}</span>`:''}
        ${current.g3_hak?`<span class="badge">3학년 학번: ${current.g3_hak}</span>`:''}
      </div>
    </div>
    <div class="card">
      <div class="tabs">
        ${tabs.map(t => `<button class="tab ${t===activeTab?'active':''}" data-tab="${t}">${t}</button>`).join('')}
      </div>
      <div id="tabContent"></div>
    </div>
  `;
  document.querySelectorAll('.tab').forEach(btn => {
    btn.addEventListener('click', () => {
      window._activeTab = btn.dataset.tab;
      renderMain();
    });
  });
  renderTab(activeTab);
}

function renderTab(tab) {
  const el = document.getElementById('tabContent');
  if (tab === '기본정보') {
    const rows = ORDER.filter(k => current[k] !== undefined && current[k] !== null && current[k] !== '')
      .map(k => `<tr><td class="label">${LABELS[k]||k}</td><td>${current[k]}</td></tr>`);
    const extras = Object.keys(current).filter(k => !ORDER.includes(k))
      .map(k => `<tr><td class="label">${LABELS[k]||k}</td><td>${current[k]}</td></tr>`);
    el.innerHTML = `<table class="info-table"><tbody>${rows.join('')}${extras.join('')}</tbody></table>`;
  } else if (tab === '모의고사') {
    renderMock(el);
  } else {
    el.innerHTML = `<div class="empty">🚧 ${tab} 탭은 준비 중입니다</div>`;
  }
}

function renderMock(el) {
  const data = mock[current.hak] || mock[String(current.hak)] || mock[Number(current.hak)] || [];
  if (!data.length) {
    el.innerHTML = `<div class="empty">📊 모의고사 데이터가 없습니다</div>`;
    return;
  }
  const sorted = [...data].sort((a,b) => (ROUND_ORDER[a.round]||99) - (ROUND_ORDER[b.round]||99));
  const modes = ['등급','백분위','표준점수','원점수'];
  el.innerHTML = `
    <div class="toolbar">
      ${modes.map(m => `<button class="${m===mode?'active':''}" data-mode="${m}">${m}</button>`).join('')}
    </div>
    <div class="section-title">📈 ${mode} 추이</div>
    <div class="chart-wrap"><canvas id="chart"></canvas></div>
    <div class="section-title">회차별 세부 성적</div>
    <table class="mock-table">
      <thead><tr><th>회차</th>${SUBJECTS.map(s=>`<th>${s}</th>`).join('')}</tr></thead>
      <tbody>
        ${sorted.map(r => `<tr>
          <td class="round">${ROUND_LABEL[r.round]||r.round}</td>
          ${SUBJECTS.map(s => {
            const v = r[s]; if (!v) return '<td>-</td>';
            let val = mode==='등급'?v.등급 : mode==='백분위'?v.백분위 : mode==='표준점수'?v.표준점수 : v.원점수;
            if (val === undefined || val === null) val = v.등급;
            const cls = mode==='등급' && v.등급 ? `grade-${v.등급}` : '';
            const sel = v.선택 ? `<small style="color:#6b7280">(${v.선택})</small> ` : '';
            return `<td class="${cls}">${sel}${val}</td>`;
          }).join('')}
        </tr>`).join('')}
      </tbody>
    </table>
  `;
  document.querySelectorAll('.toolbar button').forEach(btn => {
    btn.addEventListener('click', () => { mode = btn.dataset.mode; renderMock(el); });
  });
  drawChart(sorted);
}

function drawChart(sorted) {
  const ctx = document.getElementById('chart'); if (!ctx) return;
  if (chart) chart.destroy();
  const labels = sorted.map(r => ROUND_LABEL[r.round] || r.round);
  const datasets = SUBJECTS.map(sub => ({
    label: sub,
    data: sorted.map(r => {
      const v = r[sub]; if (!v) return null;
      if (mode === '등급') return v.등급;
      if (mode === '백분위') return v.백분위 ?? (v.등급 ? (10-v.등급)*10 : null);
      if (mode === '표준점수') return v.표준점수 ?? null;
      if (mode === '원점수') return v.원점수 ?? null;
    }),
    borderColor: COLORS[sub], backgroundColor: COLORS[sub],
    tension: 0.3, pointRadius: 4, borderWidth: 2, spanGaps: true
  }));
  let yOpts;
  if (mode === '등급') {
    yOpts = { reverse: true, min: 0.5, max: 9.5, afterBuildTicks: (axis) => { axis.ticks = [1,2,3,4,5,6,7,8,9].map(v=>({value:v})); }, title: { display: true, text: '등급', font:{weight:'bold'} } };
  } else if (mode === '백분위' || mode === '원점수') {
    yOpts = { min: 0, max: 100, ticks: { stepSize: 10 }, title: { display: true, text: mode, font:{weight:'bold'} } };
  } else {
    yOpts = { min: 0, max: 200, ticks: { stepSize: 20 }, title: { display: true, text: '표준점수', font:{weight:'bold'} } };
  }
  chart = new Chart(ctx, {
    type: 'line',
    data: { labels, datasets },
    options: { responsive: true, maintainAspectRatio: false, scales: { y: yOpts }, plugins: { legend: { position: 'bottom' } } }
  });
}

init();
</script>
</body>
</html>
