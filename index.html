<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>2026 대입 상담카드</title>
<link rel="stylesheet" href="css/styles.css">
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
</head>
<body>
<div class="app">
  <aside class="sidebar">
    <h1>🎓 상담카드</h1>
    <div class="filters">
      <input type="text" id="search" placeholder="🔍 이름/학번 검색">
      <div class="filter-row">
        <select id="gradeFilter">
          <option value="all">전체</option>
          <option value="1">1학년</option>
          <option value="2">2학년</option>
          <option value="3">3학년</option>
        </select>
        <select id="classFilter" style="display:none;">
          <option value="all">전체 반</option>
        </select>
      </div>
    </div>
    <div class="student-count" id="studentCount"></div>
    <ul class="student-list" id="studentList"></ul>
  </aside>

  <main class="content">
    <div id="emptyState" class="empty-state">
      <h2>👈 학생을 선택하세요</h2>
      <p>왼쪽 목록에서 학생을 클릭하면 상담카드가 표시됩니다.</p>
    </div>
    <div id="cardView" style="display:none;">
      <header class="student-header">
        <h2 id="studentName"></h2>
        <div class="student-info" id="studentInfo"></div>
      </header>
      <nav class="tabs">
        <button class="tab active" data-tab="basic">기본정보</button>
        <button class="tab" data-tab="grades">내신</button>
        <button class="tab" data-tab="mock">모의고사</button>
        <button class="tab" data-tab="award">수상</button>
        <button class="tab" data-tab="autonomy">자율</button>
        <button class="tab" data-tab="club">동아리</button>
        <button class="tab" data-tab="volunteer">봉사</button>
        <button class="tab" data-tab="career">진로</button>
        <button class="tab" data-tab="reading">독서</button>
        <button class="tab" data-tab="sewtuk">세특</button>
        <button class="tab" data-tab="behavior">행발</button>
        <button class="tab" data-tab="attendance">출결</button>
        <button class="tab" data-tab="applications">지원대학</button>
        <button class="tab" data-tab="checklist">체크리스트</button>
      </nav>
      <div class="tab-content" id="tabContent"></div>
    </div>
  </main>
</div>
<script src="js/app.js"></script>
</body>
</html>
