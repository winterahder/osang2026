<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<title>세특 요약 생성기 — 오상고 관리자</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;500;600;700&display=swap');
  :root {
    --bg:#0f1117; --surface:#1a1d27; --surface2:#22263a; --border:#2e334d;
    --accent:#6366f1; --accent2:#818cf8; --green:#10b981; --yellow:#f59e0b;
    --red:#ef4444; --text:#e2e8f0; --muted:#64748b; --muted2:#94a3b8;
  }
  *{box-sizing:border-box;margin:0;padding:0;}
  body{font-family:'Noto Sans KR',sans-serif;background:var(--bg);color:var(--text);font-size:14px;min-height:100vh;}

  /* 잠금 화면 */
  #lockScreen{position:fixed;inset:0;background:var(--bg);display:flex;align-items:center;justify-content:center;z-index:9999;}
  #lockScreen.hidden{display:none;}
  .lock-wrap{text-align:center;max-width:400px;width:100%;padding:0 24px;}
  .lock-wrap .icon{font-size:48px;margin-bottom:20px;}
  .lock-wrap h1{font-size:20px;font-weight:700;margin-bottom:6px;}
  .lock-wrap p{color:var(--muted2);font-size:13px;margin-bottom:20px;}
  .lock-field-label{font-size:12px;color:var(--muted2);text-align:left;margin-bottom:4px;margin-top:10px;}
  .lock-wrap input{width:100%;padding:12px 14px;background:var(--surface2);border:1.5px solid var(--border);border-radius:10px;color:var(--text);font-size:14px;outline:none;transition:border-color .2s;}
  .lock-wrap input:focus{border-color:var(--accent);}
  .lock-wrap input#pwInput{letter-spacing:3px;}
  .lock-wrap .lock-btn{width:100%;padding:13px;background:var(--accent);color:#fff;border:none;border-radius:10px;font-size:15px;font-weight:600;cursor:pointer;margin-top:16px;transition:opacity .2s;font-family:'Noto Sans KR',sans-serif;}
  .lock-wrap .lock-btn:hover{opacity:.85;}
  .lock-error{color:var(--red);font-size:13px;margin-top:8px;min-height:20px;}
  .api-note{font-size:11px;color:var(--muted);margin-top:5px;line-height:1.5;text-align:left;}

  /* 헤더 */
  header{background:var(--surface);border-bottom:1px solid var(--border);padding:11px 20px;display:flex;align-items:center;justify-content:space-between;flex-shrink:0;}
  header h1{font-size:15px;font-weight:700;display:flex;align-items:center;gap:8px;}
  .header-badge{background:var(--accent);color:#fff;padding:2px 9px;border-radius:20px;font-size:11px;font-weight:600;}
  #headerStatus{color:var(--muted2);font-size:12px;}

  /* 레이아웃 — position 기반으로 완전히 재작성 */
  .layout{position:fixed;top:49px;left:0;right:0;bottom:0;display:grid;grid-template-columns:260px 1fr;}

  /* 사이드바 */
  aside{background:var(--surface);border-right:1px solid var(--border);display:flex;flex-direction:column;overflow:hidden;height:100%;}
  .aside-top{padding:12px;border-bottom:1px solid var(--border);flex-shrink:0;}
  .aside-search{width:100%;padding:8px 10px;background:var(--surface2);border:1px solid var(--border);border-radius:7px;color:var(--text);font-size:13px;outline:none;margin-bottom:8px;font-family:'Noto Sans KR',sans-serif;}
  .aside-search:focus{border-color:var(--accent);}
  .filter-tabs{display:flex;gap:3px;}
  .filter-tab{flex:1;padding:5px 3px;text-align:center;font-size:11px;font-weight:600;background:var(--surface2);border:1px solid var(--border);border-radius:5px;cursor:pointer;color:var(--muted2);transition:all .15s;}
  .filter-tab.active{background:var(--accent);color:#fff;border-color:var(--accent);}
  .progress-wrap{padding:8px 0 2px;display:none;}
  .progress-bar-bg{background:var(--border);border-radius:3px;height:3px;}
  .progress-bar-fill{background:var(--green);height:3px;border-radius:3px;transition:width .3s;}
  .progress-label{font-size:11px;color:var(--muted);margin-top:3px;}
  .stu-count{padding:6px 12px;font-size:11px;color:var(--muted);border-bottom:1px solid var(--border);flex-shrink:0;}
  .stu-list{flex:1;overflow-y:auto;}
  .stu-item{display:flex;align-items:center;gap:8px;padding:9px 12px;cursor:pointer;border-bottom:1px solid rgba(46,51,77,.4);transition:background .1s;}
  .stu-item:hover{background:var(--surface2);}
  .stu-item.active{background:rgba(99,102,241,.15);border-right:2px solid var(--accent);}
  .stu-hak{font-size:11px;color:var(--muted2);width:46px;flex-shrink:0;}
  .stu-name{font-size:13px;font-weight:500;flex:1;}
  .stu-dot{width:7px;height:7px;border-radius:50%;flex-shrink:0;}
  .stu-dot.done{background:var(--green);}
  .stu-dot.partial{background:var(--yellow);}
  .stu-dot.none{background:var(--border);}

  /* 메인 */
  main{display:flex;flex-direction:column;overflow:hidden;height:100%;}
  .main-placeholder{flex:1;display:flex;align-items:center;justify-content:center;flex-direction:column;gap:10px;color:var(--muted);}

  /* 학생 헤더 */
  .stu-header{padding:11px 16px;background:var(--surface);border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between;flex-shrink:0;gap:8px;flex-wrap:wrap;}
  .stu-info{display:flex;align-items:center;gap:8px;flex-wrap:wrap;}
  .stu-info h2{font-size:16px;font-weight:700;}
  .badge{padding:2px 8px;border-radius:20px;font-size:11px;font-weight:600;background:var(--surface2);color:var(--muted2);border:1px solid var(--border);}
  .header-btns{display:flex;gap:6px;flex-shrink:0;}
  .btn-all{padding:7px 13px;background:linear-gradient(135deg,#6366f1,#8b5cf6);color:#fff;border:none;border-radius:7px;font-size:12px;font-weight:700;cursor:pointer;transition:opacity .2s;display:flex;align-items:center;gap:5px;font-family:'Noto Sans KR',sans-serif;}
  .btn-all:hover{opacity:.85;}
  .btn-all:disabled{opacity:.4;cursor:not-allowed;}
  .btn-one{padding:7px 13px;background:var(--surface2);color:var(--accent2);border:1.5px solid var(--accent);border-radius:7px;font-size:12px;font-weight:600;cursor:pointer;font-family:'Noto Sans KR',sans-serif;transition:all .15s;}
  .btn-one:hover{background:rgba(99,102,241,.15);}
  .btn-one:disabled{opacity:.4;cursor:not-allowed;}
  .btn-save{padding:7px 13px;background:var(--green);color:#fff;border:none;border-radius:7px;font-size:12px;font-weight:700;cursor:pointer;font-family:'Noto Sans KR',sans-serif;}
  .btn-save:hover{opacity:.85;}
  .btn-export{padding:7px 11px;background:var(--surface2);color:var(--muted2);border:1px solid var(--border);border-radius:7px;font-size:12px;cursor:pointer;font-family:'Noto Sans KR',sans-serif;}
  .btn-export:hover{border-color:var(--accent2);color:var(--accent2);}

  /* 전체 진행 바 */
  .all-progress{padding:6px 14px;background:rgba(99,102,241,.08);border-bottom:1px solid var(--border);display:none;align-items:center;gap:10px;flex-shrink:0;}
  .all-progress.show{display:flex;}
  .all-prog-bg{flex:1;background:var(--border);border-radius:3px;height:5px;}
  .all-prog-fill{background:var(--accent);height:5px;border-radius:3px;transition:width .3s;}
  .all-prog-label{font-size:12px;color:var(--muted2);flex-shrink:0;min-width:70px;text-align:right;}

  /* 콘텐츠 영역 */
  .content-area{display:grid;grid-template-columns:1fr 360px;flex:1;overflow:hidden;}

  /* 세특 패널 */
  .sewtuk-panel{overflow-y:auto;padding:12px;gap:8px;border-right:1px solid var(--border);}
  .sewtuk-item{background:var(--surface);border:1.5px solid var(--border);border-radius:10px;overflow:hidden;}
  .sewtuk-item.s-pending{border-color:var(--yellow);}
  .sewtuk-item.s-done{border-color:rgba(16,185,129,.4);}
  .sewtuk-head{padding:9px 12px;display:flex;align-items:center;gap:7px;background:var(--surface2);flex-wrap:wrap;}
  .subj-cat{padding:2px 7px;background:rgba(99,102,241,.2);color:var(--accent2);border-radius:4px;font-size:11px;font-weight:700;}
  .subj-name{font-weight:600;font-size:13px;flex:1;}
  .subj-meta{font-size:11px;color:var(--muted);}
  .ibadge-done{padding:2px 7px;background:rgba(16,185,129,.2);color:var(--green);border-radius:4px;font-size:11px;font-weight:700;}
  .ibadge-pending{padding:2px 7px;background:rgba(245,158,11,.2);color:var(--yellow);border-radius:4px;font-size:11px;font-weight:700;}
  .ibadge-new{padding:2px 7px;background:rgba(99,102,241,.25);color:var(--accent2);border-radius:4px;font-size:11px;font-weight:700;}
  .ibadge-eval-done{padding:2px 7px;background:rgba(6,182,212,.2);color:#06b6d4;border-radius:4px;font-size:11px;font-weight:700;}
  .ibadge-eval-none{padding:2px 7px;background:rgba(100,116,139,.1);color:var(--muted);border-radius:4px;font-size:11px;font-weight:700;}
  .badge-group{display:flex;gap:4px;align-items:center;}
  .ibadge-new{padding:2px 7px;background:rgba(99,102,241,.25);color:var(--accent2);border-radius:4px;font-size:11px;font-weight:700;}

  /* 세특 내용 접기/펼치기 */
  .content-wrap{position:relative;}
  .sewtuk-content{padding:8px 12px;font-size:12px;color:var(--muted2);line-height:1.7;white-space:pre-wrap;max-height:70px;overflow:hidden;transition:max-height .3s ease;}
  .sewtuk-content.expanded{max-height:500px;}
  .content-fade{position:absolute;bottom:0;left:0;right:0;height:26px;background:linear-gradient(transparent,var(--surface));pointer-events:none;}
  .content-fade.hidden{display:none;}
  .toggle-btn-small{padding:2px 12px 6px;font-size:11px;color:var(--accent2);cursor:pointer;display:block;background:none;border:none;font-family:'Noto Sans KR',sans-serif;}
  .toggle-btn-small:hover{text-decoration:underline;}

  /* 요약 영역 */
  .summary-area{padding:8px 12px 10px;border-top:1px solid var(--border);}
  .summary-label{font-size:11px;color:var(--muted);margin-bottom:5px;font-weight:600;}
  .summary-pill{display:flex;align-items:flex-start;gap:7px;margin-bottom:5px;font-size:12.5px;color:var(--text);line-height:1.65;}
  .pill-num{flex-shrink:0;background:var(--accent);color:#fff;border-radius:3px;padding:1px 5px;font-size:10px;font-weight:700;margin-top:3px;}
  .summary-empty{font-size:12px;color:var(--muted);font-style:italic;}

  /* 생성 버튼 */
  .gen-btn{margin:0 12px 11px;padding:8px 12px;background:transparent;border:1.5px solid var(--accent);color:var(--accent2);border-radius:7px;font-size:12px;font-weight:600;cursor:pointer;transition:all .15s;display:flex;align-items:center;gap:6px;font-family:'Noto Sans KR',sans-serif;}
  .gen-btn:hover{background:rgba(99,102,241,.15);}
  .gen-btn:disabled{opacity:.35;cursor:not-allowed;}
  .gen-btn.gb-done{border-color:rgba(16,185,129,.6);color:var(--green);}
  .gen-btn.gb-new{border-color:var(--yellow);color:var(--yellow);}

  /* 채팅 패널 */
  .chat-panel{display:flex;flex-direction:column;overflow:hidden;background:var(--surface);}
  .chat-header{padding:10px 14px;border-bottom:1px solid var(--border);font-size:13px;font-weight:600;display:flex;align-items:center;gap:7px;flex-shrink:0;}
  .chat-body{flex:1;overflow-y:auto;padding:12px 13px;display:flex;flex-direction:column;gap:8px;}
  .chat-msg{max-width:93%;}
  .chat-msg.assistant{align-self:flex-start;}
  .chat-msg.user{align-self:flex-end;}
  .msg-bubble{padding:9px 12px;border-radius:11px;font-size:12.5px;line-height:1.75;}
  .assistant .msg-bubble{background:var(--surface2);border:1px solid var(--border);}
  .user .msg-bubble{background:var(--accent);color:#fff;}
  .msg-time{font-size:10px;color:var(--muted);margin-top:2px;padding:0 3px;}
  .chat-actions{display:flex;flex-wrap:wrap;gap:5px;padding:6px 0 0;}
  .chat-action-btn{padding:4px 10px;background:var(--surface2);border:1px solid var(--border);border-radius:13px;font-size:11px;color:var(--muted2);cursor:pointer;transition:all .15s;font-family:'Noto Sans KR',sans-serif;}
  .chat-action-btn:hover{border-color:var(--accent2);color:var(--accent2);}
  .chat-action-btn.green{border-color:var(--green);color:var(--green);}
  .typing-indicator{display:flex;align-items:center;gap:4px;padding:9px 12px;background:var(--surface2);border:1px solid var(--border);border-radius:11px;width:fit-content;}
  .typing-dot{width:6px;height:6px;border-radius:50%;background:var(--muted);animation:bounce 1.2s infinite;}
  .typing-dot:nth-child(2){animation-delay:.2s;}
  .typing-dot:nth-child(3){animation-delay:.4s;}
  @keyframes bounce{0%,60%,100%{transform:translateY(0)}30%{transform:translateY(-5px)}}
  .chat-input-area{padding:10px 11px;border-top:1px solid var(--border);flex-shrink:0;}
  .chat-input-row{display:flex;gap:7px;}
  .chat-input-row input{flex:1;padding:9px 11px;background:var(--surface2);border:1px solid var(--border);border-radius:7px;color:var(--text);font-size:13px;outline:none;font-family:'Noto Sans KR',sans-serif;}
  .chat-input-row input:focus{border-color:var(--accent);}
  .send-btn{padding:9px 13px;background:var(--accent);color:#fff;border:none;border-radius:7px;font-size:13px;font-weight:600;cursor:pointer;font-family:'Noto Sans KR',sans-serif;}
  .send-btn:disabled{opacity:.4;cursor:not-allowed;}

  @keyframes kp-spin{to{transform:rotate(360deg)}}
  .spin{width:13px;height:13px;border:2px solid rgba(255,255,255,.3);border-top-color:#fff;border-radius:50%;animation:kp-spin .7s linear infinite;flex-shrink:0;}
  .spin-dark{width:13px;height:13px;border:2px solid var(--border);border-top-color:var(--accent2);border-radius:50%;animation:kp-spin .7s linear infinite;flex-shrink:0;}
  /* 종합 역량 평가 섹션 */
  .overall-section{margin:12px;border:1.5px solid rgba(99,102,241,.3);border-radius:10px;overflow:hidden;background:var(--surface);}
  .overall-head{padding:12px 14px;background:linear-gradient(135deg,rgba(99,102,241,.15),rgba(139,92,246,.1));display:flex;align-items:center;justify-content:space-between;gap:10px;flex-wrap:wrap;}
  .overall-head-title{font-size:13px;font-weight:700;color:var(--accent2);display:flex;align-items:center;gap:6px;}
  .overall-body{padding:12px 14px;}
  .overall-grid{display:grid;grid-template-columns:1fr 1fr 1fr;gap:8px;margin-bottom:10px;}
  .overall-card{background:var(--surface2);border:1px solid var(--border);border-radius:8px;padding:10px 12px;text-align:center;}
  .overall-card-label{font-size:10px;color:var(--muted2);font-weight:600;margin-bottom:4px;}
  .overall-card-grade{font-size:28px;font-weight:900;line-height:1;margin-bottom:4px;}
  .overall-card-subs{font-size:10px;color:var(--muted);line-height:1.6;}
  .overall-comment{font-size:12.5px;color:var(--text);line-height:1.75;padding:10px 12px;background:var(--surface2);border-radius:8px;border-left:3px solid var(--accent);margin-top:2px;}
  .overall-comment-label{font-size:11px;color:var(--muted);font-weight:600;margin-bottom:5px;}
  .btn-overall{padding:7px 13px;background:linear-gradient(135deg,#6366f1,#a855f7);color:#fff;border:none;border-radius:7px;font-size:12px;font-weight:700;cursor:pointer;font-family:'Noto Sans KR',sans-serif;display:flex;align-items:center;gap:5px;transition:opacity .2s;}
  .btn-overall:hover{opacity:.85;}
  .btn-overall:disabled{opacity:.4;cursor:not-allowed;}

  ::-webkit-scrollbar{width:4px;}
  ::-webkit-scrollbar-track{background:transparent;}
  ::-webkit-scrollbar-thumb{background:var(--border);border-radius:3px;}

  /* 평가 영역 */
  .eval-area{padding:8px 12px 12px;border-top:1px solid var(--border);}
  .eval-label{font-size:11px;color:var(--muted);font-weight:600;margin-bottom:8px;}
  .eval-row{display:flex;align-items:center;gap:8px;margin-bottom:5px;}
  .eval-name{font-size:11px;color:var(--muted2);width:140px;flex-shrink:0;}
  .eval-bar-bg{flex:1;background:var(--border);border-radius:3px;height:8px;overflow:hidden;}
  .eval-bar-fill{height:8px;border-radius:3px;transition:width .4s ease;}
  .eval-grade{font-size:11px;font-weight:700;width:22px;text-align:center;flex-shrink:0;}
  .eval-comment{font-size:11px;color:var(--muted2);margin-top:2px;padding-left:148px;line-height:1.5;}
  .grade-S{background:linear-gradient(90deg,#6366f1,#8b5cf6);color:#a78bfa;}
  .grade-A{background:var(--green);color:var(--green);}
  .grade-B{background:#06b6d4;color:#06b6d4;}
  .grade-C{background:var(--yellow);color:var(--yellow);}
  .grade-D{background:var(--red);color:var(--red);}
  .eval-gen-btn{margin:0 12px 11px;padding:6px 12px;background:transparent;border:1.5px solid #06b6d4;color:#06b6d4;border-radius:7px;font-size:12px;font-weight:600;cursor:pointer;display:flex;align-items:center;gap:6px;font-family:'Noto Sans KR',sans-serif;transition:all .15s;}
  .eval-gen-btn:hover{background:rgba(6,182,212,.15);}
  .eval-gen-btn:disabled{opacity:.35;cursor:not-allowed;}
  .eval-pending{border-color:#f59e0b;color:#f59e0b;}

  /* API 제공자 선택 */
  .provider-selector{display:flex;gap:6px;margin:10px 0 4px;}
  .provider-btn{flex:1;padding:8px 4px;background:var(--surface2);border:1.5px solid var(--border);border-radius:8px;color:var(--muted2);font-size:12px;font-weight:600;cursor:pointer;transition:all .15s;font-family:'Noto Sans KR',sans-serif;text-align:center;}
  .provider-btn:hover{border-color:var(--accent2);color:var(--accent2);}
  .provider-btn.selected{border-color:var(--accent);background:rgba(99,102,241,.15);color:var(--accent2);}
  .provider-icon{font-size:18px;display:block;margin-bottom:3px;}

  /* 기억하기 체크박스 */
  .remember-row{display:flex;align-items:center;gap:8px;margin-top:12px;cursor:pointer;}
  .remember-row input[type=checkbox]{width:16px;height:16px;accent-color:var(--accent);cursor:pointer;}
  .remember-row span{font-size:12px;color:var(--muted2);}

  /* 헤더 API 뱃지 */
  .api-badge{padding:2px 8px;border-radius:10px;font-size:11px;font-weight:600;background:rgba(99,102,241,.2);color:var(--accent2);margin-left:6px;}
</style>
</head>
<body>

<div id="lockScreen">
  <div class="lock-wrap">
    <div class="icon">🔐</div>
    <h1>세특 요약 생성기</h1>
    <p>AI 제공자를 선택하고 비밀번호와 API 키를 입력하세요</p>

    <div class="lock-field-label">AI 제공자 선택</div>
    <div class="provider-selector">
      <div class="provider-btn" id="pb-anthropic" onclick="selectProvider('anthropic')">
        <span class="provider-icon">🤖</span>Anthropic
      </div>
      <div class="provider-btn" id="pb-groq" onclick="selectProvider('groq')">
        <span class="provider-icon">⚡</span>Groq
      </div>
      <div class="provider-btn" id="pb-gemini" onclick="selectProvider('gemini')">
        <span class="provider-icon">💎</span>Gemini
      </div>
    </div>
    <div id="providerNote" style="font-size:11px;color:var(--muted);margin-bottom:6px;text-align:left;min-height:16px;"></div>

    <div class="lock-field-label">데이터 비밀번호</div>
    <input type="password" id="pwInput" placeholder="비밀번호" autocomplete="off">

    <div class="lock-field-label">API Key</div>
    <input type="text" id="apiKeyInput" placeholder="제공자를 먼저 선택하세요" autocomplete="off" style="letter-spacing:0;">

    <label class="remember-row">
      <input type="checkbox" id="rememberMe">
      <span>오늘 하루 비밀번호와 API 키 기억 (세션 유지)</span>
    </label>

    <button class="lock-btn" onclick="tryUnlock()">🔓 확인</button>
    <div class="lock-error" id="lockError"></div>
  </div>
</div>

<header>
  <h1>✏️ 세특 요약 생성기 <span class="header-badge">ADMIN</span></h1>
  <div id="headerStatus">로딩 전</div>
</header>

<div class="layout">
  <aside>
    <div class="aside-top">
      <input class="aside-search" id="search" placeholder="🔍 이름 / 학번 검색" oninput="renderList()">
      <div class="filter-tabs">
        <div class="filter-tab active" data-f="all" onclick="setFilter(this)">전체</div>
        <div class="filter-tab" data-f="none" onclick="setFilter(this)">미완료</div>
        <div class="filter-tab" data-f="partial" onclick="setFilter(this)">일부</div>
        <div class="filter-tab" data-f="done" onclick="setFilter(this)">완료</div>
      </div>
      <div class="progress-wrap" id="progressWrap">

<script>
/* ========== 암호화 유틸 ========== */
const b64ToArr=b64=>Uint8Array.from(atob(b64),c=>c.charCodeAt(0));
const arrToB64=arr=>btoa(String.fromCharCode(...new Uint8Array(arr)));

async function deriveKey(pw,salt){
  const km=await crypto.subtle.importKey('raw',new TextEncoder().encode(pw),'PBKDF2',false,['deriveKey']);
  return crypto.subtle.deriveKey({name:'PBKDF2',salt,iterations:100000,hash:'SHA-256'},km,{name:'AES-GCM',length:256},false,['decrypt','encrypt']);
}
async function decryptJSON(o,key){
  const p=await crypto.subtle.decrypt({name:'AES-GCM',iv:b64ToArr(o.iv)},key,b64ToArr(o.data));
  return JSON.parse(new TextDecoder().decode(p));
}
async function encryptJSON(obj,pw){
  const salt=crypto.getRandomValues(new Uint8Array(32));
  const key=await deriveKey(pw,salt);
  const iv=crypto.getRandomValues(new Uint8Array(12));
  const enc=await crypto.subtle.encrypt({name:'AES-GCM',iv},key,new TextEncoder().encode(JSON.stringify(obj)));
  return {v:1,salt:arrToB64(salt),iv:arrToB64(iv),data:arrToB64(enc)};
}
async function loadJSON(url,pw){
  const r=await fetch(url); if(!r.ok) return null;
  const o=await r.json(); if(!o.iv) return o;
  return decryptJSON(o,await deriveKey(pw,b64ToArr(o.salt)));
}

/* ========== 상태 ========== */
let students=[],sewtuk={},currentStu=null,currentPw='',apiKey='',apiProvider='anthropic';
let chatHistory=[],filterMode='all',isGenAll=false;
let pending={};     // hak -> { subjectKey -> [s1,s2,s3] }
let pendingOverall={}; // hak -> { 학업역량:{grade,subs,comment}, 진로역량:{...}, 공동체역량:{...}, 종합의견:'' }
let pendingEval={}; // hak -> { subjectKey -> {교과역량:{grade,comment}, ...} }

/* ========== 제공자 선택 ========== */
const PROVIDERS = {
  anthropic: {name:'Anthropic Claude', prefix:'sk-ant-', placeholder:'sk-ant-api03-...', note:'claude.ai 결제 후 console.anthropic.com에서 발급', color:'#6366f1'},
  groq:      {name:'Groq (무료)',       prefix:'gsk_',    placeholder:'gsk_...',          note:'무료 발급: console.groq.com → API Keys', color:'#10b981'},
  gemini:    {name:'Google Gemini',    prefix:'AIza',    placeholder:'AIzaSy...',         note:'무료 발급: aistudio.google.com/app/apikey', color:'#f59e0b'},
};

function selectProvider(p){
  apiProvider=p;

  const saved=sessionStorage.getItem('apiKey_'+p);

/* ========== 잠금 해제 ========== */
async function tryUnlock(){
  const pw=document.getElementById('pwInput').value.trim();
  const ak=document.getElementById('apiKeyInput').value.trim();
  const remember=document.getElementById('rememberMe').checked;
  const errEl=document.getElementById('lockError');
  if(!pw){errEl.textContent='비밀번호를 입력하세요.';return;}
  if(!apiProvider){errEl.textContent='AI 제공자를 선택하세요.';return;}
  const info=PROVIDERS[apiProvider];
  if(!ak||!ak.startsWith(info.prefix)){
    errEl.textContent=info.name+' API 키를 정확히 입력하세요 ('+info.prefix+'로 시작).';return;
  }
  errEl.textContent='';
  try{
    const s=await loadJSON('data/students.json',pw);
    currentPw=pw; apiKey=ak;
    students=(s||[]).filter(x=>x.grade===2);
    try{sewtuk=await loadJSON('data/sewtuk_2.json',pw)||{};}catch(e){}
    // 기억하기
    if(remember){
      sessionStorage.setItem('savedPw',pw);
      sessionStorage.setItem('savedProvider',apiProvider);
      sessionStorage.setItem('apiKey_'+apiProvider,ak);
    }
    document.getElementById('lockScreen').classList.add('hidden');
    document.getElementById('progressWrap').style.display='block';
    updateProgress(); renderList();
    const providerBadge=`<span class="api-badge">${info.name}</span>`;
    document.getElementById('headerStatus').innerHTML=`${students.length}명 로드됨 ${providerBadge}`;
  }catch(e){errEl.textContent='비밀번호가 올바르지 않습니다.';}
}

document.addEventListener('DOMContentLoaded',()=>{
  // 저장된 세션 복원
  const savedPw=sessionStorage.getItem('savedPw');
  const savedProvider=sessionStorage.getItem('savedProvider')||'anthropic';
  selectProvider(savedProvider);

/* ========== 진행률 ========== */
function getStuStatus(hak){
  const d=sewtuk[String(hak)];
  if(!d?.subjects?.length) return 'nosub';
  const tot=d.subjects.length;
  const done=d.subjects.filter(s=>Array.isArray(s.요약)&&s.요약.length>0).length;
  if(done===0) return 'none';
  if(done===tot) return 'done';
  return 'partial';
}
function updateProgress(){
  const total=students.filter(s=>sewtuk[String(s.hak)]?.subjects?.length>0).length;
  const done=students.filter(s=>getStuStatus(s.hak)==='done').length;
  const pct=total>0?Math.round(done/total*100):0;
  document.getElementById('progressFill').style.width=pct+'%';
  const evalDone=students.filter(s=>{
    const d=sewtuk[String(s.hak)];
    if(!d?.subjects?.length) return false;
    return d.subjects.every(sub=>sub.평가&&typeof sub.평가==='object');
  }).length;
  document.getElementById('progressLabel').textContent=`요약 ${done}명 · 평가 ${evalDone}명 완료 (전체 ${total}명)`;
}

    if(q&&!s.name.toLowerCase().includes(q)&&!String(s.hak).includes(q)) return false;
    const st=getStuStatus(s.hak);
    if(filterMode==='none'&&st!=='none') return false;
    if(filterMode==='partial'&&st!=='partial') return false;
    if(filterMode==='done'&&st!=='done') return false;
    return true;

    const st=getStuStatus(s.hak);

/* ========== 세특 패널 ========== */

const esc=s=>String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');

function renderPanel(){
  const panel=document.getElementById('sewtukPanel'); if(!panel) return;

    const k=sKey(s);

      {key:'협업소통',label:'협업·소통'},
      {key:'나눔배려',label:'나눔·배려'},

      {key:'리더십',label:'리더십'},

    const GRADE_PCT={S:100,A:80,B:60,C:40,D:20};
    const evalBlock=evalData

  }).join('');

/* ========== API 호출 (제공자별 분기) ========== */
async function callAPI(system,messages,maxTokens=400){
  if(apiProvider==='anthropic'){
    const r=await fetch('https://api.anthropic.com/v1/messages',{
      method:'POST',
      headers:{
        'Content-Type':'application/json',
        'x-api-key':apiKey,
        'anthropic-version':'2023-06-01',
        'anthropic-dangerous-direct-browser-access':'true'
      },
      body:JSON.stringify({
        model:'claude-sonnet-4-5',
        max_tokens:maxTokens,
        system,
        messages
      })
    });
    if(!r.ok){const t=await r.text();console.error('Anthropic API Error:',r.status,t);throw new Error(`Anthropic API ${r.status}: ${t.substring(0,200)}`);}
    const d=await r.json();
    return d.content?.[0]?.text||'';
  }
  else if(apiProvider==='groq'){
    const r=await fetch('https://api.groq.com/openai/v1/chat/completions',{
      method:'POST',
      headers:{'Content-Type':'application/json','Authorization':'Bearer '+apiKey},
      body:JSON.stringify({
        model:'llama-3.3-70b-versatile',
        max_tokens:maxTokens,
        temperature:0.7,
        messages:[{role:'system',content:system},...messages]
      })
    });
    if(!r.ok){const t=await r.text();console.error('Groq API Error:',r.status,t);throw new Error(`Groq API ${r.status}: ${t.substring(0,200)}`);}
    const d=await r.json();
    return d.choices?.[0]?.message?.content||'';
  }
  else if(apiProvider==='gemini'){
    const contents=[];
    let first=true;
    for(const m of messages){
      if(first&&m.role==='user'){
        contents.push({role:'user',parts:[{text:system+'\n\n'+m.content}]});
        first=false;
      } else {
        contents.push({role:m.role==='assistant'?'model':'user',parts:[{text:m.content}]});
      }
    }
    const r=await fetch('https://generativelanguage.googleapis.com/v1beta/models/gemini-2.0-flash:generateContent?key='+apiKey,{
      method:'POST',
      headers:{'Content-Type':'application/json'},
      body:JSON.stringify({contents,generationConfig:{maxOutputTokens:maxTokens,temperature:0.7}})
    });
    if(!r.ok){const t=await r.text();console.error('Gemini API Error:',r.status,t);throw new Error(`Gemini API ${r.status}: ${t.substring(0,200)}`);}
    const d=await r.json();
    return d.candidates?.[0]?.content?.parts?.[0]?.text||'';
  }
  throw new Error('API 제공자가 선택되지 않았습니다.');
}

/* ========== 전체 일괄 생성 ========== */
async function generateAll(){
  if(isGenAll) return;
  const hak=String(currentStu.hak);
  const subs=sewtuk[hak]?.subjects||[];
  const targets=subs.filter(s=>!pending[hak]?.[sKey(s)]&&!(Array.isArray(s.요약)&&s.요약.length>0));
  if(!targets.length){addMsg('assistant','✅ 모든 과목에 이미 요약이 있습니다.');return;}

  isGenAll=true;
  const btnAll=document.getElementById('btnAll');
  if(btnAll){btnAll.disabled=true;btnAll.innerHTML=`<span class="spin"></span> 생성 중...`;}
  const progBar=document.getElementById('allProg');
  const fill=document.getElementById('allProgFill');
  const lbl=document.getElementById('allProgLabel');
  if(progBar) progBar.classList.add('show');

  addMsg('assistant',`🚀 미완료 **${targets.length}개** 과목을 순서대로 생성합니다...`);

  let done=0;
  for(const s of targets){
    if(fill) fill.style.width=Math.round(done/targets.length*100)+'%';
    if(lbl) lbl.textContent=`${done}/${targets.length}`;
    await generateOne(subs.indexOf(s));

  }
  if(fill) fill.style.width='100%';
  if(lbl) lbl.textContent=`${done}/${targets.length} 완료`;

  isGenAll=false;
  if(btnAll){btnAll.disabled=false;btnAll.innerHTML='✨ 전체 요약 생성';}
  addMsg('assistant',
    `🎉 전체 생성 완료! **${done}개** 요약이 준비되었습니다.`,
    [{label:'💾 저장 적용',action:'applyAndSave()',cls:'green'},{label:'📥 JSON 다운로드',action:'exportJSON()'}]
  );
}

/* ========== 채팅 ========== */
function addMsg(role,text,actions){
  chatHistory.push({role,content:text});
  const body=document.getElementById('chatBody'); if(!body) return;
  const time=new Date().toLocaleTimeString('ko',{hour:'2-digit',minute:'2-digit'});
  const div=document.createElement('div');
  div.className=`chat-msg ${role}`;
  const fmt=text.replace(/\*\*(.+?)\*\*/g,'<strong>$1</strong>').replace(/\n/g,'<br>');
  const acts=(actions&&actions.length)?`<div class="chat-actions">${actions.map(a=>`<button class="chat-action-btn ${a.cls||''}" onclick="${a.action}">${a.label}</button>`).join('')}</div>`:'';
  div.innerHTML=`<div class="msg-bubble">${fmt}${acts}</div><div class="msg-time">${time}</div>`;
  body.appendChild(div); body.scrollTop=body.scrollHeight;
}
function renderChatBody(){
  const body=document.getElementById('chatBody'); if(!body) return;
  body.innerHTML='';
  chatHistory.forEach(m=>{
    const div=document.createElement('div');
    div.className=`chat-msg ${m.role}`;
    const fmt=m.content.replace(/\*\*(.+?)\*\*/g,'<strong>$1</strong>').replace(/\n/g,'<br>');
    div.innerHTML=`<div class="msg-bubble">${fmt}</div>`;
    body.appendChild(div);
  });
  body.scrollTop=body.scrollHeight;
}

  body.appendChild(typing); body.scrollTop=body.scrollHeight;

  const hak=String(currentStu.hak);
  const subs=sewtuk[hak]?.subjects||[];
  const ctx=subs.map(s=>`[${s.과목}] 요약:${pending[hak]?.[sKey(s)]?JSON.stringify(pending[hak][sKey(s)]):Array.isArray(s.요약)?JSON.stringify(s.요약):'없음'}`).join('\n');

  try{
    const text=await callAPI(
      `학교 성적 상담 AI. 현재 ${currentStu.name}의 세특 요약 작업 중.\n요약 수정 시 JSON 배열: ["요약1","요약2","요약3"]\n\n현황:\n${ctx}`,
      chatHistory.map(m=>({role:m.role,content:m.content})),600
    );
    document.getElementById('typing')?.remove();

    // JSON 자동 추출 후 과목 적용
    const jm=text.match(/\["[^"]*","[^"]*","[^"]*"\]/);
    if(jm){
      try{
        const arr=JSON.parse(jm[0]);
        const matched=subs.find(s=>msg.includes(s.과목)||text.includes(s.과목));
        if(matched){pending[hak]=pending[hak]||{};pending[hak][sKey(matched)]=arr;renderPanel();}
      }catch(e){}
    }
    addMsg('assistant',text);
  }catch(e){
    document.getElementById('typing')?.remove();
    addMsg('assistant',`오류: ${e.message}`);
  }
  btn.disabled=false;
}

/* ========== 저장 적용 ========== */
function applyAndSave(){
  if(!currentStu) return;
  const hak=String(currentStu.hak);
  if(!pending[hak]) pending[hak]={};
  if(!pendingEval[hak]) pendingEval[hak]={};
  const p=pending[hak];
  const pe=pendingEval[hak];
  const pLen=Object.keys(p).length;
  const peLen=Object.keys(pe).length;
  if(pLen===0 && peLen===0){
    addMsg('assistant','저장할 새 요약이나 평가가 없습니다.');
    return;
  }
  const subs=sewtuk[hak]?.subjects||[];
  let cnt=0, evalCnt=0;
  subs.forEach(s=>{
    const k=sKey(s);
    if(p[k]!==undefined){s.요약=p[k];delete p[k];cnt++;}
    if(pe[k]!==undefined){s.평가=pe[k];delete pe[k];evalCnt++;}
  });
  // 종합평가 저장
  if(pendingOverall[hak]){
    if(!sewtuk[hak]) sewtuk[hak]={};
    sewtuk[hak].종합평가=pendingOverall[hak];
    pendingOverall[hak]=null;
    renderOverallSection();
  }
  updateProgress(); renderPanel(); renderList();
  const parts=[];
  if(cnt>0) parts.push(`요약 **${cnt}개**`);
  if(evalCnt>0) parts.push(`평가 **${evalCnt}개**`);
  addMsg('assistant',`✅ ${parts.join(' + ')} 반영되었습니다.\n**📥 JSON 다운로드** 버튼으로 파일을 받아 GitHub data/ 폴더에 업로드하세요.`,
    [{label:'📥 JSON 다운로드',action:'exportJSON()'}]
  );
}

/* ========== JSON 다운로드 (평문) ========== */
async function exportJSON(){
  try{
    const blob=new Blob([JSON.stringify(sewtuk,null,2)],{type:'application/json'});
    const url=URL.createObjectURL(blob);
    const a=document.createElement('a'); a.href=url; a.download='sewtuk_2.json'; a.click();
    URL.revokeObjectURL(url);
    addMsg('assistant','📥 **sewtuk_2.json** 다운로드 완료!\n⚠️ 암호화 없이 저장됩니다. GitHub → data/ 폴더에 업로드하세요.');
  }catch(e){addMsg('assistant',`다운로드 오류: ${e.message}`);}
}
</script>
